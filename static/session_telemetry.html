function setScatterMode(m){
  STATE.scatterMode=m;
  const lb=document.getElementById("stb-lasso"),ab=document.getElementById("stb-annotate");
  if(lb)lb.classList.toggle("active",m==="lasso");
  if(ab)ab.classList.toggle("active",m==="annotate");
  const wrap=document.getElementById("scatter-wrap");
  if(wrap)wrap.style.cursor=m==="annotate"?"pointer":"crosshair";
}
function clearScatterLasso(){STATE.scatterLassoResult=null;STATE.scatterLasso.active=false;drawLapScatter()}
function clearScatterAnnotations(){STATE.scatterAnnotations=[];renderScatterAnnotations()}

let _scatterDragStarted=false;
function initScatterEvents(){
  const cv=document.getElementById("scatter-canvas");
  if(!cv||cv._scEvts)return;
  cv._scEvts=true;
  cv.addEventListener("mousedown",onScatterDown);
  cv.addEventListener("mousemove",onScatterMove);
  cv.addEventListener("mouseup",onScatterUp);
  cv.addEventListener("mouseleave",onScatterLeave);
}
function scatterXY(e){
  const cv=document.getElementById("scatter-canvas");
  if(!cv)return{x:0,y:0};
  const r=cv.getBoundingClientRect();
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
function onScatterDown(e){
  const p=scatterXY(e);
  if(STATE.scatterMode==="lasso"){
    STATE.scatterLasso.active=true;_scatterDragStarted=false;
    STATE.scatterLasso.x0=p.x;STATE.scatterLasso.y0=p.y;
    STATE.scatterLasso.x1=p.x;STATE.scatterLasso.y1=p.y;
    STATE.scatterLassoResult=null;
  }
}
function onScatterMove(e){
  const p=scatterXY(e);
  if(STATE.scatterMode==="lasso"&&STATE.scatterLasso.active){
    STATE.scatterLasso.x1=p.x;STATE.scatterLasso.y1=p.y;
    const dx=Math.abs(STATE.scatterLasso.x1-STATE.scatterLasso.x0);
    const dy=Math.abs(STATE.scatterLasso.y1-STATE.scatterLasso.y0);
    if(dx>4||dy>4)_scatterDragStarted=true;
    if(_scatterDragStarted)drawScatterLassoOverlay();
  }else if(!STATE.scatterLasso.active){
    // Hover tooltip
    scatterShowTooltip(p);
  }
}
function onScatterUp(e){
  const p=scatterXY(e);
  if(STATE.scatterMode==="lasso"&&STATE.scatterLasso.active){
    STATE.scatterLasso.active=false;
    STATE.scatterLasso.x1=p.x;STATE.scatterLasso.y1=p.y;
    if(_scatterDragStarted)finalizeScatterLasso();
    else{STATE.scatterLassoResult=null;drawLapScatter()}
    _scatterDragStarted=false;
  }else if(STATE.scatterMode==="annotate"){
    handleScatterAnnotateClick(p);
  }
}
function onScatterLeave(e){
  const tip=document.getElementById("scatter-tooltip");
  if(tip)tip.style.display="none";
  if(STATE.scatterLasso.active){
    STATE.scatterLasso.active=false;_scatterDragStarted=false;
    const L=STATE.scatterLasso;
    if(Math.abs(L.x1-L.x0)>4||Math.abs(L.y1-L.y0)>4)finalizeScatterLasso();
    else{STATE.scatterLassoResult=null;drawLapScatter()}
  }
}
function scatterShowTooltip(p){
  const C=STATE.scatterCoord;if(!C)return;
  const tip=document.getElementById("scatter-tooltip");if(!tip)return;
  let closest=null,closeDist=Infinity;
  C.laps.forEach(l=>{
    const x=C.xForLap(l.lap_number),y=C.yForTime(l.lap_duration);
    const dist=Math.hypot(p.x-x,p.y-y);
    if(dist<closeDist&&dist<20){closeDist=dist;closest=l;}
  });
  if(closest){
    tip.style.display="block";tip.style.left=(p.x+12)+"px";tip.style.top=(p.y-10)+"px";
    const isExcluded=closest.lap_duration>=C.cutoff;
    const qPhase=getQualiPhaseForLap(closest.driver_number,closest.lap_number);
    const phaseTag=qPhase?` <span style="font-weight:700">${qPhase}</span>`:"";
    const freshTag=(closest.isFresh===true)?' <span style="color:var(--green);font-size:9px;font-weight:600">NEW</span>':(closest.isFresh===false)?' <span style="color:var(--text2);font-size:9px;font-weight:600">USED</span>':"";
    const ageTag=(closest.tyreAge!=null)?` <span style="opacity:.6;font-size:9px">age:${closest.tyreAge}L</span>`:"";
    tip.innerHTML=`<strong>${esc(closest.acronym)}</strong> L${closest.lap_number}${phaseTag}<br>${fmtTime(closest.lap_duration)} <span style="color:${compoundColor(closest.compound)}">${closest.compound}</span>${freshTag}${ageTag}${closest.i1_speed?" I1:"+closest.i1_speed:""}${closest.i2_speed?" I2:"+closest.i2_speed:""}${closest.st_speed?" ST:"+closest.st_speed:""}${isExcluded?' <span style="color:var(--accent);font-weight:700">EXCLUDED</span>':""}`;
  }else{tip.style.display="none";}
}
let _lassoDrawing=false;
function drawScatterLassoOverlay(){
  if(_lassoDrawing)return;
  _lassoDrawing=true;
  drawLapScatter();
  // Draw live lasso box on top
  const cv=document.getElementById("scatter-canvas");if(!cv){_lassoDrawing=false;return;}
  const ctx=cv.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
  const L=STATE.scatterLasso;
  ctx.strokeStyle="rgba(99,179,237,0.7)";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.strokeRect(Math.min(L.x0,L.x1),Math.min(L.y0,L.y1),Math.abs(L.x1-L.x0),Math.abs(L.y1-L.y0));
  ctx.fillStyle="rgba(99,179,237,0.06)";
  ctx.fillRect(Math.min(L.x0,L.x1),Math.min(L.y0,L.y1),Math.abs(L.x1-L.x0),Math.abs(L.y1-L.y0));
  ctx.setLineDash([]);ctx.restore();
  _lassoDrawing=false;
}
function finalizeScatterLasso(){
  const C=STATE.scatterCoord;if(!C)return;
  const L=STATE.scatterLasso;
  const lx=Math.min(L.x0,L.x1),rx=Math.max(L.x0,L.x1);
  const ty=Math.min(L.y0,L.y1),by=Math.max(L.y0,L.y1);
  if(rx-lx<5&&by-ty<5){STATE.scatterLassoResult=null;drawLapScatter();return;}
  const selected=[];
  C.laps.forEach(l=>{
    const px=C.xForLap(l.lap_number),py=C.yForTime(l.lap_duration);
    if(px>=lx&&px<=rx&&py>=ty&&py<=by)selected.push(l);
  });
  if(!selected.length){STATE.scatterLassoResult=null;drawLapScatter();return;}
  const times=selected.map(s=>s.lap_duration);
  const avg=times.reduce((a,b)=>a+b,0)/times.length;
  STATE.scatterLassoResult={laps:selected,avg,count:selected.length,min:Math.min(...times),max:Math.max(...times),lx,rx,ty,by};
  drawLapScatter();
}

/* ── SCATTER ANNOTATIONS ── */
function handleScatterAnnotateClick(p){
  const C=STATE.scatterCoord;if(!C)return;
  // Find nearest dot to snap to
  let snap=null,snapDist=Infinity;
  C.laps.forEach(l=>{
    const x=C.xForLap(l.lap_number),y=C.yForTime(l.lap_duration);
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<snapDist&&d<25){snapDist=d;snap=l;}
  });
  // Create inline input
  const layer=document.getElementById("scatter-anno-layer");if(!layer)return;
  const existing=layer.querySelector(".scatter-anno-input");if(existing)existing.remove();
  const inp=document.createElement("input");
  inp.className="scatter-anno-input";
  inp.style.left=p.x+"px";inp.style.top=p.y+"px";
  inp.placeholder=snap?snap.acronym+" L"+snap.lap_number:"Note...";
  function commit(){
    const txt=inp.value.trim();inp.remove();
    if(!txt)return;
    if(snap){
      STATE.scatterAnnotations.push({lapNumber:snap.lap_number,driverNumber:snap.driver_number,time:snap.lap_duration,text:txt});
    }else{
      STATE.scatterAnnotations.push({pxPct:p.x/C.W,pyPct:p.y/C.H,text:txt});
    }
    renderScatterAnnotations();
  }
  inp.addEventListener("keydown",ev=>{if(ev.key==="Enter")commit();else if(ev.key==="Escape")inp.remove();});
  inp.addEventListener("blur",commit);
  layer.appendChild(inp);
  setTimeout(()=>inp.focus(),0);
}
function renderScatterAnnotations(){
  const layer=document.getElementById("scatter-anno-layer");if(!layer)return;
  const inp=layer.querySelector(".scatter-anno-input");
  layer.innerHTML="";if(inp)layer.appendChild(inp);
  const C=STATE.scatterCoord;if(!C)return;
  STATE.scatterAnnotations.forEach((a,i)=>{
    let x,y;
    if(a.lapNumber!=null&&a.time!=null){
      x=C.xForLap(a.lapNumber);y=C.yForTime(a.time);
    }else{
      x=(a.pxPct||0)*C.W;y=(a.pyPct||0)*C.H;
    }
    const div=document.createElement("div");
    div.className="scatter-anno";
    div.style.left=x+"px";div.style.top=y+"px";
    const prefix=a.lapNumber!=null?`L${a.lapNumber}: `:"";
    div.innerHTML=`${prefix}${esc(a.text)} <span class="anno-x" onclick="removeScatterAnno(${i})">&times;</span>`;
    layer.appendChild(div);
  });
}
function removeScatterAnno(i){STATE.scatterAnnotations.splice(i,1);renderScatterAnnotations()}

function selectLapForTelem(dn,lapNum,lapTime){
  // If clicking already-selected lap, deselect it
  for(let i=0;i<3;i++){
    const s=STATE.telemSlots[i];
    if(s&&s.dn===dn&&s.lapNum===lapNum){STATE.telemSlots[i]=null;updateTelemSlotUI();renderLapsTable();return;}
  }
  // Fill first empty slot
  const info={dn,lapNum,lapTime,data:null};
  const empty=STATE.telemSlots.indexOf(null);
  if(empty!==-1){STATE.telemSlots[empty]=info;}
  else{STATE.telemSlots[0]=STATE.telemSlots[1];STATE.telemSlots[1]=STATE.telemSlots[2];STATE.telemSlots[2]=info;}
  updateTelemSlotUI();
  renderLapsTable();
}

/* ── Inline telem lap pickers ── */
function populateTelemDriverSelects(){
  const d=STATE.sessionData;
  if(!d)return;
  const drivers=d.drivers||{};
  const laps=(d.laps||[]).filter(l=>l.lap_duration&&l.lap_duration>0);
  // Collect driver numbers that actually have laps
  const dnsWithLaps=new Set(laps.map(l=>l.driver_number));
  // Sort drivers alphabetically by acronym
  const sorted=Object.entries(drivers)
    .filter(([dn])=>dnsWithLaps.has(Number(dn)))
    .sort((a,b)=>(a[1].acronym||"").localeCompare(b[1].acronym||""));
  for(let i=0;i<3;i++){
    const sel=document.getElementById("telem-drv-"+i);
    if(!sel)continue;
    const prev=sel.value;
    sel.innerHTML='<option value="">Driver\u2026</option>';
    sorted.forEach(([dn,drv])=>{
      sel.innerHTML+=`<option value="${dn}" style="color:${teamColor(drv.team)||'var(--text)'}">${esc(drv.acronym||"#"+dn)}</option>`;
    });
    if(prev)sel.value=prev;
  }
}

function onTelemDriverChange(slotIdx){
  const sel=document.getElementById("telem-drv-"+slotIdx);
  const dn=sel?Number(sel.value):0;
  populateTelemLapSelect(slotIdx,dn);
  // Clear the lap select — user must pick a lap
  const lapSel=document.getElementById("telem-lap-"+slotIdx);
  if(lapSel)lapSel.value="";
}

function populateTelemLapSelect(slotIdx,dn){
  const lapSel=document.getElementById("telem-lap-"+slotIdx);
  if(!lapSel)return;
  if(!dn){lapSel.innerHTML='<option value="">Lap\u2026</option>';return;}
  const d=STATE.sessionData;
  if(!d)return;
  const laps=(d.laps||[]).filter(l=>l.driver_number===dn&&l.lap_duration&&l.lap_duration>0);
  if(laps.length===0){lapSel.innerHTML='<option value="">No laps</option>';return;}

  // Enrich with compound info
  const stints=d.stints||[];
  const dStints=stints.filter(s=>s.driver_number===dn);
  const enriched=laps.map(l=>{
    let compound="";
    for(const st of dStints){
      if(l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end){compound=(st.compound||"").toUpperCase();break;}
    }
    return{...l,compound};
  });

  const fastest=Math.min(...enriched.map(l=>l.lap_duration));
  // Sort by lap number ascending
  enriched.sort((a,b)=>a.lap_number-b.lap_number);

  lapSel.innerHTML='<option value="">Lap\u2026</option>';
  enriched.forEach(l=>{
    const isBest=Math.abs(l.lap_duration-fastest)<0.001;
    const tag=l.compound?` [${l.compound}]`:"";
    const star=isBest?"\u2605 ":"";
    lapSel.innerHTML+=`<option value="${l.lap_number}" data-time="${l.lap_duration}">${star}L${l.lap_number} \u2014 ${fmtTime(l.lap_duration)}${tag}</option>`;
  });
}

function onTelemLapChange(slotIdx){
  const drvSel=document.getElementById("telem-drv-"+slotIdx);
  const lapSel=document.getElementById("telem-lap-"+slotIdx);
  if(!drvSel||!lapSel)return;
  const dn=Number(drvSel.value);
  const lapNum=Number(lapSel.value);
  if(!dn||!lapNum)return;
  const lapTime=Number(lapSel.selectedOptions[0]?.dataset.time||0);
  // Set the slot directly
  STATE.telemSlots[slotIdx]={dn,lapNum,lapTime,data:null};
  updateTelemSlotUI();
  renderLapsTable();
}

function selectBestLap(slotIdx){
  const drvSel=document.getElementById("telem-drv-"+slotIdx);
  if(!drvSel||!drvSel.value)return;
  const dn=Number(drvSel.value);
  const d=STATE.sessionData;
  if(!d)return;
  const laps=(d.laps||[]).filter(l=>l.driver_number===dn&&l.lap_duration&&l.lap_duration>0);
  if(laps.length===0)return;
  const best=laps.reduce((a,b)=>a.lap_duration<b.lap_duration?a:b);
  STATE.telemSlots[slotIdx]={dn,lapNum:best.lap_number,lapTime:best.lap_duration,data:null};
  updateTelemSlotUI();
  renderLapsTable();
}

function clearTelemSlots(){
  STATE.telemSlots=[null,null,null];
  updateTelemSlotUI();
  renderLapsTable();
  document.getElementById("telem-charts").style.display="none";
}

function updateTelemSlotUI(){
  const drivers=STATE.sessionData?STATE.sessionData.drivers||{}:{};
  const slotColors=["var(--blue)","var(--accent)","var(--green)"];
  const emptyLabels=["Select a lap","Optional","Optional"];
  for(let i=0;i<3;i++){
    const el=document.getElementById("telem-slot-"+i);
    if(!el)continue;

    if(s){
      if(s.crossSession){
        const col=teamColor(s.team)||"#888";
        el.innerHTML=`<span class="slot-label" style="color:${slotColors[i]}">D${i+1}</span>
          <span class="slot-info" style="color:${col}">${esc(s.acronym||"#"+s.dn)}</span>
          <span style="font-size:11px;color:var(--text2)">L${s.lapNum} — ${fmtTime(s.lapTime)}</span>
          <span style="font-size:9px;color:var(--yellow);margin-left:4px" title="From another session">&#128260; cross</span>`;
      }else{
        const drv=drivers[s.dn]||{};
        el.innerHTML=`<span class="slot-label" style="color:${slotColors[i]}">D${i+1}</span>
          <span class="slot-info" style="color:${teamColor(drv.team)}">${esc(drv.acronym||"#"+s.dn)}</span>
          <span style="font-size:11px;color:var(--text2)">L${s.lapNum} — ${fmtTime(s.lapTime)}</span>`;
      }
    }else{
      el.innerHTML=`<span class="slot-label" style="color:${slotColors[i]}">D${i+1}</span><span class="slot-empty">${emptyLabels[i]}</span>`;
    }
  }
  // Sync inline picker dropdowns
  for(let i=0;i<3;i++){
    const s=STATE.telemSlots[i];
    const drvSel=document.getElementById("telem-drv-"+i);
    const lapSel=document.getElementById("telem-lap-"+i);
    if(drvSel&&lapSel){
      if(s&&!s.crossSession){
        if(drvSel.value!=String(s.dn)){drvSel.value=String(s.dn);populateTelemLapSelect(i,s.dn);}
        lapSel.value=String(s.lapNum);
      }else if(!s){
        drvSel.value="";lapSel.innerHTML='<option value="">Lap\u2026</option>';
      }
    }
  }
  const filled=STATE.telemSlots.filter(s=>s!==null).length;
  const btn=document.getElementById("btn-compare");
  if(btn)btn.style.display=filled>=1?"inline-block":"none";
  // Auto-load when at least one slot filled
  if(filled>=1)loadAndDrawTelem();
}

async function fetchCarData(sk,dn,lapStart,lapEnd){
  const ck=`car_${sk}_${dn}_${lapStart}_${lapEnd}`;
  if(TELEM_CACHE[ck])return TELEM_CACHE[ck];
  const [carR,locR]=await Promise.all([
    fetch(`/api/test_telemetry/car_data?session_key=${sk}&driver_number=${dn}&lap_start=${encodeURIComponent(lapStart)}&lap_end=${encodeURIComponent(lapEnd)}`),
    fetch(`/api/test_telemetry/location?session_key=${sk}&driver_number=${dn}&lap_start=${encodeURIComponent(lapStart)}&lap_end=${encodeURIComponent(lapEnd)}`)
  ]);
  const car=await carR.json();
  const loc=await locR.json();
  const result={car:Array.isArray(car)?car:[],loc:Array.isArray(loc)?loc:[]};
  TELEM_CACHE[ck]=result;
  return result;
}

function findLapTimestamps(dn,lapNum){
  const laps=STATE.sessionData.laps||[];
  const lap=laps.find(l=>l.driver_number===dn&&l.lap_number===lapNum);
  if(!lap)return null;
  // date_start is the lap start, lap_duration gives end
  const start=lap.date_start;
  if(!start)return null;
  const startMs=new Date(start).getTime();
  const dur=(lap.lap_duration||90)*1000;
  const end=new Date(startMs+dur).toISOString();
  return{start,end};
}

async function loadAndDrawTelem(){
  const filled=STATE.telemSlots.filter(s=>s!==null);
  if(filled.length===0)return;
  const sk=STATE.activeSession.session_key;
  const chartsEl=document.getElementById("telem-charts");
  chartsEl.style.display="block";
  chartsEl.scrollIntoView({behavior:"smooth",block:"start"});

  // Show loading state on canvases
  ["cv-speed","cv-throttle","cv-brake","cv-gear","cv-rpm","cv-delta"].forEach(id=>{
    const c=document.getElementById(id);
    if(c){const cx=c.getContext("2d");cx.clearRect(0,0,c.width,c.height);}
  });

  try{
    for(let i=0;i<3;i++){
      const slot=STATE.telemSlots[i];
      if(!slot||slot.data)continue;
      if(slot.crossSession){
        slot.data=await fetchCarData(slot.sessionKey,slot.dn,slot.lapStart,slot.lapEnd);
      }else{
        const ts=findLapTimestamps(slot.dn,slot.lapNum);
        if(!ts){console.warn("No timestamps for",slot.dn,"L"+slot.lapNum);continue;}
        slot.data=await fetchCarData(sk,slot.dn,ts.start,ts.end);
      }
    }
    drawTelemCharts();
    initErsTooltip();
    // Auto-fetch ERS zones if toggle is active
    if(STATE.ersEnabled)fetchAndDrawErs();
  }catch(e){console.error("Telem load error:",e);}
}

/* ══════════════════════════════════════════════════════════════════════════════
   SPEED TRAP RANKINGS (3 columns: ST, I1, I2)
   ══════════════════════════════════════════════════════════════════════════════ */
function renderSpeedRankings(){
  const el=document.getElementById("speed-rankings-wrap");
  if(!el)return;
  const d=STATE.sessionData;if(!d){el.innerHTML="";return;}
  const drivers=d.drivers||{};
  const laps=getProcessedLaps();
  // Build per-driver best speeds
  const driverBest={};
  laps.forEach(l=>{
    const dn=l.driver_number;
    if(!driverBest[dn])driverBest[dn]={st:0,i1:0,i2:0,dn};
    if(l.st_speed>driverBest[dn].st)driverBest[dn].st=l.st_speed;
    if(l.i1_speed>driverBest[dn].i1)driverBest[dn].i1=l.i1_speed;
    if(l.i2_speed>driverBest[dn].i2)driverBest[dn].i2=l.i2_speed;
  });
  const all=Object.values(driverBest);
  if(!all.length){el.innerHTML='<div style="color:var(--text2);font-size:12px;padding:16px">No speed data</div>';return;}

  function renderColumn(title,key,items){
    const sorted=items.filter(p=>p[key]>0).sort((a,b)=>b[key]-a[key]);
    if(!sorted.length)return"";
    const max=sorted[0][key];
    let html=`<div class="speed-col"><div class="speed-col-title">${esc(title)}</div>`;
    sorted.forEach((p,i)=>{
      const drv=drivers[p.dn]||{};
      const acr=drv.acronym||"#"+p.dn;
      const col=teamColor(drv.team||"");
      const pct=((p[key]/max)*100).toFixed(0);
      html+=`<div class="speed-rank-row">
        <span class="speed-rank-driver" style="color:${col}">${esc(acr)}</span>
        <div class="speed-rank-bar-bg"><div class="speed-rank-bar" style="width:${pct}%;background:${col}"></div></div>
        <span class="speed-rank-val">${Math.round(p[key])}<span class="speed-rank-unit">km/h</span></span>
      </div>`;
    });
    html+="</div>";
    return html;
  }
  el.innerHTML=renderColumn("Speed Trap (Finish)","st",all)+renderColumn("Intermediate 1","i1",all)+renderColumn("Intermediate 2","i2",all);
}

/* ══════════════════════════════════════════════════════════════════════════════
   TOP SPEED vs MEAN SPEED (Best Lap per Team)
   ══════════════════════════════════════════════════════════════════════════════ */
let TVM_POINTS=[];

function drawTopVsMean(){
  const cv=document.getElementById("tvm-canvas");
  if(!cv)return;
  const wrap=document.getElementById("tvm-wrap");
  if(!wrap)return;
  const W=wrap.clientWidth;
  const H=wrap.clientHeight||420;
  const dpr=window.devicePixelRatio||1;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+"px";cv.style.height=H+"px";
  const ctx=cv.getContext("2d");
  ctx.scale(dpr,dpr);

  const trackKm=getTrackLengthKm();
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const laps=getProcessedLaps().filter(l=>l.lap_duration&&l.lap_duration<300&&(l.st_speed>0||l.i1_speed>0||l.i2_speed>0));

  const cs=getComputedStyle(document.documentElement);
  const surfaceBg=cs.getPropertyValue("--surface2").trim()||"#1f1f23";
  const borderCol=cs.getPropertyValue("--border").trim()||"#2e2e33";
  const textCol=cs.getPropertyValue("--text").trim()||"#e4e4e7";
  const text2Col=cs.getPropertyValue("--text2").trim()||"#a1a1aa";

  ctx.fillStyle=surfaceBg;ctx.fillRect(0,0,W,H);

  if(!trackKm){
    ctx.fillStyle=text2Col;ctx.font="13px sans-serif";ctx.textAlign="center";
    ctx.fillText("Track length not available for this circuit — cannot compute mean speed",W/2,H/2);
    ctx.fillText("(circuit: "+(STATE.activeMeeting?.circuit_short_name||"unknown")+")",W/2,H/2+18);
    TVM_POINTS=[];return;
  }

  // Best lap per team for mean speed; max speed across ALL laps for top speed
  const bestByTeam={};
  const maxSpeedByTeam={};  // track the absolute max speed across all laps
  laps.forEach(l=>{
    const drv=drivers[l.driver_number]||{};
    const team=drv.team||"Unknown";
    const meanSpd=(trackKm/l.lap_duration)*3600;
    const speeds=[l.st_speed||0,l.i1_speed||0,l.i2_speed||0];
    const maxSpd=Math.max(...speeds);
    const spdZone=maxSpd===(l.i1_speed||0)?"I1":maxSpd===(l.i2_speed||0)?"I2":"ST";
    // Best lap by duration
    if(!bestByTeam[team]||l.lap_duration<bestByTeam[team].lap_duration){
      bestByTeam[team]={...l,team,acronym:drv.acronym||"#"+l.driver_number,meanSpeed:meanSpd};
    }
    // Track max speed across all laps for this team
    if(!maxSpeedByTeam[team]||maxSpd>maxSpeedByTeam[team].topSpeed){
      maxSpeedByTeam[team]={topSpeed:maxSpd,topSpeedZone:spdZone,stSpeed:l.st_speed||0,i1Speed:l.i1_speed||0,i2Speed:l.i2_speed||0};
    }
  });
  // Merge: best lap mean speed + max top speed across all laps
  Object.keys(bestByTeam).forEach(team=>{
    const ms=maxSpeedByTeam[team]||{topSpeed:0,topSpeedZone:"ST",stSpeed:0,i1Speed:0,i2Speed:0};
    Object.assign(bestByTeam[team],ms);
  });
  const data=Object.values(bestByTeam);
  if(!data.length){ctx.fillStyle=text2Col;ctx.font="13px sans-serif";ctx.textAlign="center";ctx.fillText("No valid laps with speed trap data",W/2,H/2);TVM_POINTS=[];return;}

  const PAD={top:40,right:40,bottom:50,left:60};
  const cw=W-PAD.left-PAD.right,ch=H-PAD.top-PAD.bottom;
  const meanSpeeds=data.map(d=>d.meanSpeed),topSpeeds=data.map(d=>d.topSpeed);

  // Detect outliers using IQR so one slow team doesn't compress the chart
  function iqrBounds(arr){
    const s=[...arr].sort((a,b)=>a-b);
    const q1=s[Math.floor(s.length*0.25)],q3=s[Math.floor(s.length*0.75)];
    const iqr=q3-q1;const factor=1.8;
    return{lo:q1-factor*iqr,hi:q3+factor*iqr};
  }
  const xBounds=iqrBounds(meanSpeeds),yBounds=iqrBounds(topSpeeds);
  const inlierData=data.filter(d=>d.meanSpeed>=xBounds.lo&&d.meanSpeed<=xBounds.hi&&d.topSpeed>=yBounds.lo&&d.topSpeed<=yBounds.hi);
  const outlierData=data.filter(d=>d.meanSpeed<xBounds.lo||d.meanSpeed>xBounds.hi||d.topSpeed<yBounds.lo||d.topSpeed>yBounds.hi);
  // Use inliers for axis range (fall back to all data if <2 inliers)
  const axisData=inlierData.length>=2?inlierData:data;
  const axisMean=axisData.map(d=>d.meanSpeed),axisTop=axisData.map(d=>d.topSpeed);
  let xMin=Math.floor(Math.min(...axisMean)-1),xMax=Math.ceil(Math.max(...axisMean)+1);
  let yMin=Math.floor(Math.min(...axisTop)-2),yMax=Math.ceil(Math.max(...axisTop)+2);
  xMin=Math.floor(xMin/2)*2;xMax=Math.ceil(xMax/2)*2;
  yMin=Math.floor(yMin/5)*5;yMax=Math.ceil(yMax/5)*5;

  function xPos(v){return PAD.left+(v-xMin)/(xMax-xMin)*cw}
  function yPos(v){return PAD.top+(yMax-v)/(yMax-yMin)*ch}

  // Grid
  ctx.strokeStyle=borderCol;ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
  for(let v=xMin;v<=xMax;v+=1){ctx.beginPath();ctx.moveTo(xPos(v),PAD.top);ctx.lineTo(xPos(v),H-PAD.bottom);ctx.stroke();}
  for(let v=yMin;v<=yMax;v+=5){ctx.beginPath();ctx.moveTo(PAD.left,yPos(v));ctx.lineTo(W-PAD.right,yPos(v));ctx.stroke();}
  ctx.setLineDash([]);

  // Diagonal reference lines
  ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=0.8;
  const xRange=xMax-xMin,yRange=yMax-yMin;
  const dataSlope=yRange/xRange;
  const numLines=9;const step=Math.sqrt(xRange*xRange+yRange*yRange)/numLines;
  for(let i=-numLines;i<=numLines*2;i++){
    const offset=yMin-dataSlope*xMin+i*step;
    const pts=[];
    const yAtL=dataSlope*xMin+offset;if(yAtL>=yMin&&yAtL<=yMax)pts.push({x:xMin,y:yAtL});
    const yAtR=dataSlope*xMax+offset;if(yAtR>=yMin&&yAtR<=yMax)pts.push({x:xMax,y:yAtR});
    const xAtB=(yMin-offset)/dataSlope;if(xAtB>xMin&&xAtB<xMax)pts.push({x:xAtB,y:yMin});
    const xAtT=(yMax-offset)/dataSlope;if(xAtT>xMin&&xAtT<xMax)pts.push({x:xAtT,y:yMax});
    if(pts.length>=2){ctx.beginPath();ctx.moveTo(xPos(pts[0].x),yPos(pts[0].y));ctx.lineTo(xPos(pts[1].x),yPos(pts[1].y));ctx.stroke();}
  }

  // Corner annotations
  ctx.font="bold 10px -apple-system,BlinkMacSystemFont,sans-serif";ctx.fillStyle="rgba(255,255,255,0.25)";
  ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText("Correlated with",PAD.left+4,PAD.top+4);ctx.fillText("Low Downforce",PAD.left+4,PAD.top+16);
  ctx.textAlign="right";ctx.fillText("Correlated with",W-PAD.right-4,PAD.top+4);ctx.fillText("High Efficiency",W-PAD.right-4,PAD.top+16);
  ctx.textAlign="left";ctx.textBaseline="bottom";ctx.fillText("Correlated with",PAD.left+4,H-PAD.bottom-16);ctx.fillText("Low Efficiency",PAD.left+4,H-PAD.bottom-4);
  ctx.textAlign="right";ctx.fillText("Correlated with",W-PAD.right-4,H-PAD.bottom-16);ctx.fillText("High Downforce",W-PAD.right-4,H-PAD.bottom-4);

  // Median lines
  const allMeanSorted=[...meanSpeeds].sort((a,b)=>a-b);
  const allTopSorted=[...topSpeeds].sort((a,b)=>a-b);
  const medianX=allMeanSorted[Math.floor(allMeanSorted.length/2)];
  const medianY=allTopSorted[Math.floor(allTopSorted.length/2)];
  ctx.strokeStyle="rgba(255,255,255,0.12)";ctx.lineWidth=1;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(xPos(medianX),PAD.top);ctx.lineTo(xPos(medianX),H-PAD.bottom);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD.left,yPos(medianY));ctx.lineTo(W-PAD.right,yPos(medianY));ctx.stroke();
  ctx.setLineDash([]);
  ctx.font="bold 9px -apple-system,BlinkMacSystemFont,sans-serif";ctx.fillStyle="rgba(255,255,255,0.2)";
  ctx.textAlign="center";ctx.textBaseline="top";
  ctx.fillText("Slow",xPos(xMin+(medianX-xMin)/2),yPos(medianY)+4);
  ctx.fillText("Fast",xPos(medianX+(xMax-medianX)/2),yPos(medianY)+4);
  ctx.textAlign="left";ctx.textBaseline="middle";
  ctx.fillText("Low Drag",xPos(medianX)+4,yPos(medianY+(yMax-medianY)/2));
  ctx.fillText("High Drag",xPos(medianX)+4,yPos(yMin+(medianY-yMin)/2));

  // Axis labels
  ctx.fillStyle=text2Col;ctx.font="bold 11px -apple-system,BlinkMacSystemFont,sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";
  for(let v=xMin;v<=xMax;v+=1){const x=xPos(v);ctx.fillText(v.toFixed(0),x,H-PAD.bottom+16);}
  ctx.textAlign="right";ctx.textBaseline="middle";
  for(let v=yMin;v<=yMax;v+=5){const y=yPos(v);ctx.fillText(v.toFixed(0),PAD.left-8,y);}

  ctx.fillStyle=textCol;ctx.font="bold 12px -apple-system,BlinkMacSystemFont,sans-serif";
  ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText("Mean Speed (km/h)",PAD.left+cw/2,H-4);
  ctx.save();ctx.translate(14,PAD.top+ch/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Top Speed (km/h)",0,0);ctx.restore();

  // Plot team dots with glow — inliers only
  TVM_POINTS=[];
  const inlierMeanSpeeds=inlierData.map(d=>d.meanSpeed),inlierTopSpeeds=inlierData.map(d=>d.topSpeed);
  const topRange=inlierTopSpeeds.length?Math.max(...inlierTopSpeeds)-Math.min(...inlierTopSpeeds):1;
  const meanRange2=inlierMeanSpeeds.length?Math.max(...inlierMeanSpeeds)-Math.min(...inlierMeanSpeeds):1;
  const plotData=inlierData.length>=2?inlierData:data;
  plotData.forEach(dd=>{
    const x=xPos(dd.meanSpeed),y=yPos(dd.topSpeed);
    const col=teamColor(dd.team)||"#888";
    ctx.shadowColor=col;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle="rgba(255,255,255,0.3)";ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=col;ctx.font="bold 10px -apple-system,BlinkMacSystemFont,sans-serif";
    ctx.textAlign="center";ctx.textBaseline="bottom";
    const shortName=dd.team.replace(" F1 Team","").replace(" Racing","");
    ctx.fillText(shortName,x,y-10);
    TVM_POINTS.push({x,y,team:dd.team,acronym:dd.acronym,meanSpeed:dd.meanSpeed,topSpeed:dd.topSpeed,topSpeedZone:dd.topSpeedZone,stSpeed:dd.stSpeed,i1Speed:dd.i1Speed,i2Speed:dd.i2Speed,lapDuration:dd.lap_duration,compound:dd.compound,color:col});

    // Contextual annotations for inliers
    let annotation="";
    if(dd.topSpeed>medianY+topRange*0.35&&dd.meanSpeed<medianX)annotation="Strongest Deployment,\nyet Lacking Performance";
    else if(dd.meanSpeed<=Math.min(...inlierMeanSpeeds)+meanRange2*0.1&&dd.topSpeed<medianY)annotation="Engine in Safe-Mode\nLow Efficiency";
    else if(dd.meanSpeed>=Math.max(...inlierMeanSpeeds)-meanRange2*0.15&&dd.topSpeed>=medianY-topRange*0.15&&dd.topSpeed<=medianY+topRange*0.15)annotation="Moderate Top Speeds\nfor Best Laptimes";
    if(annotation){
      ctx.setLineDash([4,3]);ctx.strokeStyle=col;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,16,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      ctx.font="bold 9px -apple-system,BlinkMacSystemFont,sans-serif";
      const lines=annotation.split("\n");const lineH=12;
      const boxW=Math.max(...lines.map(l=>ctx.measureText(l).width))+12;const boxH=lines.length*lineH+8;
      const offX=x>W/2?-boxW-20:20,offY=y>H/2?-boxH-10:10;
      const bx=x+offX,by=y+offY;
      ctx.fillStyle="rgba(0,0,0,0.7)";ctx.strokeStyle=col;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+4,by);ctx.lineTo(bx+boxW-4,by);ctx.arcTo(bx+boxW,by,bx+boxW,by+4,4);ctx.lineTo(bx+boxW,by+boxH-4);ctx.arcTo(bx+boxW,by+boxH,bx+boxW-4,by+boxH,4);ctx.lineTo(bx+4,by+boxH);ctx.arcTo(bx,by+boxH,bx,by+boxH-4,4);ctx.lineTo(bx,by+4);ctx.arcTo(bx,by,bx+4,by,4);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(bx+(offX>0?0:boxW),by+boxH/2);ctx.stroke();
      ctx.fillStyle=col;ctx.font="bold 9px -apple-system,BlinkMacSystemFont,sans-serif";ctx.textAlign="left";ctx.textBaseline="top";
      lines.forEach((line,i)=>{ctx.fillText(line,bx+6,by+4+i*lineH);});
    }
  });

  // Render outliers as edge-pinned badges (outside axis range)
  if(outlierData.length>0&&inlierData.length>=2){
    let outlierY=PAD.top+8;
    outlierData.forEach(dd=>{
      const col=teamColor(dd.team)||"#888";
      const shortName=dd.team.replace(" F1 Team","").replace(" Racing","");
      // Determine edge position based on where the outlier sits
      let edgeX,edgeY;
      const clampedMean=Math.max(xMin,Math.min(xMax,dd.meanSpeed));
      const clampedTop=Math.max(yMin,Math.min(yMax,dd.topSpeed));
      edgeX=xPos(clampedMean);edgeY=yPos(clampedTop);
      // Clamp to chart area edges
      edgeX=Math.max(PAD.left+30,Math.min(W-PAD.right-30,edgeX));
      edgeY=Math.max(PAD.top+10,Math.min(H-PAD.bottom-10,edgeY));

      // Draw a small arrow + badge at the edge
      const dirLabel=dd.meanSpeed<xMin?"◀ ":"";
      const label=`${dirLabel}${shortName}: ${dd.meanSpeed.toFixed(1)} / ${dd.topSpeed.toFixed(0)} km/h`;
      ctx.font="bold 9px -apple-system,BlinkMacSystemFont,sans-serif";
      const tw=ctx.measureText(label).width;
      const bx=PAD.left+6,by=outlierY;
      const bw=tw+16,bh=20;
      // Badge background
      ctx.fillStyle="rgba(0,0,0,0.8)";ctx.strokeStyle=col;ctx.lineWidth=1.5;
      ctx.setLineDash([3,2]);
      ctx.beginPath();ctx.moveTo(bx+4,by);ctx.lineTo(bx+bw-4,by);ctx.arcTo(bx+bw,by,bx+bw,by+4,4);ctx.lineTo(bx+bw,by+bh-4);ctx.arcTo(bx+bw,by+bh,bx+bw-4,by+bh,4);ctx.lineTo(bx+4,by+bh);ctx.arcTo(bx,by+bh,bx,by+bh-4,4);ctx.lineTo(bx,by+4);ctx.arcTo(bx,by,bx+4,by,4);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.setLineDash([]);
      // Small team dot
      ctx.beginPath();ctx.arc(bx+8,by+bh/2,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      // Label text
      ctx.fillStyle=col;ctx.textAlign="left";ctx.textBaseline="middle";
      ctx.fillText(label,bx+15,by+bh/2);
      // Add to TVM_POINTS for tooltip
      TVM_POINTS.push({x:bx+bw/2,y:by+bh/2,team:dd.team,acronym:dd.acronym,meanSpeed:dd.meanSpeed,topSpeed:dd.topSpeed,topSpeedZone:dd.topSpeedZone,stSpeed:dd.stSpeed,i1Speed:dd.i1Speed,i2Speed:dd.i2Speed,lapDuration:dd.lap_duration,compound:dd.compound,color:col,isOutlier:true});
      outlierY+=bh+4;
    });
  }
}

function initTvmEvents(){
  const cv=document.getElementById("tvm-canvas");
  if(!cv)return;
  cv.addEventListener("mousemove",function(e){
    const tt=document.getElementById("tvm-tooltip");if(!tt)return;
    const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
    let best=null,bestD=30;
    TVM_POINTS.forEach(p=>{const dist=Math.hypot(p.x-mx,p.y-my);if(dist<bestD){bestD=dist;best=p;}});
    if(best){
      tt.style.display="block";tt.style.top="4px";tt.style.right="4px";tt.style.left="auto";
      const zoneTag=best.topSpeedZone?` (${best.topSpeedZone})`:"";
      const spdBreak=`I1: ${best.i1Speed||"—"} · I2: ${best.i2Speed||"—"} · ST: ${best.stSpeed||"—"}`;
      tt.innerHTML=`<div style="color:${best.color};font-weight:900;font-size:12px">${esc(best.team)}${best.isOutlier?' <span style="font-size:9px;opacity:.7">(outlier)</span>':''}</div>`
        +`<div>Driver: ${esc(best.acronym)}</div><div>Lap Time: ${fmtTime(best.lapDuration)}</div>`
        +`<div>Mean Speed: ${best.meanSpeed.toFixed(1)} km/h</div><div>Top Speed: ${best.topSpeed} km/h${zoneTag}</div>`
        +`<div style="font-size:10px;opacity:.8">${spdBreak}</div>`
        +`<div>Compound: ${best.compound||"?"}</div>`;
    }else{tt.style.display="none";}
  });
  cv.addEventListener("mouseleave",()=>{const tt=document.getElementById("tvm-tooltip");if(tt)tt.style.display="none";});
}

/* ══════════════════════════════════════════════════════════════════════════════
   DRIVING PHASES CHART (Braking / Neutral / Partial / Max Throttle)
   ══════════════════════════════════════════════════════════════════════════════ */
let _drivingPhasesLoaded=false;

async function loadDrivingPhases(){
  const wrap=document.getElementById("driving-phases-wrap");
  if(!wrap)return;
  if(_drivingPhasesLoaded){renderDrivingPhases();return;}
  
  wrap.innerHTML='<div style="padding:12px;color:var(--text2);font-size:11px"><div class="ai-spinner" style="width:14px;height:14px;display:inline-block;margin-right:6px"></div>Fetching telemetry for top drivers\u2019 best laps\u2026</div>';
  
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const laps=d.laps||[];
  const sk=STATE.activeSession?.session_key;
  if(!sk){wrap.innerHTML='<div style="color:var(--text2);padding:8px">No session key</div>';return;}
  
  // Find best lap per driver (with timestamps)
  const bestByDriver={};
  laps.forEach(l=>{
    if(!l.lap_duration||l.lap_duration<=0||l.lap_duration>300)return;
    const dn=l.driver_number;
    if(!bestByDriver[dn]||l.lap_duration<bestByDriver[dn].lap_duration){
      bestByDriver[dn]=l;
    }
  });
  
  // Sort by lap time, take top 10
  const topDrivers=Object.entries(bestByDriver)
    .sort((a,b)=>a[1].lap_duration-b[1].lap_duration)
    .slice(0,10);
  
  const phases=[];
  for(const [dn,lap] of topDrivers){
    const ts=findLapTimestamps(Number(dn),lap.lap_number);
    if(!ts)continue;
    try{
      const r=await fetch(`/api/test_telemetry/car_data?session_key=${sk}&driver_number=${dn}&lap_start=${encodeURIComponent(ts.start)}&lap_end=${encodeURIComponent(ts.end)}`);
      const carData=await r.json();
      if(!Array.isArray(carData)||carData.length<20)continue;
      
      let braking=0,neutral=0,partial=0,maxThrottle=0;
      carData.forEach(p=>{
        const thr=p.throttle||0;
        const brk=p.brake||0;
        if(brk>0){braking++;}
        else if(thr>=95){maxThrottle++;}
        else if(thr>5){partial++;}
        else{neutral++;}
      });
      const total=carData.length;
      const drv=drivers[dn]||{};
      phases.push({
        dn:Number(dn),
        acronym:drv.acronym||"#"+dn,
        team:drv.team||"Unknown",
        lapTime:lap.lap_duration,
        braking:braking/total*100,
        neutral:neutral/total*100,
        partial:partial/total*100,
        maxThrottle:maxThrottle/total*100
      });
    }catch(e){console.warn("Driving phases fetch error for",dn,e);}
  }
  
  if(!phases.length){wrap.innerHTML='<div style="color:var(--text2);padding:8px">Could not compute driving phases</div>';return;}
  STATE._drivingPhases=phases;
  _drivingPhasesLoaded=true;
  renderDrivingPhases();
}

function renderDrivingPhases(){
  const wrap=document.getElementById("driving-phases-wrap");
  if(!wrap||!STATE._drivingPhases)return;
  const phases=STATE._drivingPhases;
  
  const barH=22,gap=3,padL=70,padR=50;
  const H=phases.length*(barH+gap)+20;
  
  let html=`<div style="position:relative;height:${H}px;overflow:hidden">`;
  
  phases.forEach((p,i)=>{
    const y=i*(barH+gap)+4;
    const col=teamColor(p.team)||"#888";
    const brW=p.braking,neW=p.neutral,paW=p.partial,mxW=p.maxThrottle;
    
    html+=`<div style="position:absolute;left:0;top:${y}px;width:${padL-4}px;text-align:right;font-size:10px;font-weight:700;color:${col};line-height:${barH}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${p.acronym} - ${fmtTime(p.lapTime)}">${p.acronym}</div>`;
    html+=`<div style="position:absolute;left:${padL}px;top:${y}px;right:${padR}px;height:${barH}px;display:flex;border-radius:3px;overflow:hidden">`;
    html+=`<div style="width:${brW}%;background:#e74c3c;height:100%" title="Braking: ${brW.toFixed(1)}%"></div>`;
    html+=`<div style="width:${neW}%;background:#555;height:100%" title="Neutral: ${neW.toFixed(1)}%"></div>`;
    html+=`<div style="width:${paW}%;background:#f1c40f;height:100%" title="Partial: ${paW.toFixed(1)}%"></div>`;
    html+=`<div style="width:${mxW}%;background:#2ecc71;height:100%" title="Max Throttle: ${mxW.toFixed(1)}%"></div>`;
    html+=`</div>`;
    html+=`<div style="position:absolute;right:0;top:${y}px;width:${padR-4}px;text-align:left;font-size:9px;color:var(--text2);line-height:${barH}px">${mxW.toFixed(0)}% WOT</div>`;
  });
  
  html+=`</div>`;
  wrap.innerHTML=html;
}

async function xsLoadMeetings(){
  const year=document.getElementById("xs-year").value;
  const sel=document.getElementById("xs-meeting");
  sel.innerHTML='<option value="">Loading...</option>';
  
  const ck="m_"+year;
  if(!_xsCache.meetings[ck]){
    try{
      const r=await fetch(`/api/season/meetings?year=${year}`);
      _xsCache.meetings[ck]=await r.json();
    }catch(e){sel.innerHTML='<option value="">Error loading</option>';return;}
  }
  const meetings=_xsCache.meetings[ck];
  if(!meetings.length){sel.innerHTML='<option value="">No events</option>';return;}
  
  // Prioritize current circuit
  const currentCircuit=(STATE.activeMeeting?.circuit_short_name||"").toLowerCase();
  const sorted=[...meetings].sort((a,b)=>{
    const aMatch=(a.circuit_short_name||"").toLowerCase()===currentCircuit?0:1;
    const bMatch=(b.circuit_short_name||"").toLowerCase()===currentCircuit?0:1;
    return aMatch-bMatch;
  });
  
  sel.innerHTML=sorted.map(m=>{
    const isSame=(m.circuit_short_name||"").toLowerCase()===currentCircuit;
    return `<option value="${m.meeting_key}"${isSame?" selected":""}>${m.meeting_name||m.circuit_short_name}${isSame?" ★":""}</option>`;
  }).join("");
  
  xsLoadSessions();
}

async function xsLoadSessions(){
  const mk=document.getElementById("xs-meeting").value;
  const sel=document.getElementById("xs-session");
  if(!mk){sel.innerHTML='<option value="">Select event</option>';return;}
  
  sel.innerHTML='<option value="">Loading...</option>';
  const ck="s_"+mk;
  if(!_xsCache.sessions[ck]){
    try{
      const r=await fetch(`/api/season/sessions?meeting_key=${mk}`);
      _xsCache.sessions[ck]=await r.json();

async function xsLoadLaps(){
  const sk=document.getElementById("xs-session").value;
  const area=document.getElementById("xs-laps-area");
  if(!sk){area.innerHTML='<p style="color:var(--text2);font-size:11px">Select a session.</p>';return;}
  
  area.innerHTML='<div style="padding:8px;color:var(--text2);font-size:11px"><div class="ai-spinner" style="width:14px;height:14px;display:inline-block;margin-right:6px"></div>Loading session data...</div>';
  
  const ck="l_"+sk;
  if(!_xsCache.laps[ck]){
    try{
      const r=await fetch(`/api/season/session_data?session_key=${sk}`);
      _xsCache.laps[ck]=await r.json();
    }catch(e){area.innerHTML='<p style="color:var(--accent)">Error loading laps</p>';return;}
  }
  const data=_xsCache.laps[ck];
  const drivers=data.drivers||{};
  const laps=(data.laps||[]).filter(l=>l.lap_duration&&l.lap_duration>0&&l.lap_duration<300);
  
  if(!laps.length){area.innerHTML='<p style="color:var(--text2);font-size:11px">No valid laps in this session.</p>';return;}
  
  // Best lap per driver
  const bestByDrv={};
  laps.forEach(l=>{
    const dn=l.driver_number;
    if(!bestByDrv[dn]||l.lap_duration<bestByDrv[dn].lap_duration)bestByDrv[dn]=l;
  });
  const sorted=Object.values(bestByDrv).sort((a,b)=>a.lap_duration-b.lap_duration);
  
  let html='<div style="font-size:10px;color:var(--text2);margin-bottom:6px">Click a lap to set as D2 comparison target:</div>';
  html+='<table style="width:100%;font-size:11px;border-collapse:collapse">';
  html+='<thead><tr style="color:var(--text2);border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px">Driver</th><th>Lap</th><th>Time</th><th>Compound</th><th></th></tr></thead><tbody>';
  
  sorted.forEach((l,i)=>{
    const drv=drivers[l.driver_number]||{};
    const col=teamColor(drv.team)||"#888";
    const gap=i>0?`+${(l.lap_duration-sorted[0].lap_duration).toFixed(3)}`:"Leader";
    html+=`<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="xsSelectLap(${sk},${l.driver_number},${l.lap_number},${l.lap_duration},'${esc(drv.acronym||"")}','${esc(drv.team||"")}')">
      <td style="padding:4px;color:${col};font-weight:700">${esc(drv.acronym||"#"+l.driver_number)}<span style="font-weight:400;color:var(--text2);margin-left:4px;font-size:9px">${esc(drv.team_name||drv.team||"")}</span></td>
      <td style="text-align:center">L${l.lap_number}</td>
      <td style="text-align:center;font-family:monospace">${fmtTime(l.lap_duration)}<span style="margin-left:6px;color:var(--text2);font-size:9px">${gap}</span></td>
      <td style="text-align:center"><span class="compound-badge ${l.compound||""}">${l.compound||"?"}</span></td>
      <td style="text-align:center"><button class="ctrl-btn" style="font-size:9px;padding:2px 8px">Select</button></td>
    </tr>`;
  });
  html+='</tbody></table>';
  area.innerHTML=html;
}

function xsSelectLap(sessionKey,dn,lapNum,lapTime,acronym,team){
  // Find lap timestamps from the cross-session data
  const ck="l_"+sessionKey;
  const data=_xsCache.laps[ck];
  if(!data){alert("Session data not loaded");return;}
  
  const laps=data.laps||[];
  const lap=laps.find(l=>l.driver_number===dn&&l.lap_number===lapNum);
  if(!lap||!lap.date_start){alert("Cannot find lap timestamps");return;}
  
  const startMs=new Date(lap.date_start).getTime();
  const dur=(lap.lap_duration||90)*1000;
  const end=new Date(startMs+dur).toISOString();
  
  // Set as D2 slot with cross-session info
  STATE.telemSlots[1]={
    dn,lapNum,lapTime,data:null,
    crossSession:true,
    sessionKey:sessionKey,
    lapStart:lap.date_start,
    lapEnd:end,
    acronym:acronym,
    team:team
  };
  
  closeXSessionPicker();
  updateTelemSlotUI();
  loadAndDrawTelem();
}

function initMdClickExclude(){
  const cv=document.getElementById("multidriver-canvas");
  if(!cv||cv._mdExclEvt)return;
  cv._mdExclEvt=true;
  cv.addEventListener("contextmenu",function(e){
    e.preventDefault();
    if(!cv._allLaps||!cv._xFL||!cv._yFT)return;
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let closest=null,closeDist=Infinity;
    cv._allLaps.forEach(l=>{
      const x=cv._xFL(l.lap_number),y=cv._yFT(l.lap_duration);
      const dd=Math.hypot(mx-x,my-y);
      if(dd<closeDist&&dd<18){closeDist=dd;closest=l;}

  });

function drawMultiDriverChart(){
  const canvas=document.getElementById("multidriver-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=300;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);
  const cs=getComputedStyle(document.documentElement);
  const textColor=cs.getPropertyValue("--text2").trim();
  const gridColor=cs.getPropertyValue("--border").trim();
  const stintsEl=document.getElementById("multidriver-stints");

  if(STATE.multiDrivers.size===0){
    ctx.fillStyle=textColor;ctx.font="12px sans-serif";ctx.textAlign="center";
    ctx.fillText("Select drivers above to overlay their lap-by-lap pace",W/2,H/2);
    const legendEl=document.getElementById("multidriver-legend");
    if(legendEl)legendEl.innerHTML="";
    if(stintsEl)stintsEl.innerHTML="";
    return;
  }

  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration>0&&STATE.multiDrivers.has(l.driver_number));
  const stints=d.stints||[];
  if(!allLaps.length){ctx.fillStyle=textColor;ctx.font="12px sans-serif";ctx.textAlign="center";ctx.fillText("No valid laps for selected drivers",W/2,H/2);if(stintsEl)stintsEl.innerHTML="";return;}

  // Get real race control flags from API data
  const rcFlags=getRaceControlFlags();
  const hasRcData=Object.keys(rcFlags).length>0;

  // Enrich with compound + stint info + race control flags
  const enriched=allLaps.map(l=>{
    const dStints=stints.filter(s=>s.driver_number===l.driver_number);
    let compound="UNKNOWN",stintNum=0;
    for(const st of dStints){
      if(l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end){compound=(st.compound||"UNKNOWN").toUpperCase();stintNum=st.stint_number||0;break;}
    }
    return{...l,compound,stintNum};
  });

  // Compute median for fallback slow detection + outlier threshold
  const cleanTimes=enriched.map(l=>l.lap_duration).sort((a,b)=>a-b);
  const median=cleanTimes[Math.floor(cleanTimes.length/2)];
  const slowThreshold=median*1.10;
  const outlierThreshold=median*1.07;

  // Flag laps using real race control data + fallback heuristics
  enriched.forEach(l=>{
    const lapFlags=rcFlags[l.lap_number];
    l._rcFlags=lapFlags||null; // Set of "SC"|"VSC"|"YELLOW"|"RED"
    l._hasSC=lapFlags?lapFlags.has("SC"):false;
    l._hasVSC=lapFlags?lapFlags.has("VSC"):false;
    l._hasYellow=lapFlags?lapFlags.has("YELLOW"):false;
    l._hasRed=lapFlags?lapFlags.has("RED"):false;
    l._isFlagged=(l._hasSC||l._hasVSC||l._hasYellow||l._hasRed);
    // Fallback: if no RC data, use lap time heuristic
    l._isSlowByTime=(!hasRcData&&l.lap_duration>=slowThreshold);
    l._isSlow=l._isFlagged||l._isSlowByTime;
    l._isOutlier=l.lap_duration>=outlierThreshold;
    l._isPitOut=l.is_pit_out_lap||false;
    l._isExcluded=STATE.mdExcludedLaps.has(l.driver_number+"_"+l.lap_number);
  });

  // Group by driver (ALL laps)
  const byDriver={};
  enriched.forEach(l=>{
    if(!byDriver[l.driver_number])byDriver[l.driver_number]=[];
    byDriver[l.driver_number].push(l);
  });
  Object.values(byDriver).forEach(arr=>arr.sort((a,b)=>a.lap_number-b.lap_number));

  // Toggle states
  const showFlagged=STATE.mdShowFlagged;
  const showPitOut=STATE.mdShowPitOut;
  const showSlow=STATE.mdShowSlow;
  const hlDriver=STATE.mdHighlight; // driver_number or null

  const ml=55,mr=16,mt=14,mb=30;
  const pw=W-ml-mr,ph=H-mt-mb;

  // Determine which laps are visible (for Y-axis range)
  const visibleLaps=enriched.filter(l=>{
    if(l._isExcluded)return false;
    if(l._isFlagged&&!showFlagged)return false;
    if(l._isSlowByTime&&!showSlow)return false;
    if(l._isPitOut&&!showPitOut)return false;
    return true;
  });
  const rangeLaps=visibleLaps.length?visibleLaps:enriched;

  // Ranges
  const lapNums=enriched.map(l=>l.lap_number);
  const minLap=Math.min(...lapNums),maxLap=Math.max(...lapNums);
  const rangeLap=maxLap-minLap||1;
  const sortedTimes=rangeLaps.map(l=>l.lap_duration).sort((a,b)=>a-b);
  const p95=sortedTimes[Math.floor(sortedTimes.length*0.95)]||sortedTimes[sortedTimes.length-1];
  const minT=Math.min(...sortedTimes);
  const maxTDisplay=Math.max(p95*1.02,minT*1.15);
  const rangeT=maxTDisplay-minT||1;
  const tPad=rangeT*0.04;

  function xFL(ln){return ml+pw*((ln-minLap)/rangeLap)}
  function yFT(t){const v=mt+ph*(1-((t-(minT-tPad))/((rangeT+2*tPad)||1)));return Math.max(mt-5,Math.min(mt+ph+5,v));}

  // Grid
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.font="9px sans-serif";ctx.fillStyle=textColor;
  for(let i=0;i<=4;i++){
    const tv=minT-tPad+(rangeT+2*tPad)*(1-i/4);const y=mt+ph*i/4;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmtTime(tv),ml-4,y+3);
  }
  const xSteps=Math.min(rangeLap,14);
  for(let i=0;i<=xSteps;i++){
    const ln=Math.round(minLap+rangeLap*i/xSteps);
    const x=xFL(ln);ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();
    ctx.textAlign="center";ctx.fillText("L"+ln,x,H-6);
  }
  ctx.textAlign="center";ctx.font="bold 9px sans-serif";ctx.fillText("LAP NUMBER",ml+pw/2,H-16);
  ctx.save();ctx.translate(8,mt+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";ctx.fillText("LAP TIME",0,0);ctx.restore();

  // Draw flag zone bands (only if showFlagged)
  const bandW=pw/rangeLap;
  if(showFlagged){
    for(let ln=minLap;ln<=maxLap;ln++){
      const lf=rcFlags[ln];if(!lf)continue;
      const x=xFL(ln)-bandW/2;
      let bandColor=null,bandLabel=null;
      if(lf.has("RED")){bandColor="rgba(255,60,60,0.10)";bandLabel="RED";}
      else if(lf.has("SC")){bandColor="rgba(255,200,0,0.08)";bandLabel="SC";}
      else if(lf.has("VSC")){bandColor="rgba(255,160,0,0.08)";bandLabel="VSC";}
      else if(lf.has("YELLOW")){bandColor="rgba(255,255,0,0.06)";bandLabel="YF";}
      if(bandColor){
        ctx.fillStyle=bandColor;ctx.fillRect(x,mt,bandW,ph);
        ctx.font="bold 7px sans-serif";ctx.textAlign="center";
        ctx.fillStyle=bandLabel==="RED"?"rgba(255,60,60,0.5)":bandLabel==="SC"?"rgba(255,200,0,0.5)":bandLabel==="VSC"?"rgba(255,160,0,0.5)":"rgba(255,255,0,0.4)";
        ctx.fillText(bandLabel,xFL(ln),mt+8);
      }
    }
  }

  // Fallback slow bands (only if showSlow and no RC data)
  if(showSlow&&!hasRcData){
    const lapSlowCount={};
    enriched.forEach(l=>{if(l._isSlowByTime){lapSlowCount[l.lap_number]=(lapSlowCount[l.lap_number]||0)+1;}});
    const driverCount=STATE.multiDrivers.size;
    for(const [lnStr,cnt] of Object.entries(lapSlowCount)){
      if(cnt>=Math.max(1,driverCount*0.5)){
        const ln=parseInt(lnStr);
        const x=xFL(ln)-bandW/2;
        ctx.fillStyle="rgba(255,200,0,0.06)";ctx.fillRect(x,mt,bandW,ph);
        ctx.font="bold 7px sans-serif";ctx.fillStyle="rgba(255,200,0,0.4)";ctx.textAlign="center";
        ctx.fillText("SLOW?",xFL(ln),mt+8);
      }
    }
  }

  // Draw lines + compound-colored dots per driver
  // Two passes: first dimmed drivers, then highlighted driver on top
  let lh="";
  const stintSummary=[];
  const driverKeys=Object.keys(byDriver);
  const drawOrder=hlDriver?driverKeys.filter(k=>parseInt(k)!==hlDriver).concat(driverKeys.filter(k=>parseInt(k)===hlDriver)):driverKeys;

  for(const dnStr of drawOrder){
    const dn=parseInt(dnStr);
    const dLaps=byDriver[dnStr];
    const drv=drivers[dn]||{};
    const color=teamColor(drv.team||"");
    const isDimmed=hlDriver!==null&&dn!==hlDriver;
    const baseAlpha=isDimmed?0.12:1;

    // Draw connecting line (only clean, non-excluded laps)
    const cleanLaps=dLaps.filter(l=>!l._isSlow&&!l._isPitOut&&!l._isExcluded);
    if(cleanLaps.length>1){
      ctx.strokeStyle=color;ctx.lineWidth=isDimmed?1:1.8;ctx.globalAlpha=isDimmed?0.10:0.7;ctx.beginPath();
      cleanLaps.forEach((l,i)=>{const x=xFL(l.lap_number),y=yFT(l.lap_duration);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();ctx.globalAlpha=1;
    }

    // Draw dots
    dLaps.forEach(l=>{
      const x=xFL(l.lap_number),y=yFT(l.lap_duration);
      const compCol=resolveColor(compoundColor(l.compound));
      ctx.globalAlpha=baseAlpha;

      // Manually excluded — dimmed strikethrough dot
      if(l._isExcluded){
        ctx.globalAlpha=isDimmed?0.06:0.25;
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.stroke();
        ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x+4,y);ctx.stroke();
        ctx.globalAlpha=1;
      }
      // Flagged laps
      else if(l._isFlagged&&showFlagged){
        if(l._hasRed){
          ctx.strokeStyle="rgba(255,60,60,0.8)";ctx.lineWidth=2;
          ctx.beginPath();ctx.moveTo(x-4,y-4);ctx.lineTo(x+4,y+4);ctx.moveTo(x+4,y-4);ctx.lineTo(x-4,y+4);ctx.stroke();
        }else if(l._hasSC){
          ctx.strokeStyle="rgba(255,200,0,0.8)";ctx.lineWidth=1.8;
          ctx.beginPath();ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();
        }else if(l._hasVSC){
          ctx.fillStyle="rgba(255,160,0,0.7)";ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x+4,y);ctx.lineTo(x,y+4);ctx.lineTo(x-4,y);ctx.closePath();ctx.fill();
        }else if(l._hasYellow){
          ctx.fillStyle="rgba(255,255,0,0.6)";ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x+4,y+3);ctx.lineTo(x-4,y+3);ctx.closePath();ctx.fill();
        }
      }
      // Heuristic slow
      else if(l._isSlowByTime&&showSlow){
        ctx.strokeStyle="rgba(255,200,0,0.4)";ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();
      }
      // Pit out
      else if(l._isPitOut&&showPitOut){
        ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x+4,y+3);ctx.lineTo(x-4,y+3);ctx.closePath();ctx.stroke();
      }
      // Normal lap (or hidden special lap → draw as normal dot)
      else if(!l._isFlagged&&!l._isSlowByTime&&!l._isPitOut){
        const r=isDimmed?2.5:3.5;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=compCol;ctx.fill();
        ctx.strokeStyle=color;ctx.lineWidth=isDimmed?0.5:1;ctx.stroke();
      }
      // Special lap with toggle off → skip (don't draw)

      ctx.globalAlpha=1;
    });

    lh+=`<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${color}"></span>${esc(drv.acronym||"#"+dn)}</span>`;

    // Build stint summaries (exclude flagged, pit-out, excluded, and outlier laps)
    const dStints=stints.filter(s=>s.driver_number===dn);
    dStints.forEach(st=>{
      const sLaps=dLaps.filter(l=>l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end&&!l._isSlow&&!l._isPitOut&&!l._isExcluded&&l.lap_duration<outlierThreshold);
      if(sLaps.length<2)return;
      const times2=sLaps.map(l=>l.lap_duration);
      const avg=times2.reduce((a,b)=>a+b,0)/times2.length;
      const xs=sLaps.map(l=>l.lap_number-sLaps[0].lap_number);
      const ys=times2;const n=xs.length;
      const sumX=xs.reduce((a,b)=>a+b,0),sumY=ys.reduce((a,b)=>a+b,0);
      const sumXY=xs.reduce((a,v,i)=>a+v*ys[i],0),sumXX=xs.reduce((a,v)=>a+v*v,0);
      const slope=(n*sumXY-sumX*sumY)/(n*sumXX-sumX*sumX||1);
      stintSummary.push({dn,acronym:drv.acronym||"#"+dn,team:drv.team||"",compound:(st.compound||"?").toUpperCase(),
        stintNum:st.stint_number||"?",laps:sLaps.length,totalLaps:(st.lap_end-st.lap_start+1),
        avg,slope,min:Math.min(...times2),max:Math.max(...times2),color});
    });
  }

  // Legend with flag key
  const legendEl=document.getElementById("multidriver-legend");
  if(legendEl){
    if(hasRcData&&showFlagged){
      lh+='<span class="chart-legend-item" style="opacity:.6"><span style="color:#ffc800;font-weight:700;font-size:9px;margin-right:3px">x</span>SC</span>';
      lh+='<span class="chart-legend-item" style="opacity:.6"><span style="color:#ffa000;font-weight:700;font-size:9px;margin-right:3px">&#9670;</span>VSC</span>';
      lh+='<span class="chart-legend-item" style="opacity:.6"><span style="color:#e6e600;font-weight:700;font-size:9px;margin-right:3px">&#9650;</span>YF</span>';
      lh+='<span class="chart-legend-item" style="opacity:.6"><span style="color:#ff4040;font-weight:700;font-size:9px;margin-right:3px">x</span>RED</span>';
    }
    if(showPitOut)lh+='<span class="chart-legend-item" style="opacity:.5"><span style="color:rgba(255,255,255,.4);font-size:9px;margin-right:3px">&#9651;</span>Pit-Out</span>';
    legendEl.innerHTML=lh;
  }

  // Store for tooltip
  canvas._allLaps=enriched;canvas._drivers=drivers;canvas._xFL=xFL;canvas._yFT=yFT;

  // Stint summary table
  if(stintsEl&&stintSummary.length){
    stintSummary.sort((a,b)=>a.avg-b.avg);
    let th='<div style="font-weight:700;font-size:11px;color:var(--text);margin-bottom:4px">Stint Analysis (clean laps only, excl. flagged/pit-out)</div>';
    th+='<table class="md-stint-table"><thead><tr><th>Driver</th><th>Stint</th><th>Compound</th><th>Laps</th><th>Avg Pace</th><th>Deg Rate</th><th>Min</th><th>Max</th></tr></thead><tbody>';
    stintSummary.forEach(s=>{
      const degStr=s.slope>=0?"+"+s.slope.toFixed(3):s.slope.toFixed(3);
      const compCol=resolveColor(compoundColor(s.compound));
      th+=`<tr><td style="color:${s.color};font-weight:700">${esc(s.acronym)}</td><td>S${s.stintNum}</td>`;
      th+=`<td><span style="color:${compCol};font-weight:600">${s.compound}</span></td>`;
      th+=`<td>${s.laps}/${s.totalLaps}</td><td style="font-weight:700;font-variant-numeric:tabular-nums">${fmtTime(s.avg)}</td>`;
      th+=`<td style="color:${s.slope>0.05?"var(--accent)":s.slope<-0.01?"var(--green)":"var(--text2)"};font-weight:600">${degStr} s/lap</td>`;
      th+=`<td>${fmtTime(s.min)}</td><td>${fmtTime(s.max)}</td></tr>`;
    });
    th+='</tbody></table>';
    stintsEl.innerHTML=th;
  }else if(stintsEl){stintsEl.innerHTML="";}
}

  }else{tip.style.display="none";}

/* ══════════════════════════════════════════════════════════════════════════════
   LASSO DEGRADATION ANALYSIS (enhanced lasso info)
   ══════════════════════════════════════════════════════════════════════════════ */
function computeLassoDeg(laps){
  if(!laps||laps.length<3)return null;
  // Group selected laps by driver and sort by lap_number
  const byDrv={};
  laps.forEach(l=>{
    if(!byDrv[l.driver_number])byDrv[l.driver_number]=[];
    byDrv[l.driver_number].push(l);
  });
  const results=[];
  const drivers=(STATE.sessionData||{}).drivers||{};
  for(const [dnStr,dLaps] of Object.entries(byDrv)){
    if(dLaps.length<2)continue;
    dLaps.sort((a,b)=>a.lap_number-b.lap_number);
    const xs=dLaps.map(l=>l.lap_number-dLaps[0].lap_number);
    const ys=dLaps.map(l=>l.lap_duration);
    const n=xs.length;
    const sumX=xs.reduce((a,b)=>a+b,0),sumY=ys.reduce((a,b)=>a+b,0);
    const sumXY=xs.reduce((a,v,i)=>a+v*ys[i],0);
    const sumXX=xs.reduce((a,v)=>a+v*v,0);
    const slope=(n*sumXY-sumX*sumY)/(n*sumXX-sumX*sumX||1);
    const drv=drivers[parseInt(dnStr)]||{};
    results.push({dn:parseInt(dnStr),acronym:drv.acronym||"#"+dnStr,team:drv.team||"",slope,laps:n,
      avg:sumY/n,min:Math.min(...ys),max:Math.max(...ys)});
  }
  results.sort((a,b)=>a.avg-b.avg);
  return results;
}

/* ══════════════════════════════════════════════════════════════════════════════
   TYRE USAGE & DEGRADATION ANALYSIS (all session types)
   ══════════════════════════════════════════════════════════════════════════════ */
function identifyTyreStints(){
  const d=STATE.sessionData;if(!d)return[];
  const drivers=d.drivers||{};
  const laps=d.laps||[];
  const stints=d.stints||[];
  // Adaptive threshold: practice=5, race=4, qualifying/sprint=3 (shorter stints)
  const sType=STATE.sessionType||"practice";
  const MIN_CLEAN=sType==="qualifying"||sType==="sprint_quali"?3:sType==="race"||sType==="sprint"?4:5;
  const runs=[];
  stints.forEach(st=>{
    const drv=drivers[st.driver_number]||{};
    const stintLaps=laps.filter(l=>l.driver_number===st.driver_number&&l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end&&l.lap_duration>0);
    if(stintLaps.length<2)return;
    stintLaps.sort((a,b)=>a.lap_number-b.lap_number);
    // Remove outliers: >107% of median
    const sorted=[...stintLaps].sort((a,b)=>a.lap_duration-b.lap_duration);
    const median=sorted[Math.floor(sorted.length/2)].lap_duration;
    const clean=stintLaps.filter(l=>l.lap_duration<median*1.07&&!l.is_pit_out_lap);
    if(clean.length<MIN_CLEAN)return;
    const avgPace=clean.reduce((s,l)=>s+l.lap_duration,0)/clean.length;
    const bestLap=Math.min(...clean.map(l=>l.lap_duration));
    // Linear regression for degradation
    const xs=clean.map(l=>l.lap_number-clean[0].lap_number);
    const ys=clean.map(l=>l.lap_duration);
    const n=xs.length;
    const sumX=xs.reduce((a,b)=>a+b,0),sumY=ys.reduce((a,b)=>a+b,0);
    const sumXY=xs.reduce((a,v,i)=>a+v*ys[i],0);
    const sumXX=xs.reduce((a,v)=>a+v*v,0);
    const slope=(n*sumXY-sumX*sumY)/(n*sumXX-sumX*sumX||1);
    const intercept=(sumY-slope*sumX)/n;
    // First/last lap pace for total deg across stint
    const firstPace=clean.slice(0,Math.min(2,clean.length)).reduce((s,l)=>s+l.lap_duration,0)/Math.min(2,clean.length);
    const lastPace=clean.slice(-Math.min(2,clean.length)).reduce((s,l)=>s+l.lap_duration,0)/Math.min(2,clean.length);
    const totalDeg=lastPace-firstPace;
    const compound=(st.compound||"UNKNOWN").toUpperCase();
    const fresh=st.tyre_age_at_start===0||st.tyre_age_at_start==null;
    const key=st.driver_number+"_"+st.stint_number;
    runs.push({key,dn:st.driver_number,acronym:drv.acronym||"#"+st.driver_number,team:drv.team||"",
      stintNum:st.stint_number,compound,fresh,lapStart:st.lap_start,lapEnd:st.lap_end,
      cleanLaps:clean,allLaps:stintLaps,avgPace,bestLap,slope,intercept,totalDeg,
      totalLaps:stintLaps.length,cleanCount:clean.length});
  });
  runs.sort((a,b)=>a.avgPace-b.avgPace);
  return runs;
}

        thtml+=`<td style="color:var(--green)">${fmtTime(r.bestLap)}</td>`;
        thtml+=`<td class="${degColor}">${r.slope>=0?"+":""}${r.slope.toFixed(3)}s</td>`;
        thtml+=`<td class="${degColor}">${r.totalDeg>=0?"+":""}${r.totalDeg.toFixed(3)}s</td>`;
        thtml+=`<td style="color:${delta<0.001?"var(--green)":"var(--text2)"}">${delta<0.001?"BEST":"+"+delta.toFixed(3)}</td>`;
        thtml+=`</tr>`;
      });
    });
    thtml+='</tbody></table>';
    compTblEl.innerHTML=thtml;
  }

  drawDegCurve(runs);
}

function toggleLongRun(key){
  if(STATE.selectedLongRuns.has(key))STATE.selectedLongRuns.delete(key);
  else STATE.selectedLongRuns.add(key);
  renderLongRuns();
}

function drawDegCurve(runs){
  const canvas=document.getElementById("deg-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=220;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);
  const cs=getComputedStyle(document.documentElement);
  const textColor=cs.getPropertyValue("--text2").trim();
  const gridColor=cs.getPropertyValue("--border").trim();
  const surfColor=cs.getPropertyValue("--surface2").trim()||"#1f1f23";

  // Filter to selected runs only (or all if none selected)
  let selected=runs.filter(r=>STATE.selectedLongRuns.has(r.key));
  if(!selected.length)selected=runs.slice(0,6);

  if(!selected.length){
    ctx.fillStyle=surfColor;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=textColor;ctx.font="12px sans-serif";ctx.textAlign="center";
    ctx.fillText("Select stints above to compare degradation curves",W/2,H/2);return;
  }

  ctx.fillStyle=surfColor;ctx.fillRect(0,0,W,H);

  const ml=50,mr=20,mt=14,mb=30;
  const pw=W-ml-mr,ph=H-mt-mb;

  let maxLapAge=0,minTime=Infinity,maxTime=0;
  selected.forEach(r=>{
    r.cleanLaps.forEach(l=>{
      const age=l.lap_number-r.lapStart;
      if(age>maxLapAge)maxLapAge=age;
      if(l.lap_duration<minTime)minTime=l.lap_duration;
      if(l.lap_duration>maxTime)maxTime=l.lap_duration;
    });
  });
  const tRange=maxTime-minTime||1;
  const tPad=tRange*0.1;
  minTime-=tPad;maxTime+=tPad;
  const finalTRange=maxTime-minTime||1;
  const lapRange=maxLapAge||1;

  function xForAge(a){return ml+pw*(a/lapRange);}
  function yForT(t){return mt+ph*(1-(t-minTime)/finalTRange);}

  // Grid
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.font="9px sans-serif";ctx.fillStyle=textColor;
  for(let i=0;i<=4;i++){
    const t=minTime+finalTRange*i/4;
    const y=yForT(t);
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmtTime(t),ml-4,y+3);
  }
  const xSteps=Math.min(maxLapAge,12);
  for(let i=0;i<=xSteps;i++){
    const a=Math.round(lapRange*i/xSteps);
    const x=xForAge(a);
    ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();
    ctx.textAlign="center";ctx.fillText(a,x,H-mb+12);
  }
  ctx.textAlign="center";ctx.font="bold 9px sans-serif";
  ctx.fillText("TYRE AGE (laps)",ml+pw/2,H-4);
  ctx.save();ctx.translate(8,mt+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";ctx.fillText("LAP TIME",0,0);ctx.restore();

  // Draw each run — data points, connecting line, trend line, label
  selected.forEach((r,ri)=>{
    const color=teamColor(r.team);
    const cCol=resolveColor(compoundColor(r.compound));

    // Connecting solid line through data points
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;
    ctx.beginPath();
    r.cleanLaps.forEach((l,i)=>{
      const age=l.lap_number-r.lapStart;
      const x=xForAge(age),y=yForT(l.lap_duration);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Data points — compound colored
    ctx.globalAlpha=0.9;
    r.cleanLaps.forEach(l=>{
      const age=l.lap_number-r.lapStart;
      const x=xForAge(age),y=yForT(l.lap_duration);
      ctx.fillStyle=cCol;
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.stroke();
    });

    // Trend line (dashed)
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.setLineDash([6,3]);ctx.beginPath();
    const x0=xForAge(0),y0=yForT(r.intercept);
    const xn=xForAge(r.cleanLaps.length-1),yn=yForT(r.intercept+r.slope*(r.cleanLaps.length-1));
    ctx.moveTo(x0,y0);ctx.lineTo(xn,yn);ctx.stroke();ctx.setLineDash([]);

    // Label at end with deg rate
    ctx.globalAlpha=1;ctx.fillStyle=color;
    ctx.font="bold 8px sans-serif";ctx.textAlign="left";
    const degLabel=r.slope>=0?"+"+r.slope.toFixed(3):r.slope.toFixed(3);
    ctx.fillText(r.acronym+" "+r.compound+" ("+degLabel+"s/lap)",xn+4,yn+3);
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════════════════════════════════════
   HISTORICAL STATS — Season-wide aggregated data from CSVs

let _histData=null;
let _histTab="drivers";
let _histLoading=false;

async function loadHistoricalStats(){
  if(_histLoading)return;
  const el=document.getElementById("hist-content");
  if(!el)return;
  const yearSel=document.getElementById("sel-year");
  const year=yearSel?yearSel.value:new Date().getFullYear();
  if(_histData&&_histData.year===String(year)){renderHistTab();return;}
  _histLoading=true;
  el.innerHTML='<div style="color:var(--text2);font-size:11px">Loading stats...</div>';
  try{
    const r=await fetch(`/api/historical/stats?year=${year}`);
    _histData=await r.json();
    renderHistTab();
  }catch(e){
    el.innerHTML=`<div style="color:var(--accent);font-size:11px">Failed to load: ${esc(e.message)}</div>`;
  }
  _histLoading=false;
}

function setHistTab(tab){
  _histTab=tab;
  ["drivers","teams","h2h","gpbygp"].forEach(t=>{
    const btn=document.getElementById("hist-tab-"+t);
    if(btn)btn.classList.toggle("active",t===tab);

  renderHistTab();
}

function showStatDetail(acronym,stat,cellEl){
  const ds=(_histData||{}).driver_stats||{};
  const d=ds[acronym];if(!d)return;
  const detEl=document.getElementById("hist-stat-detail");if(!detEl)return;
  const rr=d.race_results||[];
  const qr=d.quali_results||[];
  let items=[];let title="";

  if(stat==="wins"){
    title=`${acronym} — Wins`;
    items=rr.filter(r=>r.finish===1).map(r=>({round:r.round,meeting:r.meeting,detail:`P1 (Grid P${r.grid})`}));
  }else if(stat==="podiums"){
    title=`${acronym} — Podiums`;
    items=rr.filter(r=>r.finish<=3).map(r=>({round:r.round,meeting:r.meeting,detail:`P${r.finish} (Grid P${r.grid})`}));
  }else if(stat==="poles"){
    title=`${acronym} — Pole Positions`;
    items=qr.filter(r=>r.grid===1).map(r=>({round:r.round,meeting:r.meeting,detail:`P1 in qualifying`}));
  }else if(stat==="front_rows"){
    title=`${acronym} — Front Row Starts`;
    items=qr.filter(r=>r.grid<=2).map(r=>({round:r.round,meeting:r.meeting,detail:`P${r.grid} in qualifying`}));
  }else if(stat==="dnfs"){
    title=`${acronym} — DNFs / Retirements`;
    items=rr.filter(r=>r.status==="DNF"||r.status==="Retired").map(r=>({round:r.round,meeting:r.meeting,detail:`DNF (Grid P${r.grid})`}));
  }else if(stat==="best"){
    const bf=d.best_finish;
    title=`${acronym} — Best Finish P${bf}`;
    items=rr.filter(r=>r.finish===bf).map(r=>({round:r.round,meeting:r.meeting,detail:`P${r.finish} (Grid P${r.grid})`}));
  }else if(stat==="points"){
    title=`${acronym} — Points Breakdown`;
    items=rr.filter(r=>r.points>0).map(r=>({round:r.round,meeting:r.meeting,detail:`P${r.finish} → ${r.points}pts`}));
    const sr=d.sprint_results||[];
    sr.filter(r=>r.points>0).forEach(r=>{items.push({round:r.round,meeting:r.meeting,detail:`Sprint P${r.finish} → ${r.points}pts`});});
    items.sort((a,b)=>parseInt(a.round)-parseInt(b.round));
  }

  if(!items.length){detEl.innerHTML=`<div style="margin-top:8px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:10px;color:var(--text2)">${title}: None</div>`;return;}

  let h=`<div style="margin-top:8px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:700;font-size:11px">${title}</span><span style="cursor:pointer;font-size:10px;color:var(--text2)" onclick="document.getElementById('hist-stat-detail').innerHTML=''">✕ Close</span></div>`;
  items.forEach(it=>{
    const cc=gpCountryCode(it.meeting);
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:2px 0;font-size:10px;border-bottom:1px solid var(--border)">`;
    h+=`<span style="color:var(--text2);min-width:28px">R${it.round}</span>`;
    h+=`<span style="font-weight:600;min-width:32px">${cc}</span>`;
    h+=`<span style="color:var(--text2)">${esc(it.meeting)}</span>`;
    h+=`<span style="margin-left:auto;font-weight:600">${it.detail}</span>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  detEl.innerHTML=h;
}

function renderHistGpByGp(){
  const el=document.getElementById("hist-content");if(!el||!_histData)return;
  const ds=_histData.driver_stats||{};
  const drivers=Object.values(ds).filter(d=>(d.race_results&&d.race_results.length)||(d.quali_results&&d.quali_results.length)).sort((a,b)=>b.points-a.points);
