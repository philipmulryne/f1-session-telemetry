function _resolveCSS(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function drawRdStrategy(canvasId){
  const cv=document.getElementById(canvasId||"rd-strategy-canvas");
  if(!cv)return;
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const stints=d.stints||[];
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration>0);
  if(!allLaps.length)return;

  const maxLap=Math.max(...allLaps.map(l=>l.lap_number));
  const colText2=_resolveCSS("--text2")||"#a1a1aa";
  const colBorder=_resolveCSS("--border")||"#2e2e33";

  // Group stints by driver
  const stintByDrv={};
  stints.forEach(s=>{
    const dn=s.driver_number;
    if(!stintByDrv[dn])stintByDrv[dn]=[];
    stintByDrv[dn].push(s);
  });

  // Build positions for sorting — use all drivers from drivers object
  const positions=d.positions||[];
  const posMap={};
  if(positions.length){
    const posByDrv={};
    positions.forEach(p=>{if(!posByDrv[p.driver_number])posByDrv[p.driver_number]=[];posByDrv[p.driver_number].push(p);});
    Object.entries(posByDrv).forEach(([dn,arr])=>{
      arr.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
      posMap[parseInt(dn)]=arr[arr.length-1].position;
    });
  }
  // Fallback positions from cumulative time
  const cumByDrv={};
  allLaps.forEach(l=>{cumByDrv[l.driver_number]=(cumByDrv[l.driver_number]||0)+l.lap_duration;});
  const allDriverNums=new Set([...Object.keys(drivers).map(Number),...Object.keys(stintByDrv).map(Number),...allLaps.map(l=>l.driver_number)]);
  const fallbackSorted=[...allDriverNums].sort((a,b)=>(cumByDrv[a]||Infinity)-(cumByDrv[b]||Infinity));
  fallbackSorted.forEach((dn,i)=>{if(posMap[dn]==null)posMap[dn]=i+1;});

  const driverList=[...allDriverNums].sort((a,b)=>(posMap[a]||999)-(posMap[b]||999));

  const rowH=24,ml=90,mr=30,mt=28,mb=24;
  const h=mt+driverList.length*rowH+mb;
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr;
  cv.height=h*dpr;
  cv.style.height=h+"px";
  const ctx=cv.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=cv.offsetWidth;
  const pw=W-ml-mr;
  ctx.clearRect(0,0,W,h);

  // Background
  const surfCol=_resolveCSS("--surface2")||"#1f1f23";
  ctx.fillStyle=surfCol;ctx.fillRect(0,0,W,h);

  // Lap axis labels + gridlines
  const step=maxLap<=20?2:maxLap<=40?5:maxLap<=70?10:20;
  ctx.textAlign="center";
  for(let l=0;l<=maxLap;l+=step){
    if(l===0)continue;
    const x=ml+pw*(l/maxLap);
    ctx.strokeStyle=colBorder;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+driverList.length*rowH);ctx.stroke();
    ctx.fillStyle=colText2;ctx.font="bold 9px system-ui";
    ctx.fillText("L"+l,x,mt-8);
  }
  // Max lap label
  if(maxLap%step!==0){
    const x=ml+pw;
    ctx.fillStyle=colText2;ctx.font="bold 9px system-ui";ctx.textAlign="center";
    ctx.fillText("L"+maxLap,x,mt-8);
  }

  // Column headers
  ctx.fillStyle=colText2;ctx.font="bold 9px system-ui";
  ctx.textAlign="left";ctx.fillText("P",2,mt-8);
  ctx.textAlign="right";ctx.fillText("Driver",ml-8,mt-8);

  driverList.forEach((dn,i)=>{
    const y=mt+i*rowH;
    const drv=drivers[dn]||{};
    const color=teamColor(drv.team||"");
    // Alternating row bg
    if(i%2===0){ctx.fillStyle="rgba(255,255,255,.015)";ctx.fillRect(0,y,W,rowH);}
    // Position
    ctx.fillStyle=colText2;ctx.font="bold 9px system-ui";ctx.textAlign="left";
    ctx.fillText("P"+(posMap[dn]||"?"),4,y+rowH*0.65);
    // Driver label with team color
    ctx.fillStyle=color;ctx.font="bold 10px system-ui";ctx.textAlign="right";
    ctx.fillText(drv.acronym||"#"+dn,ml-8,y+rowH*0.65);

    // Draw stints
    const dStints=(stintByDrv[dn]||[]).slice().sort((a,b)=>(a.lap_start||0)-(b.lap_start||0));
    if(!dStints.length){
      // No stint data — draw a grey bar with "?"
      ctx.fillStyle="rgba(255,255,255,.06)";
      ctx.fillRect(ml,y+4,pw,rowH-8);
      ctx.fillStyle=colText2;ctx.font="9px system-ui";ctx.textAlign="center";
      ctx.fillText("No stint data",ml+pw/2,y+rowH*0.65);
      return;
    }
    dStints.forEach(st=>{
      const ls=st.lap_start||1;
      const le=Math.min(st.lap_end||maxLap,maxLap);
      const lapCount=le-ls+1;
      const x1=ml+pw*(ls/maxLap);
      const x2=ml+pw*(le/maxLap);
      const barW=Math.max(x2-x1,3);
      const comp=(st.compound||"?").toUpperCase();
      const compCol=resolveColor(compoundColor(comp));
      const isFresh=(st.tyre_age_at_start===0||st.tyre_age_at_start==null);
      const barH=rowH-8;
      const barY=y+4;

      // Draw stint bar — used tyres get hatching pattern
      ctx.fillStyle=compCol;ctx.globalAlpha=isFresh?0.9:0.55;
      ctx.fillRect(x1,barY,barW,barH);
      ctx.globalAlpha=1;

      // Used tyre diagonal stripes
      if(!isFresh){
        ctx.save();
        ctx.beginPath();ctx.rect(x1,barY,barW,barH);ctx.clip();
        ctx.strokeStyle="rgba(0,0,0,.3)";ctx.lineWidth=1;
        for(let sx=x1-barH;sx<x1+barW;sx+=5){
          ctx.beginPath();ctx.moveTo(sx,barY+barH);ctx.lineTo(sx+barH,barY);ctx.stroke();
        }
        ctx.restore();
      }

      // Pit stop marker at stint boundary (white dashed line)
      if(st.stint_number>1){
        ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=1.5;
        ctx.setLineDash([2,2]);
        ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x1,y+rowH);ctx.stroke();
        ctx.setLineDash([]);
      }

      // Labels inside bar
      const cx=(x1+x1+barW)/2;
      if(barW>18){
        // Compound letter
        ctx.fillStyle="#fff";ctx.font="bold 9px system-ui";ctx.textAlign="center";
        ctx.fillText(comp[0],cx,barY+barH*0.55);
      }
      if(barW>42){
        // Lap count
        ctx.fillStyle="rgba(255,255,255,.8)";ctx.font="8px system-ui";
        ctx.fillText(lapCount+"L",cx,barY+barH*0.55+9);
      }
      // Fresh/Used badge — right side of bar
      if(barW>28){
        const badge=isFresh?"F":"U";
        const bx=x1+barW-1;
        const by=barY+2;
        ctx.fillStyle=isFresh?"rgba(34,197,94,.85)":"rgba(234,179,8,.85)";
        ctx.fillRect(bx-13,by,13,10);
        ctx.fillStyle="#fff";ctx.font="bold 7px system-ui";ctx.textAlign="center";
        ctx.fillText(badge,bx-6.5,by+8);
      }
      // If used tyre, show age at start below badge
      if(!isFresh&&st.tyre_age_at_start>0&&barW>55){
        ctx.fillStyle="rgba(255,255,255,.5)";ctx.font="7px system-ui";ctx.textAlign="right";
        ctx.fillText(st.tyre_age_at_start+"L used",x1+barW-3,barY+barH-1);
      }
    });
  });

  // Bottom lap ruler
  const rulerY=mt+driverList.length*rowH+4;
  ctx.strokeStyle=colBorder;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ml,rulerY);ctx.lineTo(ml+pw,rulerY);ctx.stroke();
  for(let l=0;l<=maxLap;l+=step){
    if(l===0)continue;
    const x=ml+pw*(l/maxLap);
    ctx.strokeStyle=colText2;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,rulerY);ctx.lineTo(x,rulerY+4);ctx.stroke();
    ctx.fillStyle=colText2;ctx.font="8px system-ui";ctx.textAlign="center";
    ctx.fillText(l,x,rulerY+12);
  }
}

/* ── Position Chart (lap-by-lap) ── */
let _posChartHl=null;         // highlighted driver number (hover)
let _posChartLocked=new Set(); // locked/selected driver numbers (multi-select click)
let _posChartHoverLap=null;   // hovered lap number for tooltip
let _posChartCache=null;      // cache posAt/pitMap/scPeriods to avoid recomputing on hover

function _posChartComputeData(){
  const d=STATE.sessionData;if(!d)return null;
  const drivers=d.drivers||{};
  const stints=d.stints||[];
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration>0);
  const rcMsgs=d.race_control||[];
  if(!allLaps.length)return null;

  const posAt=_buildPositionTimeline();
  const maxLap=Math.max(...allLaps.map(l=>l.lap_number));

  // Lap time lookup: dn -> {lap: duration}
  const lapTimes={};
  allLaps.forEach(l=>{
    if(!lapTimes[l.driver_number])lapTimes[l.driver_number]={};
    lapTimes[l.driver_number][l.lap_number]=l.lap_duration;
  });

  // Compound lookup from stints: dn -> {lap: compound}
  const compAtLap={}; // dn -> {lap: compound}
  stints.forEach(s=>{
    const dn=s.driver_number;
    if(!compAtLap[dn])compAtLap[dn]={};
    for(let l=(s.lap_start||1);l<=(s.lap_end||9999);l++){
      compAtLap[dn][l]=(s.compound||"?").toUpperCase();
    }
  });

  let maxPos=0;
  Object.values(posAt).forEach(lapObj=>{Object.values(lapObj).forEach(p=>{if(p>maxPos)maxPos=p;});});
  if(maxPos<2)maxPos=20;

  // SC/VSC periods
  const scPeriods=[];let scOpen=null;
  rcMsgs.forEach(m=>{
    const txt=((m.message||"")+(m.category||"")).toUpperCase();
    const lap=m.lap_number;if(lap==null)return;
    if((txt.includes("SAFETY CAR")||txt.includes("SC DEPLOYED"))&&!txt.includes("VIRTUAL")&&!txt.includes("INVESTIGATION")){
      if(!scOpen||scOpen.type!=="SC")scOpen={start:lap,type:"SC"};
    }
    if(txt.includes("VIRTUAL SAFETY CAR")||txt.includes("VSC DEPLOYED")){
      if(!scOpen||scOpen.type!=="VSC")scOpen={start:lap,type:"VSC"};
    }
    if(scOpen&&(txt.includes("SC IN")||txt.includes("SAFETY CAR IN")||txt.includes("VSC ENDING")||txt.includes("GREEN LIGHT")||txt.includes("RESTART"))){
      scOpen.end=lap;scPeriods.push({...scOpen});scOpen=null;
    }
  });
  if(scOpen){scOpen.end=maxLap;scPeriods.push({...scOpen});}

  // Pit stop map
  const stintByDrv={};
  stints.forEach(s=>{const dn=s.driver_number;if(!stintByDrv[dn])stintByDrv[dn]=[];stintByDrv[dn].push(s);});
  const pitMap={};
  Object.entries(stintByDrv).forEach(([dn,sts])=>{
    dn=parseInt(dn);pitMap[dn]=[];
    sts.sort((a,b)=>(a.lap_start||0)-(b.lap_start||0));
    for(let i=0;i<sts.length-1;i++){
      const pl=sts[i].lap_end||sts[i+1].lap_start||0;
      if(pl>0)pitMap[dn].push(pl);
    }
  });

  const allDrvNums=new Set();
  Object.values(posAt).forEach(lapObj=>{Object.keys(lapObj).forEach(dn=>{allDrvNums.add(parseInt(dn));});});
  const driverList=[...allDrvNums].sort((a,b)=>{
    const lastLap=posAt[maxLap]||{};
    return(lastLap[a]||999)-(lastLap[b]||999);
  });

  // Cumulative time for gap computation
  const cumTime={}; // dn -> {lap: cumTime}
  const runningCum={};
  for(let lap=1;lap<=maxLap;lap++){
    allLaps.filter(l=>l.lap_number===lap).forEach(l=>{
      runningCum[l.driver_number]=(runningCum[l.driver_number]||0)+l.lap_duration;
      if(!cumTime[l.driver_number])cumTime[l.driver_number]={};
      cumTime[l.driver_number][lap]=runningCum[l.driver_number];
    });
  }

  return{posAt,maxLap,maxPos,scPeriods,pitMap,driverList,drivers,lapTimes,compAtLap,cumTime};
}

function drawRdPositionChart(){
  const cv=document.getElementById("rd-pos-canvas");
  const legendEl=document.getElementById("pos-chart-legend");
  if(!cv)return;

  // Compute data (cache for hover performance)
  const data=_posChartComputeData();
  if(!data)return;
  _posChartCache=data;
  const{posAt,maxLap,maxPos,scPeriods,pitMap,driverList,drivers,lapTimes,compAtLap,cumTime}=data;

  const colText2=_resolveCSS("--text2")||"#a1a1aa";
  const colBorder=_resolveCSS("--border")||"#2e2e33";
  const surfCol=_resolveCSS("--surface2")||"#1f1f23";

  // Active drivers = locked set + hovered driver
  const activeSet=new Set(_posChartLocked);
  if(_posChartHl!=null)activeSet.add(_posChartHl);
  const hasActive=activeSet.size>0;

  // Canvas setup
  const ml=50,mr=40,mt=20,mb=30;
  const h=Math.max(320,maxPos*16+mt+mb);
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr;
  cv.height=h*dpr;
  cv.style.height=h+"px";
  const ctx=cv.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=cv.offsetWidth;
  const pw=W-ml-mr;
  const ph=h-mt-mb;

  function xOf(lap){return ml+pw*(lap/maxLap);}
  function yOf(pos){return mt+ph*((pos-1)/(maxPos-1));}

  ctx.fillStyle=surfCol;ctx.fillRect(0,0,W,h);

  // SC/VSC shaded regions
  scPeriods.forEach(sc=>{
    const x1=xOf(sc.start);const x2=xOf(sc.end);
    ctx.fillStyle=sc.type==="SC"?"rgba(234,179,8,.12)":"rgba(167,139,250,.1)";
    ctx.fillRect(x1,mt,x2-x1,ph);
    ctx.fillStyle=sc.type==="SC"?"rgba(234,179,8,.6)":"rgba(167,139,250,.5)";
    ctx.font="bold 8px system-ui";ctx.textAlign="center";
    ctx.fillText(sc.type,(x1+x2)/2,mt+10);
  });

  // Grid lines
  const lapStep=maxLap<=20?2:maxLap<=40?5:maxLap<=70?10:20;
  for(let l=lapStep;l<=maxLap;l+=lapStep){
    const x=xOf(l);
    ctx.strokeStyle=colBorder;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();
    ctx.fillStyle=colText2;ctx.font="8px system-ui";ctx.textAlign="center";
    ctx.fillText("L"+l,x,h-mb+14);
  }
  for(let p=1;p<=maxPos;p++){
    const y=yOf(p);
    ctx.strokeStyle=colBorder;ctx.lineWidth=0.3;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.fillStyle=colText2;ctx.font="9px system-ui";ctx.textAlign="right";
    ctx.fillText("P"+p,ml-6,y+3);
  }

  // Hover crosshair at hovered lap
  if(_posChartHoverLap!=null&&_posChartHoverLap>=1&&_posChartHoverLap<=maxLap){
    const hx=xOf(_posChartHoverLap);
    ctx.strokeStyle="rgba(255,255,255,.15)";ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(hx,mt);ctx.lineTo(hx,mt+ph);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(255,255,255,.3)";ctx.font="bold 8px system-ui";ctx.textAlign="center";
    ctx.fillText("L"+_posChartHoverLap,hx,mt-4);
  }

  // Draw lines for each driver
  driverList.forEach(dn=>{
    const drv=drivers[dn]||{};
    const color=teamColor(drv.team||"");
    const isHl=activeSet.has(dn);
    const dimmed=(hasActive&&!isHl);

    ctx.strokeStyle=color;
    ctx.lineWidth=isHl?3:dimmed?0.8:1.5;
    ctx.globalAlpha=dimmed?0.15:isHl?1:0.75;
    ctx.beginPath();
    let started=false;
    for(let lap=1;lap<=maxLap;lap++){
      if(!posAt[lap]||posAt[lap][dn]==null)continue;
      const x=xOf(lap);const y=yOf(posAt[lap][dn]);
      if(!started){ctx.moveTo(x,y);started=true;}
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.globalAlpha=1;

    // Pit stop markers
    (pitMap[dn]||[]).forEach(pl=>{
      if(!posAt[pl]||posAt[pl][dn]==null)return;
      const x=xOf(pl);const y=yOf(posAt[pl][dn]);
      ctx.fillStyle=dimmed?"rgba(255,255,255,.1)":"#fff";
      ctx.globalAlpha=dimmed?0.2:isHl?1:0.8;
      ctx.beginPath();ctx.arc(x,y,isHl?4:3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=color;
      ctx.beginPath();ctx.arc(x,y,isHl?2.5:1.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    });

    // Driver label at end of line
    const lastPos=posAt[maxLap]&&posAt[maxLap][dn]!=null?posAt[maxLap][dn]:null;
    if(lastPos!=null){
      const x=xOf(maxLap)+4;const y=yOf(lastPos);
      ctx.fillStyle=dimmed?"rgba(255,255,255,.1)":color;
      ctx.font=(isHl?"bold ":"")+"8px system-ui";ctx.textAlign="left";
      ctx.fillText(drv.acronym||"#"+dn,x,y+3);
    }
  });

  // Info tooltips for active drivers at hovered lap
  if(hasActive&&_posChartHoverLap!=null){
    const lap=_posChartHoverLap;
    // Find leader at this lap for gap calc
    let leaderDn=null;
    if(posAt[lap])Object.entries(posAt[lap]).forEach(([d,p])=>{if(p===1)leaderDn=parseInt(d);});

    // Show tooltip for each active driver, sorted by position
    const tipDrivers=[...activeSet].filter(dn=>posAt[lap]&&posAt[lap][dn]!=null)
      .sort((a,b)=>posAt[lap][a]-posAt[lap][b]);

    tipDrivers.forEach((dn,idx)=>{
      const drv=drivers[dn]||{};
      const color=teamColor(drv.team||"");
      const pos=posAt[lap][dn];
      const lt=lapTimes[dn]&&lapTimes[dn][lap]?lapTimes[dn][lap]:null;
      const comp=compAtLap[dn]&&compAtLap[dn][lap]?compAtLap[dn][lap]:null;
      const isPit=(pitMap[dn]||[]).includes(lap);
      let gapStr="";
      if(leaderDn!=null&&leaderDn!==dn){
        const leaderCum=cumTime[leaderDn]&&cumTime[leaderDn][lap];
        const myCum=cumTime[dn]&&cumTime[dn][lap];
        if(leaderCum&&myCum)gapStr="+"+(myCum-leaderCum).toFixed(1)+"s to P1";
      }else if(leaderDn===dn){gapStr="LEADER";}

      const dotX=xOf(lap);const dotY=yOf(pos);
      // Highlight dot
      ctx.fillStyle=color;ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(dotX,dotY,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(dotX,dotY,5,0,Math.PI*2);ctx.stroke();

      // Tooltip content
      const lines=[];
      lines.push((drv.acronym||"#"+dn)+" — L"+lap);
      lines.push("P"+pos);
      if(lt)lines.push(fmtTime(lt));
      if(comp)lines.push(comp);
      if(gapStr)lines.push(gapStr);
      if(isPit)lines.push("PIT STOP");

      const lineH=14;const pad=6;const tipW=120;
      const tipH=lines.length*lineH+pad*2;
      // Stagger tooltips vertically for multiple drivers
      let tx=dotX+12;let ty=dotY-tipH/2+idx*(tipH+4);
      if(tx+tipW>W-5)tx=dotX-tipW-12;
      if(ty<mt)ty=mt+idx*(tipH+4);
      if(ty+tipH>mt+ph)ty=mt+ph-tipH-idx*(tipH+4);

      // Rounded rect background
      ctx.fillStyle="rgba(0,0,0,.85)";
      ctx.beginPath();ctx.moveTo(tx+4,ty);ctx.lineTo(tx+tipW-4,ty);ctx.quadraticCurveTo(tx+tipW,ty,tx+tipW,ty+4);
      ctx.lineTo(tx+tipW,ty+tipH-4);ctx.quadraticCurveTo(tx+tipW,ty+tipH,tx+tipW-4,ty+tipH);
      ctx.lineTo(tx+4,ty+tipH);ctx.quadraticCurveTo(tx,ty+tipH,tx,ty+tipH-4);
      ctx.lineTo(tx,ty+4);ctx.quadraticCurveTo(tx,ty,tx+4,ty);ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx+4,ty);ctx.lineTo(tx+tipW-4,ty);ctx.quadraticCurveTo(tx+tipW,ty,tx+tipW,ty+4);
      ctx.lineTo(tx+tipW,ty+tipH-4);ctx.quadraticCurveTo(tx+tipW,ty+tipH,tx+tipW-4,ty+tipH);
      ctx.lineTo(tx+4,ty+tipH);ctx.quadraticCurveTo(tx,ty+tipH,tx,ty+tipH-4);
      ctx.lineTo(tx,ty+4);ctx.quadraticCurveTo(tx,ty,tx+4,ty);ctx.stroke();

      lines.forEach((line,i)=>{
        ctx.fillStyle=i===0?color:line==="PIT STOP"?"#f59e0b":"#fff";
        ctx.font=(i<=1?"bold ":"")+"10px system-ui";ctx.textAlign="left";
        ctx.fillText(line,tx+pad,ty+pad+lineH*(i+0.8));
      });
    });
  }

  // Hover interaction — always track nearest driver + lap
  cv.onmousemove=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    const lap=Math.max(1,Math.min(maxLap,Math.round((mx-ml)/pw*maxLap)));
    _posChartHoverLap=lap;
    // Always find nearest driver for hover highlight
    let bestDist=20,bestDn=null;
    if(posAt[lap]){
      Object.entries(posAt[lap]).forEach(([dn,pos])=>{
        const y=yOf(pos);const dist=Math.abs(y-my);
        if(dist<bestDist){bestDist=dist;bestDn=parseInt(dn);}
      });
    }
    if(bestDn!==_posChartHl){_posChartHl=bestDn;}
    drawRdPositionChart();
  };
  // Click on chart — toggle driver in/out of locked set
  cv.onclick=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    const lap=Math.max(1,Math.min(maxLap,Math.round((mx-ml)/pw*maxLap)));
    let bestDist=25,bestDn=null;
    if(posAt[lap]){
      Object.entries(posAt[lap]).forEach(([dn,pos])=>{
        const y=yOf(pos);const dist=Math.abs(y-my);
        if(dist<bestDist){bestDist=dist;bestDn=parseInt(dn);}
      });
    }
    if(bestDn!=null){
      if(_posChartLocked.has(bestDn))_posChartLocked.delete(bestDn);
      else _posChartLocked.add(bestDn);
    }
    drawRdPositionChart();
  };
  cv.onmouseleave=function(){
    _posChartHoverLap=null;
    _posChartHl=null;
    drawRdPositionChart();
  };

  // Legend — click to toggle in locked set (multi-select), hover to preview
  if(legendEl){
    let lhtml="";
    driverList.forEach(dn=>{
      const drv=drivers[dn]||{};
      const color=teamColor(drv.team||"");
      const isLocked=_posChartLocked.has(dn);
      const isActive=activeSet.has(dn);
      const style=isLocked
        ?`background:${color};color:#fff;border:1px solid ${color}`
        :`background:${color}22;color:${color};border:1px solid ${color}44`;
      lhtml+=`<span class="pos-legend-item${isActive?" hl":""}" style="${style}" `
            +`onclick="if(_posChartLocked.has(${dn}))_posChartLocked.delete(${dn});else _posChartLocked.add(${dn});drawRdPositionChart()" `
            +`onmouseenter="_posChartHl=${dn};drawRdPositionChart()" `
            +`onmouseleave="_posChartHl=null;drawRdPositionChart()">`
            +`${esc(drv.acronym||"#"+dn)}</span>`;
    });
    legendEl.innerHTML=lhtml;
  }
}

/* ── Pit Stops & Position Change Analysis ── */
function _buildPositionTimeline(){
  const d=STATE.sessionData;if(!d)return{};
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration>0);
  if(!allLaps.length)return{};
  const maxLap=Math.max(...allLaps.map(l=>l.lap_number));

  // posAt[lap] = { dn: position, ... }  — full standings per lap
  const posAt={};
  // Try position field from lap data first
  let hasPositionField=false;
  allLaps.forEach(l=>{if(l.position)hasPositionField=true;});

  if(hasPositionField){
    for(let lap=1;lap<=maxLap;lap++){
      posAt[lap]={};
      allLaps.filter(l=>l.lap_number===lap&&l.position).forEach(l=>{posAt[lap][l.driver_number]=l.position;});
      // Carry forward from previous lap for drivers who didn't record this lap
      if(lap>1&&posAt[lap-1]){
        Object.entries(posAt[lap-1]).forEach(([dn,p])=>{if(posAt[lap][dn]==null)posAt[lap][dn]=p;});
      }
    }
  }else{
    // Compute from cumulative time
    const running={};
    for(let lap=1;lap<=maxLap;lap++){
      allLaps.filter(l=>l.lap_number===lap).forEach(l=>{
        running[l.driver_number]=(running[l.driver_number]||0)+l.lap_duration;
      });
      const entries=Object.entries(running).map(([dn,t])=>({dn:parseInt(dn),t}));
      // Weight: more laps completed = better position; then faster cumulative
      const lapsDone={};
      allLaps.filter(l=>l.lap_number<=lap).forEach(l=>{lapsDone[l.driver_number]=(lapsDone[l.driver_number]||0)+1;});
      entries.sort((a,b)=>{
        const aL=lapsDone[a.dn]||0,bL=lapsDone[b.dn]||0;
        if(aL!==bL)return bL-aL;
        return a.t-b.t;
      });
      posAt[lap]={};
      entries.forEach((e,idx)=>{posAt[lap][e.dn]=idx+1;});
    }
  }
  return posAt;
}

function drawRdPitAnalysis(){
  const el=document.getElementById("rd-pit-analysis");
  if(!el)return;
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const stints=d.stints||[];
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration>0);
  if(!allLaps.length||!stints.length){el.innerHTML='<div style="padding:16px;color:var(--text2);font-size:12px">No pit stop data available.</div>';return;}

  const maxLap=Math.max(...allLaps.map(l=>l.lap_number));
  const posAt=_buildPositionTimeline();

  // Grid position (lap 1) and final position (last lap) for each driver
  const gridPos={};const finalPos={};
  if(posAt[1])Object.entries(posAt[1]).forEach(([dn,p])=>{gridPos[parseInt(dn)]=p;});
  if(posAt[maxLap])Object.entries(posAt[maxLap]).forEach(([dn,p])=>{finalPos[parseInt(dn)]=p;});

  // Build stint map
  const stintByDrv={};
  stints.forEach(s=>{
    const dn=s.driver_number;
    if(!stintByDrv[dn])stintByDrv[dn]=[];
    stintByDrv[dn].push(s);
  });

  // Helper: get position for driver at lap (search backwards up to 2 laps)
  function getPos(dn,lap){
    for(let l=lap;l>=Math.max(1,lap-2);l--){if(posAt[l]&&posAt[l][dn]!=null)return posAt[l][dn];}
    return null;
  }
  // Helper: get settled position (skip pit-out lap, look 2-4 laps after)
  function getSettledPos(dn,lap){
    for(let l=lap+2;l<=Math.min(maxLap,lap+4);l++){if(posAt[l]&&posAt[l][dn]!=null)return posAt[l][dn];}
    for(let l=lap+1;l<=Math.min(maxLap,lap+3);l++){if(posAt[l]&&posAt[l][dn]!=null)return posAt[l][dn];}
    return null;
  }

  // SMART racing group: look across the entire stint leading up to the pit.
  // A driver is "racing against" someone if they were within ±3 positions
  // for at least 40% of the stint laps. This catches drivers who were
  // battling throughout (like VER vs MCL at Qatar), not just a snapshot.
  function getStintRacingGroup(dn, stintStart, pitLap){
    const stintLen=pitLap-stintStart+1;
    if(stintLen<1)return[];
    // Count how many laps each other driver was within ±3 pos
    const proximity={}; // otherDn -> count of laps within ±3
    for(let lap=stintStart;lap<=pitLap;lap++){
      const standings=posAt[lap];if(!standings)continue;
      const myPos=standings[dn];if(myPos==null)continue;
      Object.entries(standings).forEach(([d,p])=>{
        const dNum=parseInt(d);
        if(dNum===dn)return;
        if(Math.abs(p-myPos)<=3){proximity[dNum]=(proximity[dNum]||0)+1;}
      });
    }
    // Threshold: present within ±3 for at least 40% of stint, min 2 laps
    const threshold=Math.max(2,Math.floor(stintLen*0.4));
    const group=[];
    Object.entries(proximity).forEach(([d,count])=>{
      if(count>=threshold){
        const dNum=parseInt(d);
        const posAtPit=posAt[pitLap]&&posAt[pitLap][dNum]!=null?posAt[pitLap][dNum]:null;
        group.push({dn:dNum,pos:posAtPit,lapsNear:count,pctNear:Math.round(count/stintLen*100)});
      }
    });
    group.sort((a,b)=>(a.pos||999)-(b.pos||999));
    return group;
  }

  // Build pit events with stint-wide racing group analysis
  const pitEvents=[];
  Object.entries(stintByDrv).forEach(([dn,sts])=>{
    dn=parseInt(dn);
    sts.sort((a,b)=>(a.lap_start||0)-(b.lap_start||0));
    for(let i=0;i<sts.length-1;i++){
      const stOut=sts[i];
      const stIn=sts[i+1];
      const pitLap=stOut.lap_end||stIn.lap_start||0;
      if(!pitLap||pitLap<1)continue;
      const stintStart=stOut.lap_start||1;

      const posBefore=getPos(dn,pitLap);
      const posAfter=getSettledPos(dn,pitLap);
      const posImmediate=getPos(dn,pitLap+1);

      // Stint-wide racing group
      const racingGroup=getStintRacingGroup(dn,stintStart,pitLap);

      // For each group member: where did they end up, and did they pit nearby?
      const posChanges=racingGroup.map(g=>{
        const gSettled=getSettledPos(g.dn,pitLap);
        // Find this driver's pit lap in nearby window (±8 laps for wider detection)
        const gStints=stintByDrv[g.dn]||[];
        let gPitLap=null;
        for(let j=0;j<gStints.length-1;j++){
          const gl=gStints[j].lap_end||gStints[j+1].lap_start||0;
          if(gl>0&&gl>=pitLap-3&&gl<=pitLap+8){gPitLap=gl;break;}
        }
        // Determine effect
        let effect=null;
        if(posBefore!=null&&posAfter!=null&&gSettled!=null){
          const wasBehind=posBefore>g.pos;
          const nowBehind=posAfter>gSettled;
          const wasAhead=posBefore<g.pos;
          const nowAhead=posAfter<gSettled;
          if(wasAhead&&nowBehind)effect="lost";
          else if(wasBehind&&nowAhead)effect="gained";
          else if(wasAhead&&nowAhead)effect="held";
          else if(wasBehind&&nowBehind)effect="stayed_behind";
        }
        return{...g,posSettled:gSettled,pitLap:gPitLap,effect};
      });

      // Verdict
      const gained=posChanges.filter(g=>g.effect==="gained").length;
      const lost=posChanges.filter(g=>g.effect==="lost").length;
      let verdict="neutral",verdictText="Neutral";
      if(gained>lost){verdict="good";verdictText=`+${gained-lost} net gain`;}
      else if(lost>gained){verdict="bad";verdictText=`−${lost-gained} net loss`;}
      else if(gained>0){verdictText=`±0 (gained ${gained}, lost ${lost})`;}

      // Undercut/overcut detection
      let ucLabel="";
      const earlierPitters=posChanges.filter(g=>g.pitLap!=null&&g.pitLap<pitLap-1);
      const laterPitters=posChanges.filter(g=>g.pitLap!=null&&g.pitLap>pitLap+1);
      if(earlierPitters.length>0){
        const lostToEarly=earlierPitters.filter(g=>g.effect==="lost");
        const gainedOnEarly=earlierPitters.filter(g=>g.effect==="gained");
        if(lostToEarly.length>0)ucLabel="Undercut by "+lostToEarly.map(g=>{const gd=drivers[g.dn]||{};return gd.acronym||"#"+g.dn;}).join(",");
        if(gainedOnEarly.length>0)ucLabel=(ucLabel?ucLabel+"; ":"")+"Defended vs "+gainedOnEarly.map(g=>{const gd=drivers[g.dn]||{};return gd.acronym||"#"+g.dn;}).join(",");
      }
      if(laterPitters.length>0){
        const lostToLate=laterPitters.filter(g=>g.effect==="lost");
        const gainedOnLate=laterPitters.filter(g=>g.effect==="gained");
        if(lostToLate.length>0)ucLabel=(ucLabel?ucLabel+"; ":"")+"Overcut by "+lostToLate.map(g=>{const gd=drivers[g.dn]||{};return gd.acronym||"#"+g.dn;}).join(",");
        if(gainedOnLate.length>0)ucLabel=(ucLabel?ucLabel+"; ":"")+"Undercut "+gainedOnLate.map(g=>{const gd=drivers[g.dn]||{};return gd.acronym||"#"+g.dn;}).join(",");
      }

      pitEvents.push({
        dn,pitLap,stintNum:i+1,stintStart,
        compound_out:(stOut.compound||"?").toUpperCase(),
        compound_in:(stIn.compound||"?").toUpperCase(),
        fresh_in:(stIn.tyre_age_at_start===0||stIn.tyre_age_at_start==null),
        stintLaps:(stOut.lap_end||0)-(stOut.lap_start||1)+1,
        posBefore,posAfter,posImmediate,
        posChange:posBefore!=null&&posAfter!=null?(posBefore-posAfter):null,
        posChanges,gained,lost,verdict,verdictText,ucLabel,
        gridPos:gridPos[dn]||null,finalPos:finalPos[dn]||null
      });
    }
  });

  if(!pitEvents.length){el.innerHTML='<div style="padding:16px;color:var(--text2);font-size:12px">No pit stops recorded yet.</div>';return;}
  pitEvents.sort((a,b)=>a.pitLap-b.pitLap);

  // Render HTML table
  let html='<table class="pit-table"><thead><tr>';
  html+='<th>Lap</th><th>Driver</th><th>Grid</th><th>Stint</th><th>Tyres</th>';
  html+='<th>Pos Pre</th><th>Pos Out</th><th>Pos Settled</th><th>+/−</th>';
  html+='<th>Racing Group (across stint)</th><th>Strategy Effect</th><th>Verdict</th><th>Final</th>';
  html+='</tr></thead><tbody>';

  pitEvents.forEach(ev=>{
    const drv=drivers[ev.dn]||{};
    const color=teamColor(drv.team||"");
    const compOutCol=resolveColor(compoundColor(ev.compound_out));
    const compInCol=resolveColor(compoundColor(ev.compound_in));

    html+=`<tr>`;
    html+=`<td style="font-weight:700">L${ev.pitLap}</td>`;
    html+=`<td><span style="color:${color};font-weight:700">${esc(drv.acronym||"#"+ev.dn)}</span></td>`;
    // Grid position
    html+=`<td style="color:var(--text2)">P${ev.gridPos!=null?ev.gridPos:"?"}</td>`;
    html+=`<td style="font-size:10px">S${ev.stintNum} (${ev.stintLaps}L)</td>`;

    // Compound change
    html+=`<td><span class="rd-compound" style="background:${compOutCol}"></span>${ev.compound_out}→<span class="rd-compound" style="background:${compInCol}"></span>${ev.compound_in}`;
    html+=ev.fresh_in?` <span style="color:var(--green);font-size:9px;font-weight:700">F</span>`
                      :` <span style="color:var(--yellow);font-size:9px;font-weight:700">U</span>`;
    html+=`</td>`;

    // Position columns
    html+=`<td style="font-weight:700">P${ev.posBefore!=null?ev.posBefore:"?"}</td>`;
    html+=`<td style="color:var(--text2)">P${ev.posImmediate!=null?ev.posImmediate:"?"}</td>`;
    html+=`<td style="font-weight:700">P${ev.posAfter!=null?ev.posAfter:"?"}</td>`;

    // Net position change
    if(ev.posChange!=null){
      const cls=ev.posChange>0?"pit-gain":ev.posChange<0?"pit-loss":"pit-neutral";
      const label=ev.posChange>0?"+"+ev.posChange:ev.posChange===0?"0":String(ev.posChange);
      html+=`<td class="${cls}">${label}</td>`;
    }else{html+=`<td>—</td>`;}

    // Racing group — now with % stint proximity
    html+=`<td><div class="pit-grp">`;
    ev.posChanges.forEach(g=>{
      const gDrv=drivers[g.dn]||{};
      const gCol=teamColor(gDrv.team||"");
      const bg=g.effect==="lost"?"rgba(225,6,0,.15)":g.effect==="gained"?"rgba(34,197,94,.15)":"rgba(255,255,255,.06)";
      const pitInfo=g.pitLap?` pit L${g.pitLap}`:"";
      const tooltip=`P${g.pos!=null?g.pos:"?"}→P${g.posSettled!=null?g.posSettled:"?"} (${g.pctNear}% of stint${pitInfo})`;
      html+=`<span class="pit-grp-drv" style="background:${bg};color:${gCol}" title="${esc(tooltip)}">`;
      html+=`${esc(gDrv.acronym||"#"+g.dn)}`;
      if(g.pitLap){
        const delta=g.pitLap-ev.pitLap;
        html+=`<span style="font-size:7px;opacity:.6;margin-left:2px">${delta>0?"+"+delta:delta}L</span>`;
      }
      html+=`</span>`;
    });
    if(!ev.posChanges.length)html+=`<span style="color:var(--text2);font-size:10px">—</span>`;
    html+=`</div></td>`;

    // Strategy effect details
    html+=`<td style="font-size:10px">`;
    if(ev.gained>0)html+=`<span class="pit-gain">▲${ev.gained}</span> `;
    if(ev.lost>0)html+=`<span class="pit-loss">▼${ev.lost}</span> `;
    if(ev.ucLabel)html+=`<span style="color:var(--text2)">${esc(ev.ucLabel)}</span>`;
    else if(!ev.gained&&!ev.lost)html+=`<span style="color:var(--text2)">No change</span>`;
    html+=`</td>`;

    // Verdict
    html+=`<td><span class="pit-verdict ${ev.verdict}">${esc(ev.verdictText)}</span></td>`;

    // Final position
    const fpc=ev.finalPos!=null&&ev.gridPos!=null?(ev.gridPos-ev.finalPos):null;
    html+=`<td style="font-weight:700">P${ev.finalPos!=null?ev.finalPos:"?"}`;
    if(fpc!=null&&fpc!==0)html+=` <span class="${fpc>0?"pit-gain":"pit-loss"}" style="font-size:9px">${fpc>0?"+"+fpc:fpc}</span>`;
    html+=`</td>`;

    html+=`</tr>`;
  });

  html+='</tbody></table>';
  el.innerHTML=html;
}

function renderRaceDashboard(){
  const wrap=document.getElementById("rd-table-wrap");
  if(!wrap)return;
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const allLaps=(d.laps||[]).filter(l=>l.lap_duration&&l.lap_duration>0);
  const stints=d.stints||[];
  const positions=d.positions||[];

  if(!allLaps.length){wrap.innerHTML='<div style="padding:16px;color:var(--text2);font-size:12px">No lap data available yet.</div>';return;}

  // Current lap = max lap across all drivers
  const globalMaxLap=Math.max(...allLaps.map(l=>l.lap_number));

  // Update range slider bounds
  const slMin=document.getElementById("rd-range-min");
  const slMax=document.getElementById("rd-range-max");
  if(slMin&&slMax){
    slMin.max=globalMaxLap;slMax.max=globalMaxLap;
    if(STATE.rdLapMax==null||STATE.rdLapMax>globalMaxLap)STATE.rdLapMax=globalMaxLap;
    if(STATE.rdLapMin>STATE.rdLapMax)STATE.rdLapMin=1;
    slMin.value=STATE.rdLapMin;slMax.value=STATE.rdLapMax;
    const lbl=document.getElementById("rd-range-label");
    if(lbl)lbl.textContent=`${STATE.rdLapMin} – ${STATE.rdLapMax}`;
  }

  // Apply lap range filter
  const lapMin=STATE.rdLapMin||1;
  const lapMax=STATE.rdLapMax||globalMaxLap;
  const rangeLaps=allLaps.filter(l=>l.lap_number>=lapMin&&l.lap_number<=lapMax);

  // Build per-driver lap arrays sorted by lap_number
  const byDriver={};
  rangeLaps.forEach(l=>{
    const dn=l.driver_number;
    if(!byDriver[dn])byDriver[dn]=[];
    byDriver[dn].push(l);
  });
  Object.values(byDriver).forEach(arr=>arr.sort((a,b)=>a.lap_number-b.lap_number));

  // Build stint map for compound lookup
  const stintMap={};
  stints.forEach(s=>{
    const dn=s.driver_number;
    if(!stintMap[dn])stintMap[dn]=[];
    stintMap[dn].push(s);
  });

  // Build position map
  const posMap={};
  const posByDriver={};
  positions.forEach(p=>{
    const dn=p.driver_number;
    if(!posByDriver[dn])posByDriver[dn]=[];
    posByDriver[dn].push(p);
  });

  // Compute cumulative time per driver (within range)
  const cumTimes={};
  Object.entries(byDriver).forEach(([dn,laps])=>{
    cumTimes[dn]=laps.reduce((s,l)=>s+l.lap_duration,0);
  });

  const driverList=Object.keys(byDriver).map(dn=>parseInt(dn));

  if(positions.length>0){
    Object.entries(posByDriver).forEach(([dn,parr])=>{
      parr.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
      const grid=parr[0]?parr[0].position:null;
      const current=parr[parr.length-1]?parr[parr.length-1].position:null;
      posMap[parseInt(dn)]={current,grid};
    });
  }

  const sortedByCum=[...driverList].sort((a,b)=>{
    const aMax=byDriver[a]?Math.max(...byDriver[a].map(l=>l.lap_number)):0;
    const bMax=byDriver[b]?Math.max(...byDriver[b].map(l=>l.lap_number)):0;
    if(aMax!==bMax)return bMax-aMax;
    return (cumTimes[a]||Infinity)-(cumTimes[b]||Infinity);
  });
  sortedByCum.forEach((dn,i)=>{
    if(!posMap[dn])posMap[dn]={current:i+1,grid:null};
    else if(posMap[dn].current==null)posMap[dn].current=i+1;
  });

  const W=STATE.rdTempoWindow;
  const refDn=STATE.rdRefDriver;
  let refTempo=null;

  const rows=driverList.map(dn=>{
    const drv=drivers[dn]||{};
    const dLaps=byDriver[dn]||[];
    const lastLap=dLaps[dLaps.length-1];
    const lastLapNum=lastLap?lastLap.lap_number:0;
    const lastLapTime=lastLap?lastLap.lap_duration:null;

    let compound="?";
    const dStints=stintMap[dn]||[];
    for(const st of dStints){
      if(lastLapNum>=st.lap_start&&lastLapNum<=st.lap_end){compound=(st.compound||"?").toUpperCase();break;}
    }

    let tyreAge=null;
    for(const st of dStints){
      if(lastLapNum>=st.lap_start&&lastLapNum<=st.lap_end){
        tyreAge=(st.tyre_age_at_start!=null?st.tyre_age_at_start:0)+(lastLapNum-st.lap_start);
        break;
      }
    }

    const pitStops=Math.max(0,dStints.filter(s=>(s.lap_start||0)<=lapMax&&(s.lap_end||999)>=lapMin).length-1);

    const cleanLaps=dLaps.filter(l=>!l.is_pit_out_lap&&l.lap_duration>0);
    const recentClean=cleanLaps.slice(-W);
    let tempo=null;
    if(recentClean.length>=2){
      const t=recentClean.map(l=>l.lap_duration);
      tempo=t.reduce((a,b)=>a+b,0)/t.length;
    }

    const bestLap=cleanLaps.length?Math.min(...cleanLaps.map(l=>l.lap_duration)):null;

    const pos=posMap[dn]||{};
    const currentPos=pos.current||999;
    const gridPos=pos.grid;
    const posChange=gridPos!=null?(gridPos-currentPos):null;

    const cumTime=cumTimes[dn]||0;
    const isPitOut=lastLap&&lastLap.is_pit_out_lap;

    const s1=lastLap?lastLap.duration_sector_1:null;
    const s2=lastLap?lastLap.duration_sector_2:null;
    const s3=lastLap?lastLap.duration_sector_3:null;

    return{dn,drv,lastLapNum,lastLapTime,compound,tyreAge,pitStops,tempo,bestLap,currentPos,gridPos,posChange,cumTime,isPitOut,s1,s2,s3};
  });

  rows.sort((a,b)=>a.currentPos-b.currentPos);

  const leader=rows[0];
  rows.forEach(r=>{
    if(r===leader){r.gapToLeader=0;r.interval=0;}
    else{
      r.gapToLeader=r.cumTime-leader.cumTime;
      if(r.lastLapNum<leader.lastLapNum)r.lapsDown=leader.lastLapNum-r.lastLapNum;
    }
  });
  for(let i=1;i<rows.length;i++){
    rows[i].interval=rows[i].cumTime-rows[i-1].cumTime;
    if(rows[i].lastLapNum<rows[i-1].lastLapNum)rows[i].intervalLapped=rows[i-1].lastLapNum-rows[i].lastLapNum;
  }

  if(refDn){const refRow=rows.find(r=>r.dn===refDn);refTempo=refRow?refRow.tempo:null;}

  const validLastLaps=rows.filter(r=>r.lastLapTime&&r.lastLapTime>0&&!r.isPitOut).map(r=>r.lastLapTime);
  const bestLastLap=validLastLaps.length?Math.min(...validLastLaps):null;
  const validTempos=rows.filter(r=>r.tempo).map(r=>r.tempo);
  const bestTempo=validTempos.length?Math.min(...validTempos):null;

  const lapBadge=document.getElementById("rd-lap-badge");
  if(lapBadge){
    const rangeActive=(lapMin>1||lapMax<globalMaxLap);
    lapBadge.textContent=rangeActive?`Laps ${lapMin}–${lapMax} of ${globalMaxLap}`:`Lap ${globalMaxLap}`;
  }

  const sel=document.getElementById("rd-ref-select");
  if(sel){
    let opts='<option value="">— none —</option>';
    rows.forEach(r=>{opts+=`<option value="${r.dn}"${r.dn===refDn?" selected":""}>${esc(r.drv.acronym||"#"+r.dn)} (P${r.currentPos})</option>`;});
    sel.innerHTML=opts;
  }

  let html='<table class="rd-table"><thead><tr>';
  html+='<th>P</th><th>+/-</th><th>Driver</th><th>Last Lap</th><th>S1</th><th>S2</th><th>S3</th>';
  html+='<th>Gap</th><th>Int</th>';
  html+='<th>Tyre</th><th>Age</th><th>Pits</th>';
  html+=`<th>Tempo (${W}L)</th><th>Best</th>`;
  if(refDn)html+=`<th>vs ${esc((drivers[refDn]||{}).acronym||"#"+refDn)}</th>`;
  html+='<th>Lap</th>';
  html+='</tr></thead><tbody>';

  const bestS1s=rows.filter(r=>r.s1>0).map(r=>r.s1);
  const bestS2s=rows.filter(r=>r.s2>0).map(r=>r.s2);
  const bestS3s=rows.filter(r=>r.s3>0).map(r=>r.s3);
  const bestS1=bestS1s.length?Math.min(...bestS1s):null;
  const bestS2=bestS2s.length?Math.min(...bestS2s):null;
  const bestS3=bestS3s.length?Math.min(...bestS3s):null;

  rows.forEach(r=>{
    const isRef=r.dn===refDn;
    const color=teamColor(r.drv.team||"");
    html+=`<tr class="${isRef?"rd-ref":""}">`;
    html+=`<td><span class="rd-pos" style="color:${color}">${r.currentPos}</span></td>`;
    let pcHtml="";
    if(r.posChange!=null){
      if(r.posChange>0)pcHtml=`<span class="rd-pos-change rd-pos-up">▲${r.posChange}</span>`;
      else if(r.posChange<0)pcHtml=`<span class="rd-pos-change rd-pos-down">▼${Math.abs(r.posChange)}</span>`;
      else pcHtml=`<span class="rd-pos-change rd-pos-same">—</span>`;
    }
    html+=`<td>${pcHtml}</td>`;
    html+=`<td><span class="rd-driver-name" style="color:${color}" onclick="setRdRefDriver(${r.dn})">${esc(r.drv.acronym||"#"+r.dn)}</span></td>`;
    const isLastBest=(bestLastLap&&r.lastLapTime&&Math.abs(r.lastLapTime-bestLastLap)<0.001&&!r.isPitOut);
    html+=`<td${isLastBest?' class="rd-best-lap"':""}>${r.lastLapTime?fmtTime(r.lastLapTime):"—"}${r.isPitOut?'<span class="rd-pit-badge">PIT</span>':""}</td>`;
    const s1Best=(bestS1&&r.s1&&Math.abs(r.s1-bestS1)<0.001);
    const s2Best=(bestS2&&r.s2&&Math.abs(r.s2-bestS2)<0.001);
    const s3Best=(bestS3&&r.s3&&Math.abs(r.s3-bestS3)<0.001);
    html+=`<td${s1Best?' style="color:var(--purple);font-weight:700"':""}>${r.s1?r.s1.toFixed(3):"—"}</td>`;
    html+=`<td${s2Best?' style="color:var(--purple);font-weight:700"':""}>${r.s2?r.s2.toFixed(3):"—"}</td>`;
    html+=`<td${s3Best?' style="color:var(--purple);font-weight:700"':""}>${r.s3?r.s3.toFixed(3):"—"}</td>`;
    if(r===leader){html+=`<td style="font-weight:700;color:var(--text)">LEADER</td>`;}
    else if(r.lapsDown){html+=`<td class="rd-gap">+${r.lapsDown}L</td>`;}
    else{html+=`<td class="rd-gap">+${r.gapToLeader.toFixed(1)}s</td>`;}
    if(r===leader){html+=`<td>—</td>`;}
    else if(r.intervalLapped){html+=`<td class="rd-gap">+${r.intervalLapped}L</td>`;}
    else{html+=`<td class="rd-gap">+${r.interval.toFixed(1)}s</td>`;}
    const compCol=resolveColor(compoundColor(r.compound));
    html+=`<td><span class="rd-compound" style="background:${compCol}"></span>${r.compound}</td>`;
    html+=`<td>${r.tyreAge!=null?r.tyreAge+"L":"—"}</td>`;
    html+=`<td>${r.pitStops}</td>`;
    const isBestTempo=(bestTempo&&r.tempo&&Math.abs(r.tempo-bestTempo)<0.001);
    if(r.tempo){html+=`<td${isBestTempo?' class="rd-best-lap"':""}>${fmtTime(r.tempo)}</td>`;}
    else{html+=`<td>—</td>`;}
    html+=`<td>${r.bestLap?fmtTime(r.bestLap):"—"}</td>`;
    if(refDn){
      if(r.tempo&&refTempo){
        const diff=r.tempo-refTempo;
        if(Math.abs(diff)<0.005){html+=`<td class="rd-tempo-neutral">0.000</td>`;}
        else if(diff<0){html+=`<td class="rd-tempo-good">${diff.toFixed(3)}</td>`;}
        else{html+=`<td class="rd-tempo-bad">+${diff.toFixed(3)}</td>`;}
      }else{html+=`<td>—</td>`;}
    }
    html+=`<td style="color:var(--text2)">${r.lastLapNum}</td>`;
    html+='</tr>';
  });

  html+='</tbody></table>';
  wrap.innerHTML=html;

  // Update strategy views if visible
  if(STATE.rdShowStrategy)setRdStrategyMode(STATE.rdStrategyMode);
}

/**
 * Classify a race control message for UI display.
 * Uses OpenF1 'category' field primarily, avoids false positives from
 * steward investigation messages that mention "SAFETY CAR" in text.
 */
function _rcCategoryClass(msg){
  const cat=(msg.category||"").toLowerCase();
  const flag=(msg.flag||"").toUpperCase();
  const m=(msg.message||"").toUpperCase();
  // SafetyCar category — explicit SC events
  if(cat==="safetycar")return m.includes("IN THIS LAP")?"sc_end":"sc";
  // Virtual Safety Car
  if(cat.includes("virtual")){
    if(m.includes("ENDING")||m.includes("VSC ENDING"))return"vsc_end";
    return"vsc";
  }
  // Flag-based classification
  if(flag==="RED")return"red";
  if(flag==="YELLOW"||flag==="DOUBLE YELLOW")return"flag";
  // CLEAR in a specific sector is a local yellow clear, not global
  if(flag==="CLEAR")return"sector_clear";
  // GREEN flag — distinguish pit exit from global green
  if(flag==="GREEN"){
    if(m.includes("PIT EXIT"))return"pit_status";
    return"green";
  }
  // Session status
  if(cat==="sessionstatus")return m.includes("ABORTED")||m.includes("STOPPED")?"red":"other";
  // DRS
  if(m.includes("DRS ENABLED")||m.includes("DRS DISABLED"))return"drs";
  return"other";
}

function _rcDisplayClass(cls){
  // Map internal class to CSS display class
  if(cls==="sc"||cls==="sc_end")return"sc";
  if(cls==="vsc"||cls==="vsc_end")return"vsc";
  if(cls==="red")return"red";
  if(cls==="flag")return"flag";
  if(cls==="sector_clear"||cls==="green")return"clear";
  if(cls==="drs")return"drs";
  if(cls==="pit_status")return"other";
  return"other";
}

function _rcCategoryLabel(cls){
  return{sc:"SC",sc_end:"SC",vsc:"VSC",vsc_end:"VSC",red:"RED",flag:"YF",
    sector_clear:"CLR",green:"GRN",drs:"DRS",pit_status:"PIT",other:"RC"}[cls]||"RC";
}

/* ── RC driver filter & sound ── */
function setRcDriverFilter(v){
  STATE.rcDriverFilter=v?parseInt(v):null;
  renderRaceControl();
}
function toggleRcSound(){
  STATE.rcSoundEnabled=!STATE.rcSoundEnabled;
  const btn=document.getElementById("rc-sound-btn");
  if(btn)btn.classList.toggle("active",STATE.rcSoundEnabled);
  // Init audio context on first user interaction (browser requirement)
  if(STATE.rcSoundEnabled&&!window._rcAudioCtx){
    try{window._rcAudioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){console.warn("AudioContext unavailable");}
  }
}
function _rcPlaySound(type){
  const ctx=window._rcAudioCtx;if(!ctx)return;
  try{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    gain.gain.value=0.18;
    if(type==="red"){
      // Triple descending alarm tone
      osc.type="square";osc.frequency.value=880;
      osc.frequency.setValueAtTime(880,ctx.currentTime);
      osc.frequency.setValueAtTime(660,ctx.currentTime+0.15);
      osc.frequency.setValueAtTime(440,ctx.currentTime+0.3);
      gain.gain.setValueAtTime(0.22,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.55);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.55);
    }else if(type==="sc"){
      // Two-tone siren
      osc.type="sawtooth";osc.frequency.value=600;
      osc.frequency.setValueAtTime(600,ctx.currentTime);
      osc.frequency.setValueAtTime(800,ctx.currentTime+0.2);
      osc.frequency.setValueAtTime(600,ctx.currentTime+0.4);
      osc.frequency.setValueAtTime(800,ctx.currentTime+0.6);
      gain.gain.setValueAtTime(0.15,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);
    }else if(type==="yellow"){
      // Quick double beep
      osc.type="triangle";osc.frequency.value=520;
      gain.gain.setValueAtTime(0.15,ctx.currentTime);
      gain.gain.setValueAtTime(0.001,ctx.currentTime+0.08);
      gain.gain.setValueAtTime(0.15,ctx.currentTime+0.14);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.28);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    }else{
      // Generic single beep
      osc.type="sine";osc.frequency.value=440;
      gain.gain.setValueAtTime(0.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.2);
    }
  }catch(e){}
}

function _rcMatchesDriverFilter(msg){
  const filt=STATE.rcDriverFilter;
  if(!filt)return true; // all
  const d=STATE.sessionData;if(!d)return true;
  const drivers=d.drivers||{};
  const drv=drivers[filt];
  if(!drv)return true;
  // Check driver_number field
  if(msg.driver_number===filt)return true;
  // Check message text for driver name / acronym / number
  const txt=(msg.message||"").toUpperCase();
  if(txt.includes(String(filt)))return true;
  if(drv.acronym&&txt.includes(drv.acronym.toUpperCase()))return true;
  if(drv.full_name){
    const parts=drv.full_name.toUpperCase().split(/\s+/);
    if(parts.some(p=>p.length>2&&txt.includes(p)))return true;
  }
  return false;
}

function renderRcToolbar(){
  const tb=document.getElementById("rc-toolbar");
  if(!tb)return;
  const d=STATE.sessionData;if(!d)return;
  const drivers=d.drivers||{};
  const filt=STATE.rcDriverFilter;
  let html='<span style="font-size:10px;color:var(--text2)">Filter:</span>';
  html+=`<button class="filter-chip${!filt?" active":""}" onclick="setRcDriverFilter(null)" style="font-size:10px">All</button>`;
  // Add top drivers as quick filters
  const drvList=Object.values(drivers).sort((a,b)=>(a.acronym||"").localeCompare(b.acronym||""));
  drvList.forEach(dr=>{
    const sel=filt===dr.number;
    const col=teamColor(dr.team||"");
    html+=`<button class="filter-chip${sel?" active":""}" onclick="setRcDriverFilter(${dr.number})" style="font-size:10px;${sel?"background:"+col+";color:#fff;border-color:"+col:"border-left:3px solid "+col}">${esc(dr.acronym||"#"+dr.number)}</button>`;
  });
  html+=`<button id="rc-sound-btn" class="rc-sound-btn${STATE.rcSoundEnabled?" active":""}" onclick="toggleRcSound()"><span class="snd-icon">${STATE.rcSoundEnabled?"&#128264;":"&#128263;"}</span> Sound</button>`;
  tb.innerHTML=html;
}

function renderRaceControl(){
  const el=document.getElementById("rc-messages-list");
  const countEl=document.getElementById("rc-count");
  if(!el)return;
  const d=STATE.sessionData;
  const allMsgs=(d&&d.race_control)||[];

  // Render toolbar
  renderRcToolbar();

  if(countEl)countEl.textContent=allMsgs.length?`(${allMsgs.length})`:"";
  if(!allMsgs.length){
    el.innerHTML='<div style="padding:16px;color:var(--text2);font-size:12px">No race control messages for this session.</div>';
    return;
  }
  // Track last date for incremental polling
  const lastMsg=allMsgs[allMsgs.length-1];
  if(lastMsg&&lastMsg.date)STATE.raceControlLastDate=lastMsg.date;

  // Apply driver filter
  const msgs=allMsgs.filter(m=>_rcMatchesDriverFilter(m));

  // Sound notifications for new messages (works for both live and replay)
  if(STATE.rcSoundEnabled){
    const prevCount=STATE._rcLastSoundCount||0;
    if(allMsgs.length>prevCount){
      const newMsgs=allMsgs.slice(prevCount);
      // Play sound for the most severe new message
      let worstType="info";
      newMsgs.forEach(m=>{
        const cls=_rcCategoryClass(m);
        if(cls==="red"&&worstType!=="red")worstType="red";
        else if((cls==="sc"||cls==="sc_end")&&worstType!=="red")worstType="sc";
        else if((cls==="vsc"||cls==="vsc_end")&&worstType!=="red"&&worstType!=="sc")worstType="sc";
        else if(cls==="flag"&&worstType==="info")worstType="yellow";
      });
      _rcPlaySound(worstType);
    }
    STATE._rcLastSoundCount=allMsgs.length;
  }
  STATE.rcLastSoundDate=lastMsg.date||STATE.rcLastSoundDate;

  let html="";
  const filt=STATE.rcDriverFilter;
  if(filt&&msgs.length<allMsgs.length){
    const drv=(d.drivers||{})[filt];
    html+=`<div style="padding:4px 8px;font-size:10px;color:var(--text2);background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)">Showing ${msgs.length} of ${allMsgs.length} messages for <strong style="color:${teamColor((drv&&drv.team)||"")}">${esc((drv&&drv.acronym)||"#"+filt)}</strong></div>`;
  }
  msgs.forEach(msg=>{
    const cls=_rcCategoryClass(msg);
    const dispCls=_rcDisplayClass(cls);
    const label=_rcCategoryLabel(cls);
    const time=msg.date?new Date(msg.date).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";
    const lap=msg.lap_number?("L"+msg.lap_number):"";
    const dn=msg.driver_number?(" #"+msg.driver_number):"";
    html+=`<div class="rc-msg">
      <span class="rc-time">${esc(time)}</span>
      <span class="rc-lap">${esc(lap)}</span>
      <span class="rc-cat rc-cat-${dispCls}">${label}</span>
      <span class="rc-text">${esc(msg.message||"")}${dn}</span>
    </div>`;
  });
  el.innerHTML=html;
  // Auto-scroll to bottom
  el.scrollTop=el.scrollHeight;
}

/**
 * Build a map of lap_number -> Set of flags active during that lap,
 * derived from real race control messages.
 * SC flag only for race/sprint; YF/VSC for all sessions.
 * Uses explicit start/end messages — no aggressive range inference.
 * Returns: { lapNumber: Set<"SC"|"VSC"|"YELLOW"|"RED"> }
 */
function getRaceControlFlags(){
  const d=STATE.sessionData;if(!d)return{};
  const msgs=(d.race_control||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  if(!msgs.length)return{};

  const isRaceSession=(STATE.sessionType==="race"||STATE.sessionType==="sprint");
  const flags={}; // lapNumber -> Set of flags

  // Single-pass state machine tracking global conditions
  let scActive=false,scStartLap=null;
  let vscActive=false,vscStartLap=null;
  let redActive=false,redStartLap=null;

  function markRange(startLap,endLap,flag){
    if(startLap==null||endLap==null)return;
    for(let l=startLap;l<=endLap;l++){
      if(!flags[l])flags[l]=new Set();
      flags[l].add(flag);
    }
  }

  msgs.forEach(msg=>{
    const cls=_rcCategoryClass(msg);
    const lap=msg.lap_number;

    // === Safety Car (race/sprint only) ===
    if(cls==="sc"&&isRaceSession&&!scActive){
      scActive=true;scStartLap=lap||scStartLap;
    }
    if(cls==="sc_end"&&scActive){
      // "SAFETY CAR IN THIS LAP" = SC ends this lap
      const endLap=lap||scStartLap;
      markRange(scStartLap,endLap,"SC");
      scActive=false;scStartLap=null;
    }

    // === Virtual Safety Car (all sessions) ===
    if(cls==="vsc"&&!vscActive){
      vscActive=true;vscStartLap=lap||vscStartLap;
    }
    if(cls==="vsc_end"&&vscActive){
      const endLap=lap||vscStartLap;
      markRange(vscStartLap,endLap,"VSC");
      vscActive=false;vscStartLap=null;
    }

    // === Red flag (all sessions) ===
    if(cls==="red"&&!redActive){
      redActive=true;redStartLap=lap||redStartLap;
      // Red ends SC/VSC
      if(scActive&&scStartLap!=null)markRange(scStartLap,lap||scStartLap,"SC");
      scActive=false;scStartLap=null;
      if(vscActive&&vscStartLap!=null)markRange(vscStartLap,lap||vscStartLap,"VSC");
      vscActive=false;vscStartLap=null;
    }

    // === Green flag (global restart) ends SC/VSC/RED ===
    if(cls==="green"){
      if(scActive&&scStartLap!=null){markRange(scStartLap,lap||scStartLap,"SC");scActive=false;scStartLap=null;}
      if(vscActive&&vscStartLap!=null){markRange(vscStartLap,lap||vscStartLap,"VSC");vscActive=false;vscStartLap=null;}
      if(redActive&&redStartLap!=null){markRange(redStartLap,lap||redStartLap,"RED");redActive=false;redStartLap=null;}
    }

    // === Yellow flag (sector-local) — only flag the specific lap ===
    if(cls==="flag"&&lap){
      if(!flags[lap])flags[lap]=new Set();
      flags[lap].add("YELLOW");
    }

    // === Mark RED for the lap if red is active ===
    if(redActive&&lap){
      if(!flags[lap])flags[lap]=new Set();
      flags[lap].add("RED");
    }
  });

  // Close any still-open periods at the last lap that has messages
  const allLapNums=msgs.filter(m=>m.lap_number).map(m=>m.lap_number);
  if(allLapNums.length){
    const maxLap=Math.max(...allLapNums);
    // Only extend by 1 lap beyond last mention (conservative)
    if(scActive&&scStartLap!=null)markRange(scStartLap,Math.min(scStartLap+3,maxLap),"SC");
    if(vscActive&&vscStartLap!=null)markRange(vscStartLap,Math.min(vscStartLap+3,maxLap),"VSC");
    if(redActive&&redStartLap!=null)markRange(redStartLap,maxLap,"RED");
  }

  return flags;
}

/* ══════════════════════════════════════════════════════════════════════════════
   LAPS TABLE
   ══════════════════════════════════════════════════════════════════════════════ */
function getProcessedLaps(){
  const d=STATE.sessionData;
  if(!d)return[];
  const drivers=d.drivers||{};
  const laps=(d.laps||[]).filter(l=>l.lap_duration&&l.lap_duration>0);
  const stints=d.stints||[];

  // Build stint lookup: driver_number -> [{stint_number, compound, ...}]
  const stintMap={};
  stints.forEach(s=>{
    const dn=s.driver_number;
    if(!stintMap[dn])stintMap[dn]=[];
    stintMap[dn].push(s);
  });

  // Enrich laps
  const enriched=laps.map(l=>{
    const drv=drivers[l.driver_number]||{};
    // Find compound + tyre freshness from stint
    let compound="UNKNOWN",isFresh=null,tyreAge=null,stintNum=0;
    const dStints=stintMap[l.driver_number]||[];
    for(const st of dStints){
      if(l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end){
        compound=(st.compound||"UNKNOWN").toUpperCase();
        stintNum=st.stint_number||0;
        const ageAtStart=st.tyre_age_at_start;
        if(ageAtStart!=null){
          tyreAge=ageAtStart+(l.lap_number-st.lap_start);
          isFresh=(ageAtStart===0);
        }
        break;
      }
    }
    return{...l,acronym:drv.acronym||"#"+l.driver_number,team:drv.team||"",teamColour:drv.team_colour||"",compound,isFresh,tyreAge,stintNum};
  });

  // Apply filters
  let filtered=enriched;
  if(STATE.driverFilter.size>0)filtered=filtered.filter(l=>STATE.driverFilter.has(l.driver_number));
  if(STATE.compoundFilter)filtered=filtered.filter(l=>l.compound===STATE.compoundFilter);
  // Qualifying phase filter
  if(STATE.qualiPhase&&STATE.qualiPhases){
    filtered=filtered.filter(l=>getQualiPhaseForLap(l.driver_number,l.lap_number)===STATE.qualiPhase);
  }

  return filtered;
}

function renderLapsTable(){
  const el=document.getElementById("laps-table-scroll");
  if(!el)return;
  const laps=getProcessedLaps();
  const sType=STATE.sessionType;

  if(laps.length===0){el.innerHTML='<div class="empty-state">No laps match current filters</div>';return;}

  // Find fastest for highlighting
  const fastest=Math.min(...laps.map(l=>l.lap_duration));
  const bestS1=Math.min(...laps.filter(l=>l.duration_sector_1>0).map(l=>l.duration_sector_1));
  const bestS2=Math.min(...laps.filter(l=>l.duration_sector_2>0).map(l=>l.duration_sector_2));
  const bestS3=Math.min(...laps.filter(l=>l.duration_sector_3>0).map(l=>l.duration_sector_3));

  // Sort
  laps.sort((a,b)=>{
    let va,vb;
    switch(STATE.sortCol){
      case"driver":va=a.acronym;vb=b.acronym;return STATE.sortDir*(va<vb?-1:va>vb?1:0);
      case"lap":return STATE.sortDir*(a.lap_number-b.lap_number);
      case"time":return STATE.sortDir*(a.lap_duration-b.lap_duration);
      case"s1":return STATE.sortDir*((a.duration_sector_1||99)-(b.duration_sector_1||99));
      case"s2":return STATE.sortDir*((a.duration_sector_2||99)-(b.duration_sector_2||99));
      case"s3":return STATE.sortDir*((a.duration_sector_3||99)-(b.duration_sector_3||99));
      case"st":return STATE.sortDir*((b.st_speed||0)-(a.st_speed||0));
      case"i1":return STATE.sortDir*((b.i1_speed||0)-(a.i1_speed||0));
      case"i2":return STATE.sortDir*((b.i2_speed||0)-(a.i2_speed||0));
      default:return STATE.sortDir*(a.lap_duration-b.lap_duration);
    }
  });

  // Build table
  const isPractice=sType==="practice";
  const isRace=sType==="race"||sType==="sprint";
  const isQuali=sType==="qualifying"||sType==="sprint_quali";
  const hasI1=laps.some(l=>l.i1_speed>0);
  const hasI2=laps.some(l=>l.i2_speed>0);
  let html='<table class="data-table"><thead><tr>';
  html+=`<th onclick="sortLaps('driver')">Driver</th>`;
  html+=`<th onclick="sortLaps('lap')">Lap</th>`;
  if(isQuali&&STATE.qualiPhases)html+=`<th>Phase</th>`;
  html+=`<th onclick="sortLaps('time')">Time</th>`;
  html+=`<th>Gap</th>`;
  html+=`<th onclick="sortLaps('s1')">S1</th>`;
  html+=`<th onclick="sortLaps('s2')">S2</th>`;
  html+=`<th onclick="sortLaps('s3')">S3</th>`;
  if(hasI1)html+=`<th onclick="sortLaps('i1')">I1</th>`;
  if(hasI2)html+=`<th onclick="sortLaps('i2')">I2</th>`;
  html+=`<th onclick="sortLaps('st')">ST</th>`;
  if(isPractice||isRace)html+=`<th>Compound</th>`;
  html+='</tr></thead><tbody>';

  const PHASE_COLORS={Q1:"var(--green)",Q2:"var(--yellow)",Q3:"var(--accent)"};
  laps.forEach((l,i)=>{
    const gap=l.lap_duration-fastest;
    const isBest=Math.abs(gap)<0.0005;
    const isS1Best=l.duration_sector_1>0&&Math.abs(l.duration_sector_1-bestS1)<0.0005;
    const isS2Best=l.duration_sector_2>0&&Math.abs(l.duration_sector_2-bestS2)<0.0005;
    const isS3Best=l.duration_sector_3>0&&Math.abs(l.duration_sector_3-bestS3)<0.0005;
    const isSlotted=STATE.telemSlots.some(s=>s&&s.dn===l.driver_number&&s.lapNum===l.lap_number);
    const qPhase=isQuali?getQualiPhaseForLap(l.driver_number,l.lap_number):null;

    html+=`<tr class="${isSlotted?"selected":""}" onclick="selectLapForTelem(${l.driver_number},${l.lap_number},${l.lap_duration||0})" style="cursor:pointer" title="Click to select for telemetry comparison">
      <td><div class="driver-cell"><span class="team-dot" style="background:${teamColor(l.team)}"></span>${esc(l.acronym)}</div></td>
      <td>${l.lap_number||"?"}</td>
      ${isQuali&&STATE.qualiPhases?`<td><span style="color:${PHASE_COLORS[qPhase]||"var(--text2)"};font-weight:700;font-size:10px">${qPhase||"?"}</span></td>`:""}
      <td class="time${isBest?" best":""}">${fmtTime(l.lap_duration)}</td>
      <td class="gap">${isBest?"":fmtGap(gap)}</td>
      <td class="time${isS1Best?" best":""}">${l.duration_sector_1?l.duration_sector_1.toFixed(3):"—"}</td>
      <td class="time${isS2Best?" best":""}">${l.duration_sector_2?l.duration_sector_2.toFixed(3):"—"}</td>
      <td class="time${isS3Best?" best":""}">${l.duration_sector_3?l.duration_sector_3.toFixed(3):"—"}</td>
      ${hasI1?`<td>${l.i1_speed||"—"}</td>`:""}
      ${hasI2?`<td>${l.i2_speed||"—"}</td>`:""}
      <td>${l.st_speed||"—"}</td>
      ${isPractice||isRace?`<td><span class="compound-badge ${l.compound}">${l.compound}</span></td>`:""}
    </tr>`;
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

function sortLaps(col){
  if(STATE.sortCol===col)STATE.sortDir*=-1;
  else{STATE.sortCol=col;STATE.sortDir=1;}
  renderLapsTable();
}

function renderStintsTable(){
  const el=document.getElementById("stints-table-scroll");
  if(!el)return;
  const d=STATE.sessionData;
  if(!d)return;
  const drivers=d.drivers||{};
  const stints=d.stints||[];
  const laps=d.laps||[];
  if(stints.length===0){el.innerHTML='<div class="empty-state">No stint data available</div>';return;}

  // Enrich stints with avg pace
  const enriched=stints.map(st=>{
    const drv=drivers[st.driver_number]||{};
    const stintLaps=laps.filter(l=>l.driver_number===st.driver_number&&l.lap_number>=st.lap_start&&l.lap_number<=st.lap_end&&l.lap_duration>0);
    // Remove outliers (in/out laps) - laps >107% of median
    const sorted=[...stintLaps].sort((a,b)=>a.lap_duration-b.lap_duration);
    const median=sorted.length>0?sorted[Math.floor(sorted.length/2)].lap_duration:0;
    const clean=stintLaps.filter(l=>median>0&&l.lap_duration<median*1.07);
    const avgPace=clean.length>0?clean.reduce((s,l)=>s+l.lap_duration,0)/clean.length:0;
    const lapCount=st.lap_end-st.lap_start+1;
    return{...st,acronym:drv.acronym||"#"+st.driver_number,team:drv.team||"",avgPace,cleanLaps:clean.length,totalLaps:lapCount,compound:(st.compound||"UNKNOWN").toUpperCase()};
  });

  enriched.sort((a,b)=>(a.avgPace||999)-(b.avgPace||999));

  let html='<table class="data-table"><thead><tr>';
  html+='<th>Driver</th><th>Stint</th><th>Compound</th><th>Laps</th><th>Avg Pace</th><th>Clean Laps</th>';
  html+='</tr></thead><tbody>';
  enriched.forEach(st=>{
    html+=`<tr>
      <td><div class="driver-cell"><span class="team-dot" style="background:${teamColor(st.team)}"></span>${esc(st.acronym)}</div></td>
      <td>${st.stint_number||"?"}</td>
      <td><span class="compound-badge ${st.compound}">${st.compound}</span></td>
      <td>L${st.lap_start}–L${st.lap_end} (${st.totalLaps})</td>
      <td class="time">${st.avgPace>0?fmtTime(st.avgPace):"—"}</td>
      <td>${st.cleanLaps}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

/* ══════════════════════════════════════════════════════════════════════════════
   LAP SCATTER CHART
   ══════════════════════════════════════════════════════════════════════════════ */
/* Resolve CSS var to actual color (cached) */
const _colorCache={};
function resolveColor(cssVal){
  if(_colorCache[cssVal])return _colorCache[cssVal];
  if(!cssVal.includes("var(")){_colorCache[cssVal]=cssVal;return cssVal;}
  const t=document.createElement("span");t.style.color=cssVal;document.body.appendChild(t);
  const c=getComputedStyle(t).color;t.remove();
  _colorCache[cssVal]=c;return c;
}

function drawLapScatter(){
  const canvas=document.getElementById("scatter-canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=260;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);

  const laps=getProcessedLaps();
  if(laps.length===0){ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--text2");ctx.font="13px sans-serif";ctx.textAlign="center";ctx.fillText("No data",W/2,H/2);return;}

  const cs=getComputedStyle(document.documentElement);
  const textColor=cs.getPropertyValue("--text2").trim();
  const gridColor=cs.getPropertyValue("--border").trim();
  const sType=STATE.sessionType;

  const ml=55,mr=16,mt=12,mb=30;
  const pw=W-ml-mr,ph=H-mt-mb;

  // Compute cutoff: median + 7% → "representative" laps; above = outliers (in/out laps, slow laps, traffic)
  const times=laps.map(l=>l.lap_duration);
  const sorted=times.slice().sort((a,b)=>a-b);
  const median=sorted[Math.floor(sorted.length/2)];
  const CUTOFF_PCT=1.07;
  const cutoff=median*CUTOFF_PCT;
  const validCount=laps.filter(l=>l.lap_duration<cutoff).length;
  const invalidCount=laps.length-validCount;

  // Y-axis range: extend to cover outliers too, but compress them
  // Use valid range for main area, then add a compressed zone at top for outliers
  const validTimes=times.filter(t=>t<cutoff);
  const minT=validTimes.length?Math.min(...validTimes):Math.min(...times);
  const maxValid=validTimes.length?Math.max(...validTimes):Math.max(...times);
  const maxAll=Math.max(...times);
  // Reserve top 15% of chart for compressed outlier zone
  const outlierZoneFrac=invalidCount>0?0.15:0;
  const mainPh=ph*(1-outlierZoneFrac);
  const outlierPh=ph*outlierZoneFrac;
  const rangeValid=maxValid-minT||1;
  const rangeOutlier=maxAll-cutoff||1;

  // Helper: y position for a lap time
  function yForTime(t){
    if(t<cutoff){
      return mt+outlierPh+mainPh*(1-(t-minT)/rangeValid);
    }else{
      // Compressed outlier zone at top
      const frac=Math.min(1,(t-cutoff)/rangeOutlier);
      return mt+outlierPh*(1-frac);
    }
  }

  const lapNums=laps.map(l=>l.lap_number);
  const minLap=Math.min(...lapNums);
  const maxLap=Math.max(...lapNums);
  const rangeLap=maxLap-minLap||1;

  // Cutoff separator line
  if(invalidCount>0){
    const cutY=yForTime(cutoff);
    ctx.strokeStyle=cs.getPropertyValue("--accent").trim();ctx.lineWidth=0.8;
    ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(ml,cutY);ctx.lineTo(ml+pw,cutY);ctx.stroke();ctx.setLineDash([]);
    ctx.font="8px sans-serif";ctx.fillStyle=cs.getPropertyValue("--accent").trim();ctx.textAlign="left";
    ctx.fillText(`▲ excluded: >${Math.round((CUTOFF_PCT-1)*100)}% off median (in/out laps, traffic, slow laps)`,ml+4,cutY-3);
  }

  // Grid lines (valid zone)
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.font="9px sans-serif";ctx.fillStyle=textColor;
  for(let i=0;i<=4;i++){
    const tv=minT+rangeValid*i/4;
    const y=yForTime(tv);
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(fmtTime(tv),ml-4,y+3);
  }
  // X labels
  const xSteps=Math.min(rangeLap,12);
  for(let i=0;i<=xSteps;i++){
    const lapN=Math.round(minLap+rangeLap*i/xSteps);
    const x=ml+pw*((lapN-minLap)/rangeLap);
    ctx.textAlign="center";ctx.fillText("L"+lapN,x,H-4);
  }

  // Plot ALL points — invalid ones as dimmed hollow rings
  // Fresh tyres = filled dot, Used tyres = hollow dot with dash
  // Draw invalid first (behind)
  laps.forEach(l=>{
    if(l.lap_duration<cutoff)return;
    const x=ml+pw*((l.lap_number-minLap)/rangeLap);
    const y=yForTime(l.lap_duration);
    let color;
    if(sType==="practice") color=resolveColor(compoundColor(l.compound));
    else color=teamColor(l.team);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.strokeStyle=color;ctx.lineWidth=1.2;ctx.globalAlpha=0.3;ctx.stroke();ctx.globalAlpha=1;
  });
  // Draw valid on top
  laps.forEach(l=>{
    if(l.lap_duration>=cutoff)return;
    const x=ml+pw*((l.lap_number-minLap)/rangeLap);
    const y=yForTime(l.lap_duration);
    let color;
    if(sType==="practice") color=resolveColor(compoundColor(l.compound));
    else color=teamColor(l.team);
    const isUsed=(l.isFresh===false);
    if(isUsed){
      // Used tyre — hollow ring with diagonal line
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=1.4;ctx.globalAlpha=0.75;ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-2.5,y+2.5);ctx.lineTo(x+2.5,y-2.5);ctx.stroke();
      ctx.globalAlpha=1;
    }else{
      // Fresh or unknown — filled dot
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
    }
  });

  // For qualifying, color by phase
  const isQuali=sType==="qualifying"||sType==="sprint_quali";
  const PHASE_DOT_COLORS={Q1:"var(--green)",Q2:"var(--yellow)",Q3:"var(--accent)"};

  // Store coordinate system for lasso hit-testing
  function xForLap(ln){return ml+pw*((ln-minLap)/rangeLap)}
  STATE.scatterCoord={laps,ml,mr,mt,mb,pw,ph,minLap,maxLap,rangeLap,yForTime,xForLap,cutoff,W,H};

  // ── LASSO RESULT OVERLAY ──
  const LR=STATE.scatterLassoResult;
  if(LR&&LR.count>0){
    // Highlight selected dots with ring
    LR.laps.forEach(en=>{
      const px=xForLap(en.lap_number),py=yForTime(en.lap_duration);
      ctx.save();ctx.strokeStyle="#fff";ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.stroke();ctx.restore();
    });
    // Draw lasso rect
    ctx.save();ctx.strokeStyle="rgba(99,179,237,0.7)";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    const lx=LR.lx,ly=LR.ty,lw=LR.rx-LR.lx,lh=LR.by-LR.ty;
    ctx.strokeRect(lx,ly,lw,lh);ctx.fillStyle="rgba(99,179,237,0.06)";ctx.fillRect(lx,ly,lw,lh);
    ctx.setLineDash([]);ctx.restore();
    // Lasso average line
    const lassoAvgY=yForTime(LR.avg);
    if(lassoAvgY>=mt&&lassoAvgY<=H-mb){
      ctx.save();ctx.strokeStyle="#f59e0b";ctx.lineWidth=2;ctx.setLineDash([8,4]);
      ctx.beginPath();ctx.moveTo(Math.max(LR.lx,ml),lassoAvgY);ctx.lineTo(Math.min(LR.rx,ml+pw),lassoAvgY);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle="#f59e0b";ctx.font="bold 10px sans-serif";ctx.textAlign="center";
      ctx.fillText("Lasso avg "+fmtTime(LR.avg),(LR.lx+LR.rx)/2,lassoAvgY-6);ctx.restore();
    }
    // Show lasso info badge
    const lassoInfo=document.getElementById("scatter-lasso-info");
    if(lassoInfo){
      // Per-compound/team breakdown
      const lComp={};
      LR.laps.forEach(en=>{
        const key=sType==="practice"?en.compound:en.team;
        if(!lComp[key])lComp[key]={sum:0,cnt:0};
        lComp[key].sum+=en.lap_duration;lComp[key].cnt++;
      });
      let compHtml=Object.entries(lComp).map(([c,v])=>{
        const col=sType==="practice"?resolveColor(compoundColor(c)):teamColor(c);
        return`<div style="margin-top:2px"><span style="color:${col}">${esc(c)}</span>: ${fmtTime(v.sum/v.cnt)} <span style="opacity:.6">(${v.cnt}L)</span></div>`;
      }).join("");
      // Degradation analysis
      const degResults=computeLassoDeg(LR.laps);
      let degHtml="";
      if(degResults&&degResults.length){
        degHtml='<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:4px"><div style="font-weight:700;font-size:10px;color:var(--yellow);margin-bottom:2px">Tyre Deg Rate</div>';
        degResults.forEach(dr=>{
          const degStr=dr.slope>=0?"+"+dr.slope.toFixed(3):dr.slope.toFixed(3);
          degHtml+=`<div style="font-size:10px;margin-top:1px"><span style="color:${teamColor(dr.team)};font-weight:700">${esc(dr.acronym)}</span>: ${degStr} s/lap <span style="opacity:.6">(${dr.laps}L, avg ${fmtTime(dr.avg)})</span></div>`;
        });
        degHtml+='</div>';
      }
      lassoInfo.innerHTML=`<div class="sli-title">Lasso Selection</div><div class="sli-val">${fmtTime(LR.avg)}</div><div style="font-size:10px;margin-top:2px">${LR.count} laps &middot; ${fmtTime(LR.min)}&ndash;${fmtTime(LR.max)}</div>${compHtml}${degHtml}`;
      lassoInfo.style.display="block";
    }
  }else{
    const lassoInfo=document.getElementById("scatter-lasso-info");
    if(lassoInfo)lassoInfo.style.display="none";
  }

  // Build legend
  const legendEl=document.getElementById("scatter-legend");
  if(legendEl){
    let lh="";
    if(sType==="practice"){
      const compounds=new Set(laps.map(l=>l.compound));
      compounds.forEach(c=>{
        lh+=`<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${resolveColor(compoundColor(c))}"></span>${c}</span>`;
      });
    }else if(isQuali){
      ["Q1","Q2","Q3"].forEach(q=>{
        if(STATE.qualiPhases&&STATE.qualiPhases[q]&&STATE.qualiPhases[q].length)
          lh+=`<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${resolveColor(PHASE_DOT_COLORS[q])}"></span>${q}</span>`;
      });
      const teams=new Set(laps.map(l=>l.team));
      teams.forEach(t=>{
        lh+=`<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${teamColor(t)}"></span>${esc(t)}</span>`;
      });
    }else{
      const teams=new Set(laps.map(l=>l.team));
      teams.forEach(t=>{
        lh+=`<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${teamColor(t)}"></span>${esc(t)}</span>`;
      });
    }
    // Fresh vs used tyre legend (if any used tyres exist)
    const hasUsed=laps.some(l=>l.isFresh===false);
    if(hasUsed){
      lh+='<span style="width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0"></span>';
      lh+='<span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--text2)"></span>Fresh</span>';
      lh+='<span class="chart-legend-item"><span class="chart-legend-dot hollow" style="border-color:var(--text2);position:relative"><span style="position:absolute;top:1px;left:0;font-size:6px;line-height:1">/</span></span>Used</span>';
    }
    if(invalidCount>0){
      lh+=`<span class="chart-legend-item"><span class="chart-legend-dot hollow" style="border-color:var(--text2)"></span>Excluded (${invalidCount} laps &gt;107% median)</span>`;
    }
    lh+=`<span class="chart-legend-item" style="margin-left:auto;opacity:.7">${validCount} valid / ${laps.length} total</span>`;
    legendEl.innerHTML=lh;
  }

  // Render annotations
  renderScatterAnnotations();
}

   SCATTER LASSO & ANNOTATION TOOLS
