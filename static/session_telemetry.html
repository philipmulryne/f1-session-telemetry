  const allRounds=[];const roundMap={};
  drivers.forEach(d=>{
    (d.race_results||[]).forEach(r=>{if(!roundMap[r.round]){roundMap[r.round]=r.meeting;allRounds.push({round:r.round,meeting:r.meeting});}});
    (d.quali_results||[]).forEach(r=>{if(!roundMap[r.round]){roundMap[r.round]=r.meeting;allRounds.push({round:r.round,meeting:r.meeting});}});
  });
  allRounds.sort((a,b)=>parseInt(a.round)-parseInt(b.round));

  // Build header with GP country codes
  let h='<div style="overflow-x:auto"><table class="pit-table" style="font-size:9px;white-space:nowrap;border-collapse:collapse">';
  // First header row: GP country codes
  h+='<thead><tr><th rowspan="2" style="position:sticky;left:0;background:var(--surface);z-index:2;min-width:44px">Driver</th>';
  allRounds.forEach(r=>{
    const cc=gpCountryCode(r.meeting);
    h+=`<th colspan="2" title="${esc(r.meeting)}" style="text-align:center;border-bottom:none;padding-bottom:0;font-size:7px;letter-spacing:.3px"><span style="color:var(--text2)">R${r.round}</span> ${cc}</th>`;
  });
  h+='<th rowspan="2" style="min-width:32px">Pts</th></tr>';
  // Second header row: Q/R labels
  h+='<tr>';
  allRounds.forEach(r=>{
    h+='<th style="text-align:center;min-width:28px;padding:0 1px;font-size:7px;color:var(--text2);border-top:none;padding-top:0">Q</th>';
    h+='<th style="text-align:center;min-width:28px;padding:0 1px;font-size:7px;color:var(--text2);border-top:none;padding-top:0">R</th>';
  });
  h+='</tr></thead><tbody>';

  drivers.forEach(d=>{
    const color=teamColor(d.team||"");
    // Build lookup maps
    const raceMap={};const qualiMap={};const sprintMap={};
    (d.race_results||[]).forEach(r=>{raceMap[r.round]=r;});
    (d.quali_results||[]).forEach(r=>{qualiMap[r.round]=r;});
    (d.sprint_results||[]).forEach(r=>{sprintMap[r.round]=r;});

    h+=`<tr><td style="position:sticky;left:0;background:var(--surface);z-index:1;color:${color};font-weight:700">${esc(d.acronym)}</td>`;
    allRounds.forEach(r=>{
      // Qualifying cell
      const qr=qualiMap[r.round];
      if(qr){
        const gp=qr.grid;
        const elim=qr.eliminated||"";
        let qBg="transparent",qFg="var(--text)";
        if(gp===1){qBg="rgba(234,179,8,.2)";qFg="var(--yellow)";}
        else if(gp<=3){qBg="rgba(59,130,246,.12)";qFg="var(--blue)";}
        else if(gp<=10){qBg="rgba(255,255,255,.04)";qFg="var(--text)";}
        else{qFg="var(--text2)";}
        if(elim==="Q1"){qBg="rgba(225,6,0,.12)";qFg="var(--accent)";}
        else if(elim==="Q2"){qBg="rgba(225,6,0,.08)";qFg="var(--accent)";}
        let qLabel="P"+gp;
        if(elim)qLabel+=`<span style="font-size:6px;vertical-align:super;color:var(--accent)">${elim}</span>`;
        h+=`<td style="text-align:center;background:${qBg};color:${qFg};font-size:8px;padding:1px 2px" title="Quali: P${gp}${elim?" ("+elim+")":""}${qr.q1?" | Q1:"+qr.q1:""}${qr.q2?" Q2:"+qr.q2:""}${qr.q3?" Q3:"+qr.q3:""}">${qLabel}</td>`;
      }else{
        h+='<td style="text-align:center;color:var(--border);font-size:8px">·</td>';
      }

      // Race cell
      const rr=raceMap[r.round];
      if(rr){
        const fp=rr.finish;
        let bg="transparent",fg="var(--text)";
        if(fp===1){bg="rgba(34,197,94,.2)";fg="var(--green)";}
        else if(fp<=3){bg="rgba(59,130,246,.15)";fg="var(--blue)";}
        else if(fp<=10){bg="rgba(234,179,8,.1)";fg="var(--yellow)";}
        else if(rr.status==="DNF"||rr.status==="Retired"){bg="rgba(225,6,0,.15)";fg="var(--accent)";}
        let label=fp<99?"P"+fp:"DNF";
        if(rr.status==="DNF"||rr.status==="Retired")label="DNF";
        const pts=rr.points||0;
        const spRes=sprintMap[r.round];
        let ttip=`Race: Grid P${rr.grid}, Finish P${fp}`;
        if(pts)ttip+=`, ${pts}pts`;
        if(spRes)ttip+=` | Sprint: P${spRes.finish} (${spRes.points}pts)`;
        h+=`<td style="text-align:center;background:${bg};color:${fg};font-weight:${fp<=3?700:400};font-size:8px;padding:1px 2px" title="${ttip}">${label}</td>`;
      }else{
        h+='<td style="text-align:center;color:var(--border);font-size:8px">·</td>';
      }
    });
    h+=`<td style="font-weight:700">${d.points.toFixed(0)}</td></tr>`;
  });
  h+='</tbody></table></div>';
  h+=`<div style="font-size:9px;color:var(--text2);margin-top:6px">${allRounds.length} rounds loaded. <b>Q</b>=qualifying grid, <b>R</b>=race finish. <span style="color:var(--accent)">Red superscript</span>=eliminated phase. Hover for details.</div>`;
  el.innerHTML=h;
}

/* ══════════════════════════════════════════════════════════════════════════════
   TRACK DOMINANCE
   ══════════════════════════════════════════════════════════════════════════════ */
// Turn type highlight filter state: null = show all, or "low"/"mid"/"high"/"straight"
let _domTurnFilter=null;

// Turn type colors
const TURN_TYPE_COLORS={low:"#e74c3c",mid:"#f39c12",high:"#2ecc71",straight:"#3b82f6"};

function classifyTurnSpeed(speed){
  if(speed<120)return "low";
  if(speed<=180)return "mid";
  return "high";
}

function drawTrackDominance(){
  const canvas=document.getElementById("cv-dominance");
  if(!canvas)return;
  const s0=STATE.telemSlots[0],s1=STATE.telemSlots[1];
  if(!s0||!s1||!s0.data||!s1.data)return;
  const loc1=s0.data.loc,loc2=s1.data.loc;
  const car1=s0.data.car,car2=s1.data.car;
  if(!loc1.length||!loc2.length||!car1.length||!car2.length)return;

  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=350;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);

  const drivers=STATE.sessionData.drivers||{};
  const drv1=drivers[s0.dn]||{},drv2=drivers[s1.dn]||{};
  let c1=teamColor(drv1.team);
  let c2=teamColor(drv2.team);
  // If same team or same color, use distinct colors for visibility
  const sameTeam=(drv1.team&&drv2.team&&drv1.team===drv2.team)||(c1===c2);
  if(sameTeam){
    c1="#3b82f6"; // blue for D1
    c2="#e10600"; // red/accent for D2
  }
  const n1=drv1.acronym||"D1";
  const n2=drv2.acronym||"D2";

  // Normalize both traces to same number of points by lap progress
  const N=Math.min(400,Math.max(loc1.length,loc2.length));

  function interpolate(arr,n,field){
    const out=[];
    for(let i=0;i<n;i++){
      const p=i/(n-1||1);
      const fi=p*(arr.length-1);
      const lo=Math.floor(fi),hi=Math.min(lo+1,arr.length-1),fr=fi-lo;
      out.push((arr[lo][field]||0)*(1-fr)+(arr[hi][field]||0)*fr);
    }
    return out;
  }

  const x1=interpolate(loc1,N,"x"),y1=interpolate(loc1,N,"y");
  const x2=interpolate(loc2,N,"x"),y2=interpolate(loc2,N,"y");
  const spd1=interpolate(car1,N,"speed"),spd2=interpolate(car2,N,"speed");

  // Use D1's track position as the base track shape
  const allX=x1,allY=y1;
  const xMin=Math.min(...allX),xMax=Math.max(...allX);
  const yMin=Math.min(...allY),yMax=Math.max(...allY);
  const xRange=xMax-xMin||1,yRange=yMax-yMin||1;
  const margin=30;
  const drawW=W-2*margin,drawH=H-2*margin;
  const scaleF=Math.min(drawW/xRange,drawH/yRange);
  const offsetX=margin+(drawW-xRange*scaleF)/2;
  const offsetY=margin+(drawH-yRange*scaleF)/2;

  function tx(v){return offsetX+(v-xMin)*scaleF}
  function ty(v){return offsetY+(yMax-v)*scaleF}

  // Build elapsed time for delta computation
  function buildElapsed(car){
    const e=[0];
    for(let i=1;i<car.length;i++){
      let dt;
      if(car[i].date&&car[i-1].date){
        dt=(new Date(car[i].date).getTime()-new Date(car[i-1].date).getTime())/1000;
        if(dt<=0||dt>2)dt=1/3.7;
      }else{dt=1/3.7;}
      e.push(e[i-1]+dt);
    }
    return e;
  }
  const e1=buildElapsed(car1),e2=buildElapsed(car2);
  const sc1=s0.lapTime?(s0.lapTime/(e1[e1.length-1]||1)):1;
  const sc2=s1.lapTime?(s1.lapTime/(e2[e2.length-1]||1)):1;

  // Compute local delta at each normalized point
  const localDelta=[];
  for(let i=0;i<N;i++){
    const p=i/(N-1||1);
    const fi1=p*(car1.length-1),lo1=Math.floor(fi1),hi1=Math.min(lo1+1,car1.length-1),fr1=fi1-lo1;
    const t1=(e1[lo1]+(e1[hi1]-e1[lo1])*fr1)*sc1;
    const fi2=p*(car2.length-1),lo2=Math.floor(fi2),hi2=Math.min(lo2+1,car2.length-1),fr2=fi2-lo2;
    const t2=(e2[lo2]+(e2[hi2]-e2[lo2])*fr2)*sc2;
    localDelta.push(t2-t1); // positive = D1 faster
  }

  // ── Classify each segment by turn type for highlight filtering ──
  // Compute average speed per segment from both drivers
  const avgSpd=[];
  for(let i=0;i<N;i++) avgSpd.push((spd1[i]+spd2[i])/2);

  // Build turn zone map: for each ref turn, mark nearby segments with turn type
  const ref=getCircuitRef();
  const segType=new Array(N).fill("straight"); // default = straight
  const turnInfoList=[]; // for info box
  if(ref&&ref.length&&loc1.length>10){
    const nLoc=loc1.length;
    for(const t of ref){
      let bestI=0,bestD=Infinity;
      for(let i=0;i<nLoc;i++){
        const dx2=loc1[i].x-t.x,dy2=loc1[i].y-t.y,d=dx2*dx2+dy2*dy2;
        if(d<bestD){bestD=d;bestI=i;}
      }
      const frac=bestI/(nLoc-1||1);
      const segIdx=Math.round(frac*(N-1));
      // Sample min speed in a window around the turn (±2% of lap)
      const hw=Math.max(3,Math.round(N*0.02));
      let minSpd=Infinity;
      for(let j=Math.max(0,segIdx-hw);j<=Math.min(N-1,segIdx+hw);j++){
        if(avgSpd[j]<minSpd) minSpd=avgSpd[j];
      }
      const tType=classifyTurnSpeed(minSpd);
      // Mark segments in this turn zone
      for(let j=Math.max(0,segIdx-hw);j<=Math.min(N-1,segIdx+hw);j++){
        segType[j]=tType;
      }
      turnInfoList.push({num:t.num,frac,segIdx,minSpd:Math.round(minSpd),type:tType,
        x:t.x,y:t.y});
    }
  }

  // ── Compute domination shares ──
  let d1Segs=0,d2Segs=0;
  const segDom=[];
  for(let i=1;i<N;i++){
    const delta=localDelta[i]-localDelta[i-1];
    const spdDiff=spd1[i]-spd2[i];
    const dominant=delta>0.0001?1:delta<-0.0001?2:(spdDiff>0?1:2);
    segDom.push(dominant);
    if(dominant===1)d1Segs++;else d2Segs++;
  }
  const totalSegs=d1Segs+d2Segs||1;
  const d1Pct=Math.round(d1Segs/totalSegs*100);
  const d2Pct=100-d1Pct;
  
  // Store dominance stats globally for AI analysis
  window._lastDominanceStats={d1Pct,d2Pct,n1,n2,sameTeam};

  // ── Draw track segments ──
  ctx.lineWidth=4;ctx.lineCap="round";
  for(let i=1;i<N;i++){
    const dominant=segDom[i-1];
    // If turn type filter is active, dim segments that don't match
    const matchFilter=!_domTurnFilter||segType[i]===_domTurnFilter;
    ctx.strokeStyle=dominant===1?c1:c2;
    const delta=localDelta[i]-localDelta[i-1];
    if(matchFilter){
      ctx.globalAlpha=Math.min(1,0.4+Math.abs(delta)*80);
      ctx.lineWidth=_domTurnFilter?5:4;
    }else{
      ctx.globalAlpha=0.1;
      ctx.lineWidth=2;
    }
    ctx.beginPath();
    ctx.moveTo(tx(x1[i-1]),ty(y1[i-1]));
    ctx.lineTo(tx(x1[i]),ty(y1[i]));
    ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.lineWidth=4;

  // Draw start/finish marker
  ctx.beginPath();ctx.arc(tx(x1[0]),ty(y1[0]),5,0,Math.PI*2);
  ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#000";ctx.lineWidth=1.5;ctx.stroke();
  ctx.font="bold 9px sans-serif";ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--text").trim();
  ctx.textAlign="left";ctx.fillText("S/F",tx(x1[0])+8,ty(y1[0])+3);

  // ── Draw turn labels with type-based coloring ──
  if(turnInfoList.length){
    const nLoc=loc1.length;
    for(const ti of turnInfoList){
      const fi=ti.frac*(x1.length-1);
      const lo=Math.floor(fi),hi=Math.min(lo+1,x1.length-1),fr=fi-lo;
      const px=x1[lo]*(1-fr)+x1[hi]*fr;
      const py=y1[lo]*(1-fr)+y1[hi]*fr;
      const sx=tx(px),sy=ty(py);
      const cx2=(xMin+xMax)/2,cy2=(yMin+yMax)/2;
      const ddx=px-cx2,ddy=py-cy2;
      const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      const off=16;
      const lx=sx+ddx/dist*off,ly=sy-ddy/dist*off;
      // Dim if filter active and this turn doesn't match
      const match=!_domTurnFilter||ti.type===_domTurnFilter;
      ctx.globalAlpha=match?1:0.15;
      // Turn dot colored by type
      const tCol=TURN_TYPE_COLORS[ti.type];
      ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);
      ctx.fillStyle=tCol;ctx.fill();
      ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=0.5;ctx.stroke();
      // Label
      ctx.font="bold 8px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle=tCol;
      ctx.fillText("T"+ti.num,lx,ly);
    }
    ctx.globalAlpha=1;
  }

  // ── Domination share bar on canvas (top-left) ──
  const barX=10,barY=8,barW=Math.min(180,W*0.25),barH=8;
  // D1 portion
  ctx.fillStyle=c1;ctx.globalAlpha=0.85;
  ctx.beginPath();
  ctx.moveTo(barX+3,barY);ctx.lineTo(barX+barW*d1Pct/100,barY);
  ctx.lineTo(barX+barW*d1Pct/100,barY+barH);ctx.lineTo(barX+3,barY+barH);
  ctx.arcTo(barX,barY+barH,barX,barY+barH-3,3);ctx.lineTo(barX,barY+3);ctx.arcTo(barX,barY,barX+3,barY,3);
  ctx.fill();
  // D2 portion
  ctx.fillStyle=c2;
  ctx.beginPath();
  ctx.moveTo(barX+barW*d1Pct/100,barY);ctx.lineTo(barX+barW-3,barY);
  ctx.arcTo(barX+barW,barY,barX+barW,barY+3,3);ctx.lineTo(barX+barW,barY+barH-3);
  ctx.arcTo(barX+barW,barY+barH,barX+barW-3,barY+barH,3);ctx.lineTo(barX+barW*d1Pct/100,barY+barH);
  ctx.fill();
  ctx.globalAlpha=1;
  // Percentage text
  ctx.font="bold 9px sans-serif";ctx.textBaseline="top";
  ctx.fillStyle=c1;ctx.textAlign="left";ctx.fillText(n1+" "+d1Pct+"%",barX,barY+barH+3);
  ctx.fillStyle=c2;ctx.textAlign="right";ctx.fillText(d2Pct+"% "+n2,barX+barW,barY+barH+3);

  // ── Legend ──
  const legendEl=document.getElementById("dominance-legend");
  if(legendEl){
    legendEl.innerHTML=`
      <span class="track-legend-item"><span class="chart-legend-dot" style="background:${c1}"></span><strong>${esc(n1)}</strong> ${d1Pct}%</span>
      <span class="track-legend-item"><span class="chart-legend-dot" style="background:${c2}"></span><strong>${esc(n2)}</strong> ${d2Pct}%</span>
      <span class="track-legend-item" style="opacity:.6">Brightness = magnitude of advantage</span>
    `;
  }

  // ── Domination share container ──
  const shareEl=document.getElementById("dom-share-container");
  if(shareEl){
    shareEl.innerHTML=`<div class="dom-share-wrap">
      <span class="dom-share-pct" style="color:${c1}">${esc(n1)} ${d1Pct}%</span>
      <div class="dom-share-bar">
        <div class="seg" style="width:${d1Pct}%;background:${c1}"></div>
        <div class="seg" style="width:${d2Pct}%;background:${c2}"></div>
      </div>
      <span class="dom-share-pct" style="color:${c2}">${d2Pct}% ${esc(n2)}</span>
    </div>`;
  }

  // ── Compute per-category dominance stats ──
  // For each category: count D1/D2 segments + cumulative time delta
  const catStats={};
  ["low","mid","high","straight"].forEach(cat=>{
    catStats[cat]={d1Segs:0,d2Segs:0,d1Delta:0,d2Delta:0,totalSegs:0};
  });
  for(let i=1;i<N;i++){
    const cat=segType[i];
    if(!catStats[cat])continue;
    const dominant=segDom[i-1];
    const segDelta=localDelta[i]-localDelta[i-1]; // positive = D1 gaining
    catStats[cat].totalSegs++;
    if(dominant===1){
      catStats[cat].d1Segs++;
      catStats[cat].d1Delta+=segDelta;
    }else{
      catStats[cat].d2Segs++;
      catStats[cat].d2Delta+=Math.abs(segDelta);
    }
  }

  // ── Turn info box with classification, filter buttons & category breakdown ──
  const tiEl=document.getElementById("turn-info-container");
  if(tiEl&&turnInfoList.length){
    // Count turns by type
    const counts={low:0,mid:0,high:0,straight:0};
    turnInfoList.forEach(t=>counts[t.type]++);
    let straightSegs=0;
    for(let i=0;i<N;i++){if(segType[i]==="straight"&&avgSpd[i]>180)straightSegs++;}
    const straightPct=Math.round(straightSegs/N*100);

    const activeClass=(type)=>_domTurnFilter===type?"active":"";
    let html=`<div class="turn-info-box">
      <div class="tib-title">Turn &amp; Sector Classification</div>
      <div class="turn-type-filters">
        <button class="turn-type-btn ${activeClass(null)}" onclick="_domTurnFilter=(_domTurnFilter===null?'__none__':null);drawTrackDominance()">
          All</button>
        <button class="turn-type-btn ${activeClass("low")}" onclick="_domTurnFilter=(_domTurnFilter==='low'?null:'low');drawTrackDominance()">
          <span class="dot" style="background:${TURN_TYPE_COLORS.low}"></span>Low Speed (${counts.low})</button>
        <button class="turn-type-btn ${activeClass("mid")}" onclick="_domTurnFilter=(_domTurnFilter==='mid'?null:'mid');drawTrackDominance()">
          <span class="dot" style="background:${TURN_TYPE_COLORS.mid}"></span>Mid Speed (${counts.mid})</button>
        <button class="turn-type-btn ${activeClass("high")}" onclick="_domTurnFilter=(_domTurnFilter==='high'?null:'high');drawTrackDominance()">
          <span class="dot" style="background:${TURN_TYPE_COLORS.high}"></span>High Speed (${counts.high})</button>
        <button class="turn-type-btn ${activeClass("straight")}" onclick="_domTurnFilter=(_domTurnFilter==='straight'?null:'straight');drawTrackDominance()">
          <span class="dot" style="background:${TURN_TYPE_COLORS.straight}"></span>Straights (~${straightPct}%)</button>
      </div>
      <div class="turn-info-grid">`;
    turnInfoList.sort((a,b)=>a.num-b.num).forEach(t=>{
      const col=TURN_TYPE_COLORS[t.type];
      const typeLabel=t.type==="low"?"Low":t.type==="mid"?"Mid":"High";
      html+=`<div class="turn-info-item">
        <span class="ti-badge" style="background:${col}"></span>
        <span class="ti-label">T${t.num}</span>
        <span class="ti-speed">${t.minSpd} km/h · ${typeLabel}</span>
      </div>`;
    });
    html+=`</div>`;

    // ── Per-category dominance breakdown ──
    html+=`<div class="cat-dom-section">
      <div class="cds-title">Category Dominance Breakdown</div>`;
    const catOrder=[
      {key:"low",label:"Low Speed"},
      {key:"mid",label:"Mid Speed"},
      {key:"high",label:"High Speed"},
      {key:"straight",label:"Straights"}
    ];
    catOrder.forEach(({key,label})=>{
      const cs=catStats[key];
      if(!cs||cs.totalSegs===0)return;
      const tot=cs.d1Segs+cs.d2Segs||1;
      const p1=Math.round(cs.d1Segs/tot*100);
      const p2=100-p1;
      // Net delta: positive = D1 net gain in this category
      const netDelta=cs.d1Delta-cs.d2Delta;
      const owner=netDelta>=0?1:2;
      const ownerName=owner===1?n1:n2;
      const ownerCol=owner===1?c1:c2;
      const deltaMs=Math.abs(netDelta*1000); // convert to milliseconds
      const deltaStr=deltaMs>=1000?(netDelta>=0?"+":"-")+(Math.abs(netDelta)).toFixed(3)+"s"
                     :(netDelta>=0?"+":"-")+deltaMs.toFixed(0)+"ms";
      html+=`<div class="cat-dom-row">
        <div class="cdr-type"><span class="dot" style="background:${TURN_TYPE_COLORS[key]}"></span>${label}</div>
        <div class="cdr-bar">
          <div class="seg" style="width:${p1}%;background:${c1}"></div>
          <div class="seg" style="width:${p2}%;background:${c2}"></div>
        </div>
        <div class="cdr-stats">
          <span class="cdr-pct" style="color:${c1}">${p1}%</span>
          <span style="opacity:.4">|</span>
          <span class="cdr-pct" style="color:${c2}">${p2}%</span>
          <span class="cdr-delta" style="color:${ownerCol}">${esc(ownerName)} ${deltaStr}</span>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
    tiEl.innerHTML=html;
    // Fix the "All" button active state
    const allBtn=tiEl.querySelector('.turn-type-btn');

  }else if(tiEl){
    tiEl.innerHTML="";
  }
}

/* Find matching reference turns for the current circuit */
function getCircuitRef(){
  const mk=document.getElementById("sel-meeting");
  const name=(mk&&mk.selectedOptions[0]?mk.selectedOptions[0].textContent:"").toLowerCase();
  for(const key of Object.keys(CIRCUIT_TURNS)){
    if(name.includes(key))return CIRCUIT_TURNS[key];
  }
  return null;
}

/* Match reference turn X,Y coords to nearest points in location data, then map to car_data indices */
function getReferenceTurns(carData, locData){
  const ref=getCircuitRef();
  if(!ref||!ref.length)return null;
  const n=carData.length;
  if(n<30||!locData||locData.length<10)return null;
  const nLoc=locData.length;
  const results=[];
  for(const t of ref){
    let bestIdx=0,bestD2=Infinity;
    for(let i=0;i<nLoc;i++){
      const dx=locData[i].x-t.x,dy=locData[i].y-t.y;
      const d2=dx*dx+dy*dy;
      if(d2<bestD2){bestD2=d2;bestIdx=i;}
    }
    const carIdx=Math.min(Math.round(bestIdx*n/nLoc),n-1);
    results.push({idx:carIdx,num:t.num,frac:carIdx/(n-1||1),label:"T"+t.num});
  }
  return results;
}

/* Full zone-based turn detection using curvature + heading + speed on location data.
   Ported from test_telemetry.html — works for any circuit without reference data. */
function detectTurns(carData, locData){
  const n=carData.length;
  if(n<30)return[];

  if(locData&&locData.length>20){
    const nLoc=locData.length;
    const pts=locData.map(p=>({x:p.x,y:p.y}));

    // Step 1: Heading & curvature
    const la=Math.max(1,Math.floor(nLoc/300));
    const hdg=new Float64Array(nLoc);
    for(let i=0;i<nLoc;i++){
      const j=Math.min(i+la,nLoc-1);
      hdg[i]=Math.atan2(pts[j].y-pts[i].y,pts[j].x-pts[i].x);
    }
    const dh=new Float64Array(nLoc);
    const adh=new Float64Array(nLoc);
    for(let i=1;i<nLoc;i++){
      let d=hdg[i]-hdg[i-1];
      if(d>Math.PI)d-=2*Math.PI;
      if(d<-Math.PI)d+=2*Math.PI;
      dh[i]=d; adh[i]=Math.abs(d);
    }
    const sc=new Float64Array(nLoc);
    for(let i=0;i<nLoc;i++){
      let s=0,c=0;
      for(let j=Math.max(0,i-1);j<=Math.min(nLoc-1,i+1);j++){s+=adh[j];c++;}
      sc[i]=s/c;
    }
    const sdh=new Float64Array(nLoc);
    for(let i=0;i<nLoc;i++){
      let s=0,c=0;
      for(let j=Math.max(0,i-1);j<=Math.min(nLoc-1,i+1);j++){s+=dh[j];c++;}
      sdh[i]=s/c;
    }

    // Step 2: Speed signal mapped to loc indices
    const spd=new Float64Array(nLoc);
    for(let i=0;i<nLoc;i++){
      const ci=Math.min(Math.round(i*n/nLoc),n-1);
      spd[i]=carData[ci]?carData[ci].speed||0:0;
    }
    const topSpd=Math.max(...spd);

    // Step 3: Turning zone threshold
    let sumC=0,sumC2=0;
    for(let i=0;i<nLoc;i++){sumC+=sc[i];sumC2+=sc[i]*sc[i];}
    const meanC=sumC/nLoc;
    const stdC=Math.sqrt(Math.max(0,sumC2/nLoc-meanC*meanC));
    const turnTh=meanC+stdC*0.15;

    // Step 4: Find contiguous turning zones
    const zones=[];
    let inZ=false,zs=0,gap=0;
    for(let i=0;i<nLoc;i++){
      if(sc[i]>turnTh){
        if(!inZ){inZ=true;zs=i;gap=0;}else gap=0;
      }else{
        if(inZ){
          gap++;
          if(gap>2){inZ=false;const ze=i-gap;if(ze>=zs)zones.push({s:zs,e:ze});}
        }
      }
    }
    if(inZ)zones.push({s:zs,e:nLoc-1});

    // Merge close zones
    const mz=[];
    for(const z of zones){
      if(mz.length&&z.s-mz[mz.length-1].e<=3){
        mz[mz.length-1].e=z.e;
      }else{
        mz.push({s:z.s,e:z.e});
      }
    }

    // Step 5: Smooth speed
    const sSmooth=new Float64Array(nLoc);
    for(let i=0;i<nLoc;i++){
      let s=0,c=0;
      const sw=Math.max(1,Math.floor(nLoc/200));
      for(let j=Math.max(0,i-sw);j<=Math.min(nLoc-1,i+sw);j++){s+=spd[j];c++;}
      sSmooth[i]=s/c;
    }

    // Step 6: Split zones into individual turns
    const minSegLen=Math.max(2,Math.floor(nLoc/200));
    const allTurns=[];
    for(const z of mz){
      const len=z.e-z.s+1;
      if(len<2){allTurns.push({idx:z.s,curv:sc[z.s]});continue;}
      const splits=[];

      // 6a: Direction reversals
      for(let i=z.s+2;i<=z.e-1;i++){
        if(sdh[i]*sdh[i-1]<0&&Math.abs(sdh[i])>turnTh*0.2&&Math.abs(sdh[i-1])>turnTh*0.2){
          let leftHdg=0,rightHdg=0;
          for(let j=z.s;j<i;j++)leftHdg+=adh[j];
          for(let j=i;j<=z.e;j++)rightHdg+=adh[j];
          if(leftHdg>0.26&&rightHdg>0.26) splits.push({idx:i,type:"dir"});
        }
      }

      // 6b: Speed-based splits
      for(let i=z.s+minSegLen;i<=z.e-minSegLen;i++){
        let isMax=true;
        const sr=Math.max(1,Math.floor(len/8));
        for(let j=Math.max(z.s,i-sr);j<=Math.min(z.e,i+sr);j++){
          if(j!==i&&sSmooth[j]>sSmooth[i]){isMax=false;break;}
        }
        if(!isMax)continue;
        let leftMin=Infinity,rightMin=Infinity;
        for(let j=z.s;j<i;j++)if(sSmooth[j]<leftMin)leftMin=sSmooth[j];
        for(let j=i+1;j<=z.e;j++)if(sSmooth[j]<rightMin)rightMin=sSmooth[j];
        const rise=sSmooth[i]-Math.max(leftMin,rightMin);
        if(rise>10) splits.push({idx:i,type:"spd"});
      }

      // Deduplicate & sort
      const uniq=[...new Set(splits.map(s=>s.idx))].sort((a,b)=>a-b);
      const fSplits=[];
      for(const sp of uniq){
        if(!fSplits.length||sp-fSplits[fSplits.length-1]>=minSegLen)fSplits.push(sp);
      }

      // Create segments
      const segs=[];
      let prev=z.s;
      for(const sp of fSplits){
        if(sp-prev>=minSegLen)segs.push({s:prev,e:sp-1});
        prev=sp;
      }
      if(z.e-prev>=1)segs.push({s:prev,e:z.e});
      if(!segs.length)segs.push({s:z.s,e:z.e});

      // Peak curvature in each segment = turn apex
      for(const seg of segs){
        if(seg.e-seg.s+1<minSegLen)continue;
        let pk=seg.s,pv=0;
        for(let i=seg.s;i<=seg.e;i++){if(sc[i]>pv){pv=sc[i];pk=i;}}
        let totalHdg=0;
        for(let i=seg.s;i<=seg.e;i++)totalHdg+=adh[i];
        if(totalHdg>0.10)allTurns.push({idx:pk,curv:pv});
      }
    }

    // Step 7: Speed-based supplementation (turns curvature missed)
    const spdMinR=Math.max(2,Math.floor(nLoc/90));
    for(let i=spdMinR;i<nLoc-spdMinR;i++){
      let isMin=true;
      for(let j=i-spdMinR;j<=i+spdMinR;j++){
        if(j!==i&&sSmooth[j]<sSmooth[i]){isMin=false;break;}
      }
      if(!isMin)continue;
      let lMax=0,rMax=0;
      const pr=Math.max(spdMinR*2,Math.floor(nLoc/30));
      for(let j=Math.max(0,i-pr);j<i;j++)if(sSmooth[j]>lMax)lMax=sSmooth[j];
      for(let j=i+1;j<=Math.min(nLoc-1,i+pr);j++)if(sSmooth[j]>rMax)rMax=sSmooth[j];
      const prom=Math.min(lMax,rMax)-sSmooth[i];
      if(prom<10)continue;
      let nearExisting=false;
      const nearDist=Math.max(3,Math.floor(nLoc/80));
      for(const t of allTurns){if(Math.abs(t.idx-i)<nearDist){nearExisting=true;break;}}
      if(!nearExisting&&sSmooth[i]<topSpd*0.88) allTurns.push({idx:i,curv:sc[i]||0.01});
    }

    // Step 8: Speed validation — reject false positives on straights
    const validated=allTurns.filter(t=>{
      let mn=Infinity;
      const w=Math.max(2,Math.floor(nLoc/100));
      for(let j=Math.max(0,t.idx-w);j<=Math.min(nLoc-1,t.idx+w);j++){if(spd[j]<mn)mn=spd[j];}
      return mn<topSpd*0.92;
    });

    // Step 9: Final dedup
    validated.sort((a,b)=>b.curv-a.curv);
    const filtered=[];
    const dd=Math.max(3,Math.floor(nLoc/120));
    for(const t of validated){
      let close=false;
      for(const f of filtered){if(Math.abs(f.idx-t.idx)<dd){close=true;break;}}
      if(!close)filtered.push(t);
    }
    filtered.sort((a,b)=>a.idx-b.idx);

    return filtered.map((p,i)=>{
      const carIdx=Math.min(Math.round(p.idx*n/nLoc),n-1);
      return{idx:carIdx,num:i+1,frac:carIdx/(n-1||1),label:"T"+(i+1)};
    });
  }

  // Fallback: speed-based only (no location data)
  const speeds=carData.map(c=>c.speed||0);
  const smo=[];
  for(let i=0;i<n;i++){
    let s=0,c=0;
    for(let j=Math.max(0,i-3);j<=Math.min(n-1,i+3);j++){s+=speeds[j];c++;}
    smo.push(s/c);
  }
  const mg=Math.max(3,Math.floor(n/80));
  const mins=[];
  for(let i=mg;i<n-mg;i++){
    let isMin=true;
    for(let j=i-mg;j<=i+mg;j++){if(j!==i&&smo[j]<smo[i]){isMin=false;break;}}
    if(!isMin)continue;
    let lM=0,rM=0;
    for(let j=Math.max(0,i-mg*3);j<i;j++)lM=Math.max(lM,smo[j]);
    for(let j=i+1;j<Math.min(n,i+mg*3);j++)rM=Math.max(rM,smo[j]);
    const pr=Math.min(lM,rM)-smo[i];
    if(pr>10)mins.push({idx:i,speed:smo[i],prominence:pr});
  }
  mins.sort((a,b)=>b.prominence-a.prominence);
  const f2=[];
  for(const m of mins){
    let cl=false;
    for(const f of f2){if(Math.abs(f.idx-m.idx)<mg){cl=true;break;}}
    if(!cl)f2.push(m);
  }
  f2.sort((a,b)=>a.idx-b.idx);
  return f2.map((m,i)=>({idx:m.idx,num:i+1,frac:m.idx/(n-1||1),label:"T"+(i+1)}));
}

function drawTelemCharts(){
  // Collect filled slots with data
  const slots=STATE.telemSlots.filter(s=>s&&s.data&&s.data.car&&s.data.car.length);
  if(slots.length===0)return;
  const drivers=STATE.sessionData.drivers||{};
  const cs=getComputedStyle(document.documentElement);
  const slotColorVars=["--blue","--accent","--green"];
  const dashStyles=[[],[6,3],[3,3]]; // solid, dashed, dotted

  // Determine if all same driver (show lap numbers in labels)
  const allSameDrv=slots.length>1&&slots.every(s=>s.dn===slots[0].dn&&!s.crossSession);

  // Build traces array
  const traces=slots.map((s,idx)=>{
    const si=STATE.telemSlots.indexOf(s); // original slot index (0,1,2)
    const drv=s.crossSession?{acronym:s.acronym||"D"+(si+1),team:s.team||""}:(drivers[s.dn]||{});
    let color=teamColor(drv.team);
    // Avoid duplicate colors: if same as a previous trace, use slot CSS variable
    const prevColors=slots.slice(0,idx).map((_,pi)=>{
      const pd=slots[pi].crossSession?{team:slots[pi].team||""}:(drivers[slots[pi].dn]||{});
      return teamColor(pd.team);
    });
    if(!color||prevColors.includes(color)){color=cs.getPropertyValue(slotColorVars[si]).trim();}
    const name=drv.acronym||"D"+(si+1);
    const label=allSameDrv?`${name} L${s.lapNum}`:(s.crossSession?`${name} L${s.lapNum} \u2194`:name);
    return{slot:s,data:s.data.car,color,label,dash:dashStyles[idx]||[]};
  });
  const meta={traces};

  // Turn detection from longest data
  const bestSlot=slots.reduce((a,b)=>a.data.car.length>=b.data.car.length?a:b);
  let turns=getReferenceTurns(bestSlot.data.car,bestSlot.data.loc);
  if(!turns) turns=detectTurns(bestSlot.data.car,bestSlot.data.loc);

  drawTrace("cv-speed",meta,"speed",0,370,turns);
  drawTrace("cv-throttle",meta,"throttle",0,100,turns);
  drawTrace("cv-brake",meta,"brake",0,100,turns);
  drawTrace("cv-gear",meta,"n_gear",0,8,turns);
  drawTrace("cv-rpm",meta,"rpm",0,15000,turns);

  // Delta chart: only for 2+ drivers, relative to D1
  const deltaEl=document.getElementById("cv-delta")?.parentElement;
  if(slots.length>=2&&deltaEl){
    deltaEl.style.display="";
    drawDelta("cv-delta",meta,slots,turns);
  }else if(deltaEl){
    deltaEl.style.display="none";
  }
  // Track dominance: only for exactly 2 slots (keep existing logic)
  if(slots.length===2)drawTrackDominance();
  else{const dc=document.getElementById("cv-dominance");if(dc){const cx=dc.getContext("2d");cx.clearRect(0,0,dc.width,dc.height);}}

  // ERS indicators (if enabled)
  if(STATE.ersEnabled)drawErsIndicators();
}

/* ── ERS ZONE INDICATORS ── */
const ERS_COLORS={DEPLOYMENT:"#22c55e",CLIPPING:"#eab308",SUPER_CLIPPING:"#ef4444"};
const ERS_LABELS={DEPLOYMENT:"Deploy",CLIPPING:"Clip",SUPER_CLIPPING:"S-Clip"};
let _ersLastMeta=null; // store for redraw

function toggleErsZones(){
  STATE.ersEnabled=!STATE.ersEnabled;
  const btn=document.getElementById("btn-ers");
  if(btn)btn.classList.toggle("active",STATE.ersEnabled);
  if(STATE.ersEnabled){
    fetchAndDrawErs();
  }else{
    // Redraw charts to remove ERS overlay
    drawTelemCharts();
  }
}

async function fetchAndDrawErs(){
  const slots=STATE.telemSlots.filter(s=>s&&s.data&&s.data.car&&s.data.car.length);
  if(slots.length===0)return;
  const btn=document.getElementById("btn-ers");
  if(btn)btn.classList.add("loading");
  STATE.ersBusy=true;
  const drivers=STATE.sessionData?.drivers||{};
  const circuit=STATE.activeMeeting?.circuit_short_name||"Unknown";

  try{
    for(const slot of slots){
      const key=slot.dn+"_"+slot.lapNum;
      if(STATE.ersZones[key])continue; // cached
      // Downsample telemetry to ~50 points
      const car=slot.data.car;
      const step=Math.max(1,Math.floor(car.length/50));
      const samples=[];
      for(let i=0;i<car.length;i+=step){
        const d=car[i];
        samples.push({pct:(i/(car.length-1))*100,speed:d.speed||0,throttle:d.throttle||0,brake:d.brake||0,gear:d.n_gear||0,rpm:d.rpm||0});
      }
      const drv=drivers[slot.dn]||{};
      const drvInfo=(drv.acronym||"#"+slot.dn)+" L"+slot.lapNum;
      const resp=await fetch("/api/telemetry/ers_zones",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({telemetry_samples:samples,driver_info:drvInfo,circuit})
      });
      const data=await resp.json();
      if(data.error==="NO_KEY"){
        alert("Claude API key not configured.\nSet ANTHROPIC_API_KEY env var or configure in .app_config.json");
        STATE.ersEnabled=false;
        if(btn)btn.classList.remove("active");
        return;
      }
      STATE.ersZones[key]=data.zones||[];
    }
    drawErsIndicators();
  }catch(e){
    console.warn("ERS zones fetch error:",e);
  }finally{
    STATE.ersBusy=false;
    if(btn)btn.classList.remove("loading");
  }
}

function drawErsIndicators(){
  const canvas=document.getElementById("cv-speed");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  // Re-read canvas dimensions (already set by drawTrace)
  const W=canvas.width/dpr;
  const H=canvas.height/dpr;
  const ml=44,mr=12,mt=6,mb=28;
  const pw=W-ml-mr,ph=H-mt-mb;

  const slots=STATE.telemSlots.filter(s=>s&&s.data&&s.data.car&&s.data.car.length);
  if(slots.length===0)return;

  ctx.save();
  ctx.scale(dpr,dpr);

  const laneH=8; // height of each ERS zone bar
  const laneGap=2;
  const baseY=mt+2; // start from top of chart area

  // Store hit areas for tooltip
  canvas._ersHitAreas=[];

  slots.forEach((slot,si)=>{
    const key=slot.dn+"_"+slot.lapNum;
    const zones=STATE.ersZones[key];
    if(!zones||!zones.length)return;
    const y=baseY+si*(laneH+laneGap);

    zones.forEach(z=>{
      const x1=ml+pw*(z.start_pct/100);
      const x2=ml+pw*(z.end_pct/100);
      const w=Math.max(x2-x1,3);
      const col=ERS_COLORS[z.type]||"#888";

      // Draw semi-transparent band
      ctx.globalAlpha=0.25;
      ctx.fillStyle=col;
      ctx.fillRect(x1,y,w,laneH);

      // Border
      ctx.globalAlpha=0.7;
      ctx.strokeStyle=col;
      ctx.lineWidth=1;
      ctx.strokeRect(x1,y,w,laneH);

      // Label (only if bar is wide enough)
      if(w>24){
        ctx.globalAlpha=0.9;
        ctx.font="bold 7px sans-serif";
        ctx.fillStyle=col;
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText(ERS_LABELS[z.type]||z.type,x1+w/2,y+laneH/2);
      }

      ctx.globalAlpha=1;

      // Store hit area for tooltip (in CSS pixels)
      canvas._ersHitAreas.push({x:x1,y:y,w:w,h:laneH,zone:z,slotIdx:si,slot});
    });

    // Driver label at left (for multi-driver)
    if(slots.length>1){
      const drivers=STATE.sessionData?.drivers||{};
      const drv=drivers[slot.dn]||{};
      ctx.globalAlpha=0.6;
      ctx.font="bold 7px sans-serif";
      ctx.fillStyle="#fff";
      ctx.textAlign="right";
      ctx.textBaseline="middle";
      ctx.fillText(drv.acronym||"D"+(si+1),ml-3,y+laneH/2);
      ctx.globalAlpha=1;
    }
  });

  ctx.restore();
}

// Tooltip hover for ERS zones
function initErsTooltip(){
  const canvas=document.getElementById("cv-speed");
  const tooltip=document.getElementById("ers-tooltip");
  if(!canvas||!tooltip)return;
  if(canvas._ersListenerAdded)return;
  canvas._ersListenerAdded=true;

  canvas.addEventListener("mousemove",function(e){
    if(!STATE.ersEnabled||!canvas._ersHitAreas||!canvas._ersHitAreas.length){tooltip.style.display="none";return;}
    const rect=canvas.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;

    let hit=null;
    for(const a of canvas._ersHitAreas){
      if(mx>=a.x&&mx<=a.x+a.w&&my>=a.y&&my<=a.y+a.h){hit=a;break;}
    }
    if(hit){
      const drivers=STATE.sessionData?.drivers||{};
      const drv=drivers[hit.slot.dn]||{};
      const drvName=drv.acronym||"D"+(hit.slotIdx+1);
      tooltip.innerHTML=`<div class="ers-tt-type ${hit.zone.type}">${hit.zone.type.replace("_"," ")} — ${drvName} L${hit.slot.lapNum}</div><div>${hit.zone.reason||"No details"}</div>`;
      tooltip.style.display="block";
      tooltip.style.left=(e.clientX+12)+"px";
      tooltip.style.top=(e.clientY-10)+"px";
    }else{
      tooltip.style.display="none";
    }
  });
  canvas.addEventListener("mouseleave",function(){tooltip.style.display="none";});
}

function drawTrace(canvasId,meta,field,yMin,yMax,turns){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const traces=meta.traces;
  if(!traces||!traces.length)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=TELEM_HEIGHTS[canvasId]||160;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);

  const cs=getComputedStyle(document.documentElement);
  const gridColor=cs.getPropertyValue("--border").trim();
  const textColor=cs.getPropertyValue("--text2").trim();

  const ml=44,mr=12,mt=6,mb=28;
  const pw=W-ml-mr,ph=H-mt-mb;
  const range=yMax-yMin||1;

  // Grid
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.font="9px sans-serif";ctx.fillStyle=textColor;
  for(let i=0;i<=4;i++){
    const y=mt+ph*i/4;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(Math.round(yMax-range*i/4),ml-4,y+3);
  }

  // Turn markers on x-axis
  if(turns&&turns.length){
    ctx.font="bold 8px sans-serif";ctx.textAlign="center";
    turns.forEach(t=>{
      const x=ml+pw*t.frac;
      ctx.strokeStyle=gridColor;ctx.lineWidth=0.4;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=textColor;ctx.fillText(t.label,x,H-4);
    });
  }

  // Draw all traces
  traces.forEach(tr=>{
    ctx.strokeStyle=tr.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.9;
    if(tr.dash&&tr.dash.length)ctx.setLineDash(tr.dash);
    ctx.beginPath();
    const n=tr.data.length;
    for(let i=0;i<n;i++){
      const x=ml+pw*(i/(n-1||1));
      const v=tr.data[i][field]||0;
      const y=mt+ph*(1-Math.max(0,Math.min(1,(v-yMin)/range)));
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.globalAlpha=1;ctx.setLineDash([]);
  });

  // Key difference annotations (only for exactly 2 traces)
  if(traces.length===2&&turns&&turns.length&&(field==="speed"||field==="throttle"||field==="brake"||field==="n_gear")){
    const d1=traces[0].data,d2=traces[1].data;
    const n1=d1.length,n2=d2.length;
    const annotations=[];
    const winFrac=0.03;
    for(const t of turns){
      const i1=Math.round(t.frac*(n1-1)),i2=Math.round(t.frac*(n2-1));
      const hw1=Math.max(3,Math.round(n1*winFrac)),hw2=Math.max(3,Math.round(n2*winFrac));
      let sum1=0,cnt1=0,sum2=0,cnt2=0;
      for(let j=Math.max(0,i1-hw1);j<=Math.min(n1-1,i1+hw1);j++){sum1+=(d1[j][field]||0);cnt1++;}
      for(let j=Math.max(0,i2-hw2);j<=Math.min(n2-1,i2+hw2);j++){sum2+=(d2[j][field]||0);cnt2++;}
      const avg1=sum1/(cnt1||1),avg2=sum2/(cnt2||1);
      const diff=avg1-avg2;
      const th=field==="speed"?5:field==="n_gear"?0.4:field==="brake"?8:5;
      if(Math.abs(diff)>=th) annotations.push({turn:t,diff,avg1,avg2});
    }
    annotations.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    const shown=annotations.slice(0,4);
    ctx.font="bold 7px sans-serif";
    shown.forEach(a=>{
      const x=ml+pw*a.turn.frac;
      const midVal=(a.avg1+a.avg2)/2;
      const y=mt+ph*(1-Math.max(0,Math.min(1,(midVal-yMin)/range)));
      const d1Better=a.diff>0;
      const label=field==="n_gear"?`${d1Better?"\u25B2":"\u25BC"}${Math.abs(a.diff).toFixed(1)}`:`${d1Better?"\u25B2":"\u25BC"}${Math.abs(a.diff).toFixed(0)}`;
      const col=d1Better?traces[0].color:traces[1].color;
      const tw=ctx.measureText(label).width+6;
      const bx=x-tw/2,by=y-16;
      ctx.globalAlpha=0.85;ctx.fillStyle="rgba(0,0,0,0.7)";
      const bh=13,br=3;
      ctx.beginPath();ctx.moveTo(bx+br,by);ctx.lineTo(bx+tw-br,by);ctx.arcTo(bx+tw,by,bx+tw,by+br,br);
      ctx.lineTo(bx+tw,by+bh-br);ctx.arcTo(bx+tw,by+bh,bx+tw-br,by+bh,br);
      ctx.lineTo(bx+br,by+bh);ctx.arcTo(bx,by+bh,bx,by+bh-br,br);
      ctx.lineTo(bx,by+br);ctx.arcTo(bx,by,bx+br,by,br);ctx.closePath();ctx.fill();
      ctx.fillStyle=col;ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(label,x,by+6.5);ctx.globalAlpha=1;
    });
  }

  // Inline legend (top-right)
  const lx=ml+pw-4;
  ctx.font="bold 9px sans-serif";ctx.textAlign="right";
  traces.forEach((tr,idx)=>{
    const ly=mt+12+idx*13;
    ctx.strokeStyle=tr.color;ctx.lineWidth=2;
    if(tr.dash&&tr.dash.length)ctx.setLineDash(tr.dash);
    ctx.beginPath();ctx.moveTo(lx-60,ly-3);ctx.lineTo(lx-46,ly-3);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=tr.color;ctx.fillText(tr.label,lx-62,ly);
  });
}

function drawDelta(canvasId,meta,slots,turns){
  const canvas=document.getElementById(canvasId);
  if(!canvas||slots.length<2)return;
  const traces=meta.traces;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width-20;
  const H=TELEM_HEIGHTS[canvasId]||120;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);

  const cs=getComputedStyle(document.documentElement);
  const gridColor=cs.getPropertyValue("--border").trim();
  const textColor=cs.getPropertyValue("--text2").trim();

  const ml=44,mr=12,mt=6,mb=28;
  const pw=W-ml-mr,ph=H-mt-mb;

  function buildElapsed(car){
    const e=[0];
    for(let i=1;i<car.length;i++){
      let dt;
      if(car[i].date&&car[i-1].date){
        dt=(new Date(car[i].date).getTime()-new Date(car[i-1].date).getTime())/1000;
        if(dt<=0||dt>2)dt=1/3.7;
      }else{dt=1/3.7;}
      e.push(e[i-1]+dt);
    }
    return e;
  }

  // Build delta arrays for each comparison driver vs D1
  const ref=slots[0];
  const refCar=ref.data.car;
  const eRef=buildElapsed(refCar);
  const scaleRef=ref.lapTime?(ref.lapTime/(eRef[eRef.length-1]||1)):1;

  const deltaLines=[];
  for(let si=1;si<slots.length;si++){
    const cmp=slots[si];
    const cmpCar=cmp.data.car;
    const eCmp=buildElapsed(cmpCar);
    const scaleCmp=cmp.lapTime?(cmp.lapTime/(eCmp[eCmp.length-1]||1)):1;
    const nOut=Math.max(refCar.length,cmpCar.length);
    const delta=[];
    for(let i=0;i<nOut;i++){
      const p=i/(nOut-1||1);
      const fi1=p*(refCar.length-1),lo1=Math.floor(fi1),hi1=Math.min(lo1+1,refCar.length-1),fr1=fi1-lo1;
      const t1=(eRef[lo1]+(eRef[hi1]-eRef[lo1])*fr1)*scaleRef;
      const fi2=p*(cmpCar.length-1),lo2=Math.floor(fi2),hi2=Math.min(lo2+1,cmpCar.length-1),fr2=fi2-lo2;
      const t2=(eCmp[lo2]+(eCmp[hi2]-eCmp[lo2])*fr2)*scaleCmp;
      delta.push(t2-t1);
    }
    deltaLines.push({delta,color:traces[si].color,label:traces[si].label,dash:traces[si].dash});
  }

  // Compute scale from all deltas
  const allDeltas=deltaLines.flatMap(dl=>dl.delta);
  const maxAbs=Math.max(0.5,Math.max(...allDeltas.map(Math.abs)));
  const yMin=-maxAbs,yMax=maxAbs,range=yMax-yMin;

  // Grid
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;ctx.font="9px sans-serif";ctx.fillStyle=textColor;
  for(let i=0;i<=4;i++){
    const y=mt+ph*i/4;
    const v=yMax-range*i/4;
    ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(v.toFixed(2)+"s",ml-4,y+3);
  }

  // Turn markers
  if(turns&&turns.length){
    ctx.font="bold 8px sans-serif";ctx.textAlign="center";
    turns.forEach(t=>{
      const x=ml+pw*t.frac;
      ctx.strokeStyle=gridColor;ctx.lineWidth=0.4;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=textColor;ctx.fillText(t.label,x,H-4);
    });
  }

  // Zero line
  const zeroY=mt+ph*(yMax/range);
  ctx.strokeStyle=textColor;ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(ml,zeroY);ctx.lineTo(ml+pw,zeroY);ctx.stroke();
  ctx.setLineDash([]);

  // Draw each delta line
  deltaLines.forEach(dl=>{
    // Fill (only for first delta)
    if(dl===deltaLines[0]){
      ctx.beginPath();ctx.moveTo(ml,zeroY);
      for(let i=0;i<dl.delta.length;i++){
        const x=ml+pw*(i/(dl.delta.length-1||1));
        const y=mt+ph*(1-(dl.delta[i]-yMin)/range);
        ctx.lineTo(x,y);
      }
      ctx.lineTo(ml+pw,zeroY);ctx.closePath();
      ctx.fillStyle="rgba(59,130,246,0.08)";ctx.fill();
    }
    // Line
    ctx.strokeStyle=dl.color;ctx.lineWidth=1.5;
    if(dl.dash&&dl.dash.length)ctx.setLineDash(dl.dash);
    ctx.beginPath();
    for(let i=0;i<dl.delta.length;i++){
      const x=ml+pw*(i/(dl.delta.length-1||1));
      const y=mt+ph*(1-(dl.delta[i]-yMin)/range);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.setLineDash([]);

    // End badge
    const finalDelta=dl.delta[dl.delta.length-1];
    ctx.font="bold 9px sans-serif";
    ctx.fillStyle=dl.color;ctx.textAlign="right";
    const badgeY=mt+10+deltaLines.indexOf(dl)*14;
    const sign=finalDelta>0?"+":"";
    ctx.fillText(`${dl.label}: ${sign}${finalDelta.toFixed(3)}s vs ${traces[0].label}`,ml+pw,badgeY);
  });

  // Legend labels
  ctx.font="8px sans-serif";ctx.globalAlpha=0.6;
  ctx.fillStyle=traces[0].color;ctx.textAlign="left";
  ctx.fillText(`\u25B2 ${traces[0].label} faster`,ml+4,mt+ph*0.15);
  ctx.fillStyle=textColor;
  ctx.fillText(`\u25BC others faster`,ml+4,mt+ph*0.9);
  ctx.globalAlpha=1;
}

function buildTelemetrySummary(){
  const d=STATE.sessionData;
  if(!d)return "";
  const drivers=d.drivers||{};
  const laps=d.laps||[];
  const stints=d.stints||[];
  const sType=STATE.sessionType;
  
  let summary=[];
  
  // Driver list with teams
  summary.push("DRIVERS:");
  Object.entries(drivers).forEach(([dn,drv])=>{
    summary.push(`  #${dn} ${drv.full_name||drv.acronym} (${drv.team_name||"Unknown"})`);
  });
  
  // Best laps per driver
  summary.push("\nBEST LAP TIMES:");
  const bestByDriver={};
  laps.forEach(l=>{
    if(!l.lap_duration||l.lap_duration<=0)return;
    const dn=l.driver_number;
    if(!bestByDriver[dn]||l.lap_duration<bestByDriver[dn].time){
      bestByDriver[dn]={time:l.lap_duration,lap:l.lap_number,compound:l.compound||"?"};
    }
  });
  const sorted=Object.entries(bestByDriver).sort((a,b)=>a[1].time-b[1].time);
  sorted.forEach(([dn,info],i)=>{
    const drv=drivers[dn]||{};
    const gap=i>0?(info.time-sorted[0][1].time).toFixed(3):"-";
    summary.push(`  P${i+1}: ${drv.acronym||"#"+dn} - ${fmtTime(info.time)} (Lap ${info.lap}, ${info.compound}) Gap: +${gap}s`);
  });
  
  // Stint summary
  if(stints.length){
    summary.push("\nSTINT SUMMARY:");
    const stintByDriver={};
    stints.forEach(s=>{
      const dn=s.driver_number;
      if(!stintByDriver[dn])stintByDriver[dn]=[];
      stintByDriver[dn].push(s);
    });
    Object.entries(stintByDriver).forEach(([dn,sts])=>{
      const drv=drivers[dn]||{};
      const stintInfo=sts.map(s=>`${s.compound||"?"}(L${s.lap_start||"?"}-${s.lap_end||"?"})`).join(", ");
      summary.push(`  ${drv.acronym||"#"+dn}: ${stintInfo}`);
    });
  }
  
  // Lap count stats
  const lapCounts={};
  laps.forEach(l=>{
    const dn=l.driver_number;
    lapCounts[dn]=(lapCounts[dn]||0)+1;
  });
  summary.push("\nLAP COUNTS:");
  Object.entries(lapCounts).sort((a,b)=>b[1]-a[1]).forEach(([dn,cnt])=>{
    const drv=drivers[dn]||{};
    summary.push(`  ${drv.acronym||"#"+dn}: ${cnt} laps`);
  });
  
  // Speed trap data if available
  const speedData=laps.filter(l=>l.st_speed>0);
  if(speedData.length){
    summary.push("\nTOP SPEED TRAP:");
    const maxByDriver={};
    speedData.forEach(l=>{
      const dn=l.driver_number;
      if(!maxByDriver[dn]||l.st_speed>maxByDriver[dn])maxByDriver[dn]=l.st_speed;
    });
    Object.entries(maxByDriver).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([dn,spd])=>{
      const drv=drivers[dn]||{};
      summary.push(`  ${drv.acronym||"#"+dn}: ${spd} km/h`);
    });
  }
  
  // Sector times for qualifying
  if(sType==="qualifying"||sType==="sprint_quali"){
    const sectorData=laps.filter(l=>l.sector_1_duration&&l.sector_2_duration&&l.sector_3_duration);
    if(sectorData.length){
      summary.push("\nBEST SECTOR TIMES:");
      const bestS1={},bestS2={},bestS3={};
      sectorData.forEach(l=>{
        const dn=l.driver_number;
        if(!bestS1[dn]||l.sector_1_duration<bestS1[dn])bestS1[dn]=l.sector_1_duration;
        if(!bestS2[dn]||l.sector_2_duration<bestS2[dn])bestS2[dn]=l.sector_2_duration;
        if(!bestS3[dn]||l.sector_3_duration<bestS3[dn])bestS3[dn]=l.sector_3_duration;
      });
      summary.push("  S1: "+Object.entries(bestS1).sort((a,b)=>a[1]-b[1]).slice(0,5).map(([dn,t])=>`${(drivers[dn]||{}).acronym||dn}:${t.toFixed(3)}`).join(", "));
      summary.push("  S2: "+Object.entries(bestS2).sort((a,b)=>a[1]-b[1]).slice(0,5).map(([dn,t])=>`${(drivers[dn]||{}).acronym||dn}:${t.toFixed(3)}`).join(", "));
      summary.push("  S3: "+Object.entries(bestS3).sort((a,b)=>a[1]-b[1]).slice(0,5).map(([dn,t])=>`${(drivers[dn]||{}).acronym||dn}:${t.toFixed(3)}`).join(", "));
    }
  }
  
  return summary.join("\n");
}

async function generateAIInsights(){
  if(_aiBusy)return;
  _aiBusy=true;
  
  const bodyEl=document.getElementById("ai-body");
  
  try{
    const summary=buildTelemetrySummary();
    if(!summary||summary.length<100){
      throw new Error("Not enough telemetry data to analyze");
    }
    
    const sessionInfo={
      session_name:STATE.activeSession?.session_name||"Unknown",
      circuit:STATE.activeMeeting?.circuit_short_name||STATE.activeMeeting?.meeting_name||"Unknown",
      session_type:STATE.sessionType||"Unknown",
      date:STATE.activeSession?.date_start?.split("T")[0]||new Date().toISOString().split("T")[0]
    };
    
    const provider=(document.getElementById('ai-provider-select')||{}).value||'gemini';
    const r=await fetch("/api/telemetry/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_info:sessionInfo,summary,provider})
    });
    const data=await r.json();
    
    if(!r.ok||data.error){
      throw new Error(data.message||data.error||"Analysis failed");
    }
    
    _aiAnalysis=data.analysis;
    renderAIAnalysis();
    
  }catch(e){
    bodyEl.innerHTML=`<div class="ai-error">${esc(e.message)}</div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="ai-btn ai-btn-secondary" onclick="closeAIModal()">Close</button>
        <button class="ai-btn" onclick="generateAIInsights()">&#128260; Retry</button>
      </div>`;
  }
  _aiBusy=false;
}

function renderAIAnalysis(){
  const bodyEl=document.getElementById("ai-body");
  if(!_aiAnalysis){bodyEl.innerHTML="<em>No analysis available</em>";return;}
  
  // Simple markdown to HTML conversion
  let html=_aiAnalysis
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,m=>'<ul>'+m+'</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
  
  // Wrap in paragraph if needed
  if(!html.startsWith('<h')&&!html.startsWith('<ul'))html='<p>'+html+'</p>';
  
  bodyEl.innerHTML=`
    <div class="ai-content">${html}</div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:12px">
      <button class="ai-btn ai-btn-secondary" onclick="closeAIModal()">Close</button>
      <button class="ai-btn ai-btn-secondary" onclick="saveAIInsightAsNote()" title="Save this analysis as an F1 Note">&#128190; Save as Note</button>
      <button class="ai-btn" onclick="generateAIInsights()">&#128260; Regenerate</button>
    </div>
  `;
}

function buildLapComparisonSummary(){
  const filled=STATE.telemSlots.filter(s=>s&&s.data);
  if(filled.length<2)return "";
  const s0=filled[0],s1=filled[1];
  
  const drivers=STATE.sessionData?.drivers||{};
  const drv1=drivers[s0.dn]||{};
  const drv2=drivers[s1.dn]||{};
  const d1=s0.data.car,d2=s1.data.car;
  
  let summary=[];
  
  // Driver info
  summary.push("DRIVER 1: "+((drv1.full_name||drv1.acronym)||"#"+s0.dn)+" ("+((drv1.team_name)||"Unknown")+")");
  summary.push("  Lap "+s0.lapNum+" - Time: "+fmtTime(s0.lapTime));
  summary.push("");
  summary.push("DRIVER 2: "+((drv2.full_name||drv2.acronym)||"#"+s1.dn)+" ("+((drv2.team_name)||"Unknown")+")");
  summary.push("  Lap "+s1.lapNum+" - Time: "+fmtTime(s1.lapTime));
  summary.push("");
  
  // Lap time delta
  const delta=(s1.lapTime-s0.lapTime);
  summary.push("OVERALL DELTA: "+(delta>0?"+":"")+delta.toFixed(3)+"s (Driver 1 is "+(delta>0?"faster":"slower")+")");
  summary.push("");
  
  // Detect turns from telemetry
  const bestSlot=d1.length>=d2.length?s0:s1;
  const bestCar=bestSlot.data.car;
  const bestLoc=bestSlot.data.loc;
  let turns=[];
  try{
    turns=getReferenceTurns(bestCar,bestLoc)||detectTurns(bestCar,bestLoc)||[];
  }catch(e){turns=[];}
  
  // Sample telemetry at key points (turns + straights)
  summary.push("TELEMETRY COMPARISON BY TRACK SECTION:");
  
  // Compute speed/throttle/brake stats at each turn
  if(turns.length){
    turns.forEach((t,i)=>{
      const idx1=Math.floor(t.frac*(d1.length-1));
      const idx2=Math.floor(t.frac*(d2.length-1));
      const p1=d1[idx1]||{};
      const p2=d2[idx2]||{};
      
      summary.push(`  ${t.label||"T"+(i+1)} (${Math.round(t.frac*100)}% of lap):`);
      summary.push(`    D1: Speed ${p1.speed||0} km/h, Throttle ${p1.throttle||0}%, Brake ${p1.brake||0}%, Gear ${p1.n_gear||0}`);
      summary.push(`    D2: Speed ${p2.speed||0} km/h, Throttle ${p2.throttle||0}%, Brake ${p2.brake||0}%, Gear ${p2.n_gear||0}`);
      summary.push(`    Speed diff: ${((p1.speed||0)-(p2.speed||0)).toFixed(1)} km/h (D1 ${(p1.speed||0)>(p2.speed||0)?"faster":"slower"})`);
    });
  }
  
  // Overall stats
  summary.push("");
  summary.push("OVERALL STATISTICS:");
  
  // Max speeds
  const maxSpd1=Math.max(...d1.map(p=>p.speed||0));
  const maxSpd2=Math.max(...d2.map(p=>p.speed||0));
  summary.push(`  Max Speed: D1=${maxSpd1} km/h, D2=${maxSpd2} km/h`);
  
  // Average speeds
  const avgSpd1=d1.reduce((s,p)=>s+(p.speed||0),0)/d1.length;
  const avgSpd2=d2.reduce((s,p)=>s+(p.speed||0),0)/d2.length;
  summary.push(`  Avg Speed: D1=${avgSpd1.toFixed(1)} km/h, D2=${avgSpd2.toFixed(1)} km/h`);
  
  // Throttle application
  const fullThrottle1=d1.filter(p=>(p.throttle||0)>=95).length/d1.length*100;
  const fullThrottle2=d2.filter(p=>(p.throttle||0)>=95).length/d2.length*100;
  summary.push(`  Full Throttle: D1=${fullThrottle1.toFixed(1)}%, D2=${fullThrottle2.toFixed(1)}%`);
  
  // Braking
  const braking1=d1.filter(p=>(p.brake||0)>0).length/d1.length*100;
  const braking2=d2.filter(p=>(p.brake||0)>0).length/d2.length*100;
  summary.push(`  Time on Brakes: D1=${braking1.toFixed(1)}%, D2=${braking2.toFixed(1)}%`);
  
  // Min speed (corner apex)
  const minSpd1=Math.min(...d1.filter(p=>p.speed>50).map(p=>p.speed||999));
  const minSpd2=Math.min(...d2.filter(p=>p.speed>50).map(p=>p.speed||999));
  summary.push(`  Min Corner Speed: D1=${minSpd1} km/h, D2=${minSpd2} km/h`);
  
  // Track Dominance data (if available from drawTrackDominance)
  if(window._lastDominanceStats){
    const dom=window._lastDominanceStats;
    summary.push("");
    summary.push("TRACK DOMINANCE:");
    summary.push(`  ${dom.n1} dominates ${dom.d1Pct}% of the lap`);
    summary.push(`  ${dom.n2} dominates ${dom.d2Pct}% of the lap`);
    summary.push(`  (Dominance = who is gaining time at each track section)`);
  }
  
  return summary.join("\n");
}

// Store session info and comparison data for chat
let _aiSessionInfo=null;
let _aiComparisonData="";
let _aiConversation=[];  // [{role:"user"|"model", text:"..."}]

function getSelectedYear(){
  const sel=document.getElementById("sel-year");
  return sel?parseInt(sel.value)||2025:2025;
}

async function generateLapComparisonAI(){
  if(_aiBusy)return;
  _aiBusy=true;
  _aiConversation=[];  // Reset conversation on new analysis
  
  const bodyEl=document.getElementById("ai-body");
  
  try{
    const comparisonData=buildLapComparisonSummary();
    if(!comparisonData||comparisonData.length<100){
      throw new Error("Not enough telemetry data to analyze");
    }
    
    _aiComparisonData=comparisonData;
    _aiSessionInfo={
      session_name:STATE.activeSession?.session_name||"Unknown",
      circuit:STATE.activeMeeting?.circuit_short_name||STATE.activeMeeting?.meeting_name||"Unknown",
      session_type:STATE.sessionType||"Unknown",
      year:getSelectedYear()
    };
    
    const provider=(document.getElementById('ai-provider-select')||{}).value||'gemini';
    const r=await fetch("/api/telemetry/compare_laps",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_info:_aiSessionInfo,comparison_data:comparisonData,provider})
    });
    const data=await r.json();
    
    if(!r.ok||data.error){
      throw new Error(data.message||data.error||"Analysis failed");
    }
    
    _aiAnalysis=data.analysis;
    _aiConversation.push({role:"model",text:_aiAnalysis});
    renderAIAnalysisWithChat();
    
  }catch(e){
    bodyEl.innerHTML=`<div class="ai-error">${esc(e.message)}</div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="ai-btn ai-btn-secondary" onclick="closeAIModal()">Close</button>
        <button class="ai-btn" onclick="generateLapComparisonAI()">&#128260; Retry</button>
      </div>`;
  }
  _aiBusy=false;
}

function renderAIAnalysisWithChat(){
  const bodyEl=document.getElementById("ai-body");
  if(!_aiAnalysis){bodyEl.innerHTML="<em>No analysis available</em>";return;}
  
  // Render all conversation messages
  let chatHtml='<div class="ai-chat-messages" id="ai-chat-messages">';
  
  for(const msg of _aiConversation){
    const isUser=msg.role==="user";
    const msgClass=isUser?"ai-chat-user":"ai-chat-model";
    let content=msg.text;
    
    // Convert markdown for model messages
    if(!isUser){
      content=content
        .replace(/^## (.+)$/gm,'<h2>$1</h2>')
        .replace(/^### (.+)$/gm,'<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/`(.+?)`/g,'<code>$1</code>')
        .replace(/^- (.+)$/gm,'<li>$1</li>')
        .replace(/\n\n/g,'</p><p>')
        .replace(/\n/g,'<br>');
    }
    
    chatHtml+=`<div class="${msgClass}">
      ${isUser?'<div class="ai-chat-label">You</div>':''}
      <div class="ai-chat-content ${isUser?'':'ai-content'}">${isUser?esc(msg.text):content}</div>
    </div>`;
  }
  chatHtml+='</div>';
  
  // Chat input
  chatHtml+=`
    <div class="ai-chat-input-wrap">
      <input type="text" id="ai-chat-input" class="ai-chat-input" placeholder="Ask a follow-up question..." onkeydown="if(event.key==='Enter')sendAIChat()">
      <button class="ai-btn" onclick="sendAIChat()" id="ai-chat-send">Send</button>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:12px">
      <button class="ai-btn ai-btn-secondary" onclick="closeAIModal()">Close</button>
      <button class="ai-btn ai-btn-secondary" onclick="saveAIInsightAsNote()" title="Save this analysis as an F1 Note">&#128190; Save as Note</button>
      <button class="ai-btn" onclick="generateLapComparisonAI()">&#128260; New Analysis</button>
    </div>
  `;
  
  bodyEl.innerHTML=chatHtml;
  
  // Scroll to bottom of chat
  const chatEl=document.getElementById("ai-chat-messages");
  if(chatEl)chatEl.scrollTop=chatEl.scrollHeight;
}

async function sendAIChat(){
  const input=document.getElementById("ai-chat-input");
  const question=(input?.value||"").trim();
  if(!question||_aiBusy)return;
  
  _aiBusy=true;
  input.value="";
  input.disabled=true;
  document.getElementById("ai-chat-send").disabled=true;
  
  // Add user message to conversation
  _aiConversation.push({role:"user",text:question});
  renderAIAnalysisWithChat();
  
  // Show loading indicator
  const chatEl=document.getElementById("ai-chat-messages");
  chatEl.innerHTML+=`<div class="ai-chat-model ai-chat-loading"><div class="ai-spinner" style="width:16px;height:16px"></div> Thinking...</div>`;
  chatEl.scrollTop=chatEl.scrollHeight;
  
  try{
    const provider=(document.getElementById('ai-provider-select')||{}).value||'gemini';
    const r=await fetch("/api/telemetry/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        session_info:_aiSessionInfo,
        comparison_data:_aiComparisonData,
        conversation:_aiConversation.slice(0,-1),
        question:question,
        provider:provider
      })
    });
    const data=await r.json();
    
    if(!r.ok||data.error){
      throw new Error(data.message||data.error||"Failed to get response");
    }
    
    _aiConversation.push({role:"model",text:data.response});
    renderAIAnalysisWithChat();
    
  }catch(e){
    // Remove loading and show error
    _aiConversation.push({role:"model",text:"Error: "+e.message});
    renderAIAnalysisWithChat();
  }
  
  _aiBusy=false;
  const newInput=document.getElementById("ai-chat-input");
  if(newInput){newInput.disabled=false;newInput.focus();}
  const sendBtn=document.getElementById("ai-chat-send");
  if(sendBtn)sendBtn.disabled=false;
}

/* ══════════════════════════════════════════════════════════════════════════════
   SAVE AI INSIGHT AS NOTE
   ══════════════════════════════════════════════════════════════════════════════ */
async function saveAIInsightAsNote(){
  // Gather the full conversation text (all model messages)
  let fullText=_aiAnalysis||"";
  if(_aiConversation.length>0){
    fullText=_aiConversation
      .filter(m=>m.role==="model")
      .map(m=>m.text)
      .join("\n\n---\n\n");
  }
  if(!fullText||fullText.length<20){alert("No analysis to save.");return;}

  const circuit=STATE.activeMeeting?.circuit_short_name||STATE.activeMeeting?.meeting_name||"";
  const sessionName=STATE.activeSession?.session_name||"";
  const sType=STATE.sessionType||"";
  const source=sType==="practice"?"Practice Telemetry Analysis":
               sType==="qualifying"||sType==="sprint_quali"?"Qualifying Telemetry Analysis":
               "Telemetry Analysis";

  try{
    const r=await fetch("/api/notes/from_ai_insight",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        text:fullText,
        source:source+" - "+circuit+" "+sessionName,
        circuit:circuit,
        session:sessionName,
        session_type:sType,
        year:String(getSelectedYear()),
        save:true
      })
    });
    const d=await r.json();
    if(d.ok){
      alert("Saved as note: "+d.note.title);
    }else{
      alert("Error: "+(d.error||"Unknown error"));
    }
  }catch(e){
    alert("Failed to save: "+e.message);
  }
}

/* ══════════════════════════════════════════════════════════════════════════════
   PRACTICE SESSION AI ANALYSIS
   ══════════════════════════════════════════════════════════════════════════════ */
let _practiceAIData="";

function buildPracticeDataSummary(){
  const d=STATE.sessionData;
  if(!d)return "";
  
  const drivers=d.drivers||{};
  const laps=d.laps||[];
  const stints=d.stints||[];
  
  let summary=[];
  
  // Session info
  summary.push("SESSION: "+(STATE.activeSession?.session_name||"Practice"));
  summary.push("");
  
  // Driver list with teams
  summary.push("DRIVERS:");
  const driverList=Object.values(drivers).sort((a,b)=>(a.team_name||"").localeCompare(b.team_name||""));
  for(const drv of driverList){
    summary.push(`  #${drv.driver_number} ${drv.full_name||drv.acronym} - ${drv.team_name||"Unknown"}`);
  }
  summary.push("");
  
  // Best lap times by driver
  summary.push("BEST LAP TIMES (Single Lap Pace):");
  const bestByDriver={};
  for(const lap of laps){
    if(!lap.lap_duration||lap.lap_duration<=0)continue;
    if(lap.is_pit_out_lap)continue;
    const dn=lap.driver_number;
    if(!bestByDriver[dn]||lap.lap_duration<bestByDriver[dn].time){
      bestByDriver[dn]={time:lap.lap_duration,compound:lap.compound||"Unknown",lapNum:lap.lap_number};
    }
  }
  const sortedBest=Object.entries(bestByDriver).sort((a,b)=>a[1].time-b[1].time);
  let pos=1;
  const leaderTime=sortedBest[0]?sortedBest[0][1].time:0;
  for(const [dn,data] of sortedBest){
    const drv=drivers[dn]||{};
    const gap=pos===1?"":" +"+(data.time-leaderTime).toFixed(3);
    summary.push(`  P${pos}. ${drv.acronym||"#"+dn} (${drv.team_name||"?"}) - ${fmtTime(data.time)}${gap} [${data.compound}] (Lap ${data.lapNum})`);
    pos++;
  }
  summary.push("");
  
  // Speed trap data (if available)
  const speedData={};
  for(const lap of laps){
    const dn=lap.driver_number;
    if(lap.st_speed&&lap.st_speed>0){
      if(!speedData[dn])speedData[dn]={max:0,speeds:[]};
      speedData[dn].speeds.push(lap.st_speed);
      if(lap.st_speed>speedData[dn].max)speedData[dn].max=lap.st_speed;
    }
  }
  if(Object.keys(speedData).length>0){
    summary.push("SPEED TRAP DATA:");
    const sortedSpeed=Object.entries(speedData).sort((a,b)=>b[1].max-a[1].max);
    for(const [dn,data] of sortedSpeed){
      const drv=drivers[dn]||{};
      const avg=data.speeds.reduce((s,v)=>s+v,0)/data.speeds.length;
      summary.push(`  ${drv.acronym||"#"+dn} (${drv.team_name||"?"}): Max ${data.max} km/h, Avg ${avg.toFixed(1)} km/h`);
    }
    summary.push("");
  }
  
  // ═══════════════════════════════════════════════════════════════════════════
  // COMPREHENSIVE LONG RUN ANALYSIS
  // ═══════════════════════════════════════════════════════════════════════════
  const longRuns=identifyTyreStints();
  
  if(longRuns.length>0){
    // Group long runs by compound
    const byCompound={};
    for(const run of longRuns){
      const comp=(run.compound||"UNKNOWN").toUpperCase();
      if(!byCompound[comp])byCompound[comp]=[];
      byCompound[comp].push(run);
    }
    
    // Per-compound long run pace rankings
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("LONG RUN PACE ANALYSIS (Race Pace Simulation)");
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("");
    
    for(const [compound,runs] of Object.entries(byCompound)){
      // Sort by average pace (fastest first)
      runs.sort((a,b)=>a.avgPace-b.avgPace);
      const fastestPace=runs[0]?.avgPace||0;
      
      summary.push(`▶ ${compound} COMPOUND LONG RUNS (${runs.length} runs):`);
      summary.push(`  Ranked by average pace (fuel-corrected estimate assumes ~0.1s/lap fuel burn-off):`);
      summary.push("");
      
      let rank=1;
      for(const run of runs){
        const drv=drivers[run.dn]||{};
        const gapToFastest=run.avgPace-fastestPace;
        const gapStr=rank===1?"FASTEST":`+${gapToFastest.toFixed(3)}s`;
        const degStr=run.slope>0?`+${run.slope.toFixed(3)}`:run.slope.toFixed(3);
        
        // Calculate fuel-corrected pace (assume mid-stint, so subtract half the fuel effect)
        const midLapIdx=Math.floor(run.cleanLaps.length/2);
        const fuelCorrection=midLapIdx*0.05; // ~0.1s/lap, half effect at mid-stint
        const fuelCorrectedPace=run.avgPace-fuelCorrection;
        
        // Calculate consistency (standard deviation)
        const times=run.cleanLaps.map(l=>l.lap_duration);
        const mean=times.reduce((s,t)=>s+t,0)/times.length;
        const variance=times.reduce((s,t)=>s+Math.pow(t-mean,2),0)/times.length;
        const stdDev=Math.sqrt(variance);
        const consistencyRating=stdDev<0.3?"Excellent":stdDev<0.5?"Good":stdDev<0.8?"Average":"Poor";
        
        summary.push(`  ${rank}. ${drv.acronym||"#"+run.dn} (${drv.team_name||"?"}):`);
        summary.push(`     Stint: Laps ${run.cleanLaps[0].lap_number}-${run.cleanLaps[run.cleanLaps.length-1].lap_number} (${run.cleanLaps.length} laps)`);
        summary.push(`     Avg Pace: ${fmtTime(run.avgPace)} [${gapStr}]`);
        summary.push(`     Fuel-Corrected Pace: ~${fmtTime(fuelCorrectedPace)}`);
        summary.push(`     Degradation: ${degStr} s/lap`);
        summary.push(`     Consistency: ${consistencyRating} (σ=${stdDev.toFixed(3)}s)`);
        summary.push(`     Lap Times: ${run.cleanLaps.map(l=>fmtTime(l.lap_duration)).join(" → ")}`);
        summary.push("");
        rank++;
      }
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // DEGRADATION COMPARISON TABLE
    // ═══════════════════════════════════════════════════════════════════════════
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("TYRE DEGRADATION COMPARISON");
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("(Positive = getting slower each lap, Negative = improving/fuel effect)");
    summary.push("");
    
    // Sort all runs by degradation (lowest/best first)
    const allRunsSorted=[...longRuns].sort((a,b)=>a.slope-b.slope);
    
    summary.push("Ranked by degradation rate (best to worst):");
    let degRank=1;
    for(const run of allRunsSorted){
      const drv=drivers[run.dn]||{};
      const degStr=run.slope>0?`+${run.slope.toFixed(3)}`:run.slope.toFixed(3);
      const degRating=run.slope<0?"Excellent (improving)":run.slope<0.1?"Very Low":run.slope<0.2?"Low":run.slope<0.35?"Moderate":run.slope<0.5?"High":"Very High";
      summary.push(`  ${degRank}. ${drv.acronym||"#"+run.dn} (${drv.team_name||"?"}) on ${run.compound}: ${degStr} s/lap [${degRating}]`);
      degRank++;
    }
    summary.push("");
    
    // ═══════════════════════════════════════════════════════════════════════════
    // TEAM LONG RUN COMPARISON
    // ═══════════════════════════════════════════════════════════════════════════
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("TEAM LONG RUN PACE COMPARISON");
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("");
    
    // Group by team
    const teamLongRuns={};
    for(const run of longRuns){
      const drv=drivers[run.dn]||{};
      const team=drv.team_name||"Unknown";
      if(!teamLongRuns[team])teamLongRuns[team]=[];
      teamLongRuns[team].push({...run,driver:drv});
    }
    
    // Calculate best long run pace per team
    const teamBestPace={};
    for(const [team,runs] of Object.entries(teamLongRuns)){
      const bestRun=runs.reduce((best,r)=>r.avgPace<best.avgPace?r:best,runs[0]);
      teamBestPace[team]={
        pace:bestRun.avgPace,
        deg:bestRun.slope,
        compound:bestRun.compound,
        driver:bestRun.driver.acronym,
        laps:bestRun.cleanLaps.length
      };
    }
    
    // Sort teams by best long run pace
    const sortedTeams=Object.entries(teamBestPace).sort((a,b)=>a[1].pace-b[1].pace);
    const fastestTeamPace=sortedTeams[0]?sortedTeams[0][1].pace:0;
    
    let teamRank=1;
    for(const [team,data] of sortedTeams){
      const gap=data.pace-fastestTeamPace;
      const gapStr=teamRank===1?"FASTEST":`+${gap.toFixed(3)}s`;
      const degStr=data.deg>0?`+${data.deg.toFixed(3)}`:data.deg.toFixed(3);
      summary.push(`  ${teamRank}. ${team}:`);
      summary.push(`     Best Long Run: ${fmtTime(data.pace)} [${gapStr}] by ${data.driver} on ${data.compound} (${data.laps} laps)`);
      summary.push(`     Degradation: ${degStr} s/lap`);
      teamRank++;
    }
    summary.push("");
    
    // Teammate long run comparison
    summary.push("TEAMMATE LONG RUN COMPARISON:");
    for(const [team,runs] of Object.entries(teamLongRuns)){
      const driverRuns={};
      for(const run of runs){
        const dn=run.dn;
        if(!driverRuns[dn])driverRuns[dn]=[];
        driverRuns[dn].push(run);
      }
      const driverNums=Object.keys(driverRuns);
      if(driverNums.length>=2){
        // Get best run per driver
        const d1Runs=driverRuns[driverNums[0]];
        const d2Runs=driverRuns[driverNums[1]];
        const d1Best=d1Runs.reduce((b,r)=>r.avgPace<b.avgPace?r:b,d1Runs[0]);
        const d2Best=d2Runs.reduce((b,r)=>r.avgPace<b.avgPace?r:b,d2Runs[0]);
        const drv1=drivers[driverNums[0]]||{};
        const drv2=drivers[driverNums[1]]||{};
        
        const paceGap=d2Best.avgPace-d1Best.avgPace;
        const degGap=d2Best.slope-d1Best.slope;
        const faster=paceGap>0?drv1.acronym:drv2.acronym;
        const betterDeg=degGap>0?drv1.acronym:drv2.acronym;
        
        summary.push(`  ${team}:`);
        summary.push(`    ${drv1.acronym}: ${fmtTime(d1Best.avgPace)} avg, ${d1Best.slope>0?"+":""}${d1Best.slope.toFixed(3)} s/lap deg (${d1Best.compound})`);
        summary.push(`    ${drv2.acronym}: ${fmtTime(d2Best.avgPace)} avg, ${d2Best.slope>0?"+":""}${d2Best.slope.toFixed(3)} s/lap deg (${d2Best.compound})`);
        summary.push(`    → ${faster} is ${Math.abs(paceGap).toFixed(3)}s faster in race pace`);
        summary.push(`    → ${betterDeg} has ${Math.abs(degGap).toFixed(3)}s/lap better degradation`);
      }
    }
    summary.push("");
  }else{
    summary.push("NO LONG RUNS IDENTIFIED (stints with ≥5 clean laps)");
    summary.push("");
  }
  
  // Stint summary with lap ranges
  if(stints.length>0){
    summary.push("═══════════════════════════════════════════════════════════════");
    summary.push("STINT PROGRAM SUMMARY");
    summary.push("═══════════════════════════════════════════════════════════════");
    const stintsByDriver={};
    for(const s of stints){
      const dn=s.driver_number;
      if(!stintsByDriver[dn])stintsByDriver[dn]=[];
      stintsByDriver[dn].push(s);
    }
    for(const [dn,drvStints] of Object.entries(stintsByDriver)){
      const drv=drivers[dn]||{};
      const stintStr=drvStints.map(s=>`${s.compound||"?"}(L${s.lap_start||"?"}-${s.lap_end||"?"})`).join(" → ");
      summary.push(`  ${drv.acronym||"#"+dn} (${drv.team_name||"?"}): ${stintStr}`);
    }
    summary.push("");
  }
  
  // Teammate comparisons (single lap)
  summary.push("═══════════════════════════════════════════════════════════════");
  summary.push("TEAMMATE GAPS (Single Lap vs Race Pace)");
  summary.push("═══════════════════════════════════════════════════════════════");
  const teamDrivers={};
  for(const [dn,drv] of Object.entries(drivers)){
    const team=drv.team_name||"Unknown";
    if(!teamDrivers[team])teamDrivers[team]=[];
    teamDrivers[team].push({dn:parseInt(dn),drv,best:bestByDriver[dn]?.time||999});
  }
  for(const [team,tdrvs] of Object.entries(teamDrivers)){
    if(tdrvs.length>=2){
      tdrvs.sort((a,b)=>a.best-b.best);
      const gap=tdrvs[1].best-tdrvs[0].best;
      summary.push(`  ${team}: ${tdrvs[0].drv.acronym} vs ${tdrvs[1].drv.acronym}`);
      summary.push(`    Single Lap Gap: ${gap>0?"+":""}${gap.toFixed(3)}s (${tdrvs[0].drv.acronym} faster)`);
    }
  }
  
  return summary.join("\n");
}

function openPracticeAI(){
  if(STATE.sessionType!=="practice"){alert("Practice AI analysis is only available for practice sessions");return;}
  
  document.getElementById("ai-modal-overlay").classList.add("open");
  document.getElementById("ai-body").innerHTML=`
    <div style="padding:24px;text-align:center">
      <p style="margin-bottom:16px;color:var(--text)">Choose AI provider for practice analysis:</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="ai-btn" onclick="document.getElementById('ai-provider-select').value='gemini';startPracticeAI()">Gemini</button>
        <button class="ai-btn" style="background:#d97706" onclick="document.getElementById('ai-provider-select').value='claude';startPracticeAI()">Claude</button>
      </div>
    </div>
  `;
}
function startPracticeAI(){
  const prov=(document.getElementById('ai-provider-select')||{}).value||'gemini';
  document.getElementById("ai-body").innerHTML=`
    <div class="ai-loading">
      <div class="ai-spinner"></div>
      <span>Analyzing practice session with ${prov==='claude'?'Claude':'Gemini'} AI...</span>
    </div>
  `;
  _aiConversation=[];
  generatePracticeAI();
}

async function generatePracticeAI(){
  if(_aiBusy)return;
  _aiBusy=true;
  
  const bodyEl=document.getElementById("ai-body");
  
  try{
    const practiceData=buildPracticeDataSummary();
    if(!practiceData||practiceData.length<100){
      throw new Error("Not enough practice data to analyze");
    }
    
    _practiceAIData=practiceData;
    _aiSessionInfo={
      session_name:STATE.activeSession?.session_name||"Practice",
      circuit:STATE.activeMeeting?.circuit_short_name||STATE.activeMeeting?.meeting_name||"Unknown",
      session_type:"practice",
      year:getSelectedYear()
    };
    
    const provider=(document.getElementById('ai-provider-select')||{}).value||'gemini';
    const r=await fetch("/api/telemetry/practice_analysis",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session_info:_aiSessionInfo,practice_data:practiceData,provider})
    });
    const data=await r.json();
    
    if(!r.ok||data.error){
      throw new Error(data.message||data.error||"Analysis failed");
    }
    
    _aiAnalysis=data.analysis;
    _aiComparisonData=practiceData;  // For chat context
    _aiConversation.push({role:"model",text:_aiAnalysis});
    renderAIAnalysisWithChat();
    
  }catch(e){
    bodyEl.innerHTML=`<div class="ai-error">${esc(e.message)}</div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="ai-btn ai-btn-secondary" onclick="closeAIModal()">Close</button>
        <button class="ai-btn" onclick="generatePracticeAI()">&#128260; Retry</button>
      </div>`;
  }
  _aiBusy=false;
}
