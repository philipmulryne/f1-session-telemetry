<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Season Telemetry</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#0e0e10;--surface:#18181b;--surface2:#1f1f23;--surface3:#27272a;--border:#2e2e33;--text:#e4e4e7;--text2:#a1a1aa;--accent:#e10600;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--purple:#a78bfa;--card-hover-border:#444;--scroll-thumb:#2e2e33;--bar-bg:#27272a;--soft:#ff3333;--medium:#ffcc00;--hard:#ffffff;--inter:#39b54a;--wet:#0066ff}
[data-theme="dim"]{--bg:#1a1d24;--surface:#22262e;--surface2:#2a2f38;--surface3:#333842;--border:#3d4350;--text:#d8dce4;--text2:#8b92a0;--accent:#e10600;--blue:#60a5fa;--green:#34d399;--yellow:#fbbf24;--purple:#c4b5fd;--card-hover-border:#555e6e;--scroll-thumb:#3d4350;--bar-bg:#333842;--soft:#ff4444;--medium:#ffd633;--hard:#e4e4e7;--inter:#34d399;--wet:#60a5fa}
[data-theme="light"]{--bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f2;--surface3:#e8e8ec;--border:#d4d4d8;--text:#18181b;--text2:#52525b;--accent:#dc2626;--blue:#2563eb;--green:#16a34a;--yellow:#ca8a04;--purple:#7c3aed;--card-hover-border:#a1a1aa;--scroll-thumb:#d4d4d8;--bar-bg:#e8e8ec;--soft:#dc2626;--medium:#ca8a04;--hard:#71717a;--inter:#16a34a;--wet:#2563eb}
:root{--radius:8px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .25s,color .25s}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
::selection{background:var(--accent);color:#fff}

/* Nav */
#app-nav{display:flex;align-items:center;gap:2px;padding:0 12px;height:32px;min-height:32px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;flex-shrink:0;transition:background .25s}
#app-nav::-webkit-scrollbar{height:0}
.nav-link{font-size:11px;padding:4px 8px;border-radius:4px;color:var(--text2);text-decoration:none;white-space:nowrap;transition:background .1s,color .1s;display:flex;align-items:center;gap:4px}
.nav-link:hover{background:var(--surface2);color:var(--text);text-decoration:none}
.nav-link.nav-active{background:var(--accent);color:#fff;font-weight:600}
.nav-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 4px}

/* Layout */
#wrapper{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#content{flex:1;overflow-y:auto;padding:20px 28px 60px}
.page-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-header h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.page-header .subtitle{font-size:13px;color:var(--text2)}
.theme-switcher{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-left:auto}
.theme-btn{background:none;border:none;color:var(--text2);padding:5px 8px;font-size:13px;transition:background .1s,color .1s;line-height:1}
.theme-btn:hover{background:var(--surface2);color:var(--text)}.theme-btn.active{background:var(--surface3);color:var(--text)}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.ctrl-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:12px;outline:none;max-width:260px}
.ctrl-select:focus{border-color:var(--accent)}
.ctrl-btn{border:1px solid var(--border);background:var(--surface2);color:var(--text2);padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:700;transition:background .1s,color .1s,border-color .1s}
.ctrl-btn:hover{background:var(--surface3);color:var(--text)}
.ctrl-btn.active{background:var(--accent);border-color:transparent;color:#fff}

/* Session type tabs */
.session-tabs{display:flex;gap:4px;flex-wrap:wrap}
.session-tab{padding:5px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.session-tab:hover{background:var(--surface3);color:var(--text)}
.session-tab.active{background:var(--accent);color:#fff;border-color:transparent}
.session-tab .sess-type{font-size:10px;font-weight:400;opacity:.7;margin-left:4px}

/* Status bar */
.status-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;font-size:12px;flex-wrap:wrap}
.status-chip{display:flex;align-items:center;gap:4px;color:var(--text2)}
.status-chip strong{color:var(--text);font-weight:700}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Panels */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.panel-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.panel-header:hover{background:var(--surface2)}
.panel-title{font-size:13px;font-weight:700;flex:1}
.panel-toggle{font-size:10px;color:var(--text2);transition:transform .15s}
.panel-body{padding:0}
.panel.collapsed .panel-body{display:none}
.panel.collapsed .panel-toggle{transform:rotate(-90deg)}

/* Data table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{position:sticky;top:0;background:var(--surface2);font-weight:700;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none}
.data-table th:hover{color:var(--text)}
.data-table td{padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table tr:hover td{background:var(--surface2)}
.data-table tr.selected td{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.3)}
.data-table .time{font-variant-numeric:tabular-nums;font-family:"SF Mono",Monaco,Consolas,monospace;font-size:11px}
.data-table .best{color:var(--green);font-weight:700}
.data-table .gap{color:var(--accent);font-size:11px;font-variant-numeric:tabular-nums}
.data-table .compound{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px}
.data-table .driver-cell{display:flex;align-items:center;gap:6px;cursor:pointer}
.data-table .driver-cell .team-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Scroll wrapper for tables */
.table-scroll{max-height:500px;overflow-y:auto;overflow-x:auto}

/* Chart containers */
.chart-section{margin-bottom:16px}
.chart-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.chart-box{flex:1;min-width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;position:relative}
.chart-box.full{min-width:100%}
.chart-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
canvas{display:block;width:100%}

/* Telem slot selectors */
.telem-slots{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.telem-slot{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);font-size:12px;min-width:180px}
.telem-slot.slot1{border-color:var(--blue)}
.telem-slot.slot2{border-color:var(--accent)}
.telem-slot.slot3{border-color:var(--green)}
.telem-slot .slot-label{font-weight:800;font-size:10px;text-transform:uppercase}
.telem-slot .slot-info{color:var(--text);font-weight:600}
.telem-slot .slot-empty{color:var(--text2);font-style:italic}

/* Inline telem lap pickers */
.telem-picker-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.telem-picker{display:flex;align-items:center;gap:5px;flex:1;min-width:260px}
.telem-picker .picker-label{font-weight:800;font-size:10px;text-transform:uppercase;white-space:nowrap}
.telem-picker select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;max-width:180px}
.telem-picker select:focus{border-color:var(--blue);outline:none}
.telem-picker .picker-best{font-size:10px;padding:3px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.telem-picker .picker-best:hover{background:var(--green);color:#000;border-color:var(--green)}

/* ERS zone indicators */
.ers-toggle{font-size:10px;padding:3px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.ers-toggle:hover{border-color:var(--yellow);color:var(--yellow)}
.ers-toggle.active{background:rgba(234,179,8,.15);border-color:var(--yellow);color:var(--yellow)}
.ers-toggle.loading{opacity:.6;pointer-events:none}
.ers-tooltip{position:fixed;display:none;max-width:280px;padding:8px 10px;border-radius:var(--radius);background:rgba(0,0,0,.92);color:#e4e4e7;font-size:11px;line-height:1.4;pointer-events:none;z-index:9999;border:1px solid rgba(255,255,255,.1)}
.ers-tooltip .ers-tt-type{font-weight:800;font-size:10px;text-transform:uppercase;margin-bottom:2px}
.ers-tooltip .ers-tt-type.DEPLOYMENT{color:#22c55e}
.ers-tooltip .ers-tt-type.CLIPPING{color:#eab308}
.ers-tooltip .ers-tt-type.SUPER_CLIPPING{color:#ef4444}

/* Loading / empty */
.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}

/* Compound badge */
.compound-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 6px;border-radius:4px}
.compound-badge.SOFT{background:rgba(255,51,51,.15);color:var(--soft);border:1px solid rgba(255,51,51,.3)}
.compound-badge.MEDIUM{background:rgba(255,204,0,.12);color:var(--medium);border:1px solid rgba(255,204,0,.3)}
.compound-badge.HARD{background:rgba(200,200,200,.1);color:var(--hard);border:1px solid rgba(200,200,200,.2)}
.compound-badge.INTERMEDIATE{background:rgba(57,181,74,.12);color:var(--inter);border:1px solid rgba(57,181,74,.3)}
.compound-badge.WET{background:rgba(0,102,255,.12);color:var(--wet);border:1px solid rgba(0,102,255,.3)}
.compound-badge.UNKNOWN{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}

/* Filter row */
.filter-row{display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-chip{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .1s}
.filter-chip:hover{background:var(--surface3);color:var(--text)}
.filter-chip.active{background:var(--blue);color:#fff;border-color:transparent}

/* Tooltip */
.chart-tooltip{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:10;white-space:nowrap;display:none}

/* Auth */
.auth-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;font-size:12px}
.auth-bar input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:var(--radius);font-size:12px;outline:none;width:160px}
.auth-bar input:focus{border-color:var(--accent)}
.auth-status{margin-left:auto;font-size:11px;color:var(--text2)}
.auth-status.ok{color:var(--green)}

/* Chart legend */
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0 2px;font-size:10px;color:var(--text2)}
.chart-legend-item{display:flex;align-items:center;gap:4px}
.chart-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-legend-dot.hollow{background:transparent!important;border:2px solid}
.chart-legend-line{width:14px;height:0;border-top:2px dashed;flex-shrink:0}

/* Comparison description */
.telem-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:6px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.telem-desc strong{color:var(--text)}

/* Track dominance */
.track-container{position:relative;display:inline-block}
.track-legend{display:flex;gap:16px;margin-top:6px;font-size:11px;color:var(--text2);flex-wrap:wrap;align-items:center}
.track-legend-item{display:flex;align-items:center;gap:4px}

/* Domination share bar */
.dom-share-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px}
.dom-share-bar{height:10px;border-radius:5px;flex:1;display:flex;overflow:hidden;border:1px solid var(--border);max-width:340px}
.dom-share-bar .seg{height:100%;transition:width .3s}
.dom-share-pct{font-weight:700;font-size:11px;white-space:nowrap}

/* Turn type info box */
.turn-info-box{margin-top:10px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;color:var(--text2);line-height:1.6}
.turn-info-box .tib-title{font-weight:700;color:var(--text);margin-bottom:4px;font-size:12px}
.turn-type-filters{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.turn-type-btn{padding:2px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:10px;font-weight:600;transition:all .15s}
.turn-type-btn:hover{border-color:var(--accent);color:var(--text)}
.turn-type-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.turn-type-btn .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.turn-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px 12px}
.turn-info-item{display:flex;align-items:center;gap:4px;padding:1px 0}
.turn-info-item .ti-badge{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.turn-info-item .ti-label{font-weight:600;color:var(--text)}
.turn-info-item .ti-speed{opacity:.7}

/* Per-category dominance breakdown */
.cat-dom-section{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.cat-dom-section .cds-title{font-weight:700;color:var(--text);font-size:11px;margin-bottom:6px}
.cat-dom-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
.cat-dom-row .cdr-type{width:80px;display:flex;align-items:center;gap:4px;font-weight:600;flex-shrink:0}
.cat-dom-row .cdr-type .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-dom-row .cdr-bar{flex:1;height:8px;border-radius:4px;display:flex;overflow:hidden;max-width:200px;border:1px solid var(--border)}
.cat-dom-row .cdr-bar .seg{height:100%}
.cat-dom-row .cdr-stats{display:flex;gap:6px;font-size:10px;white-space:nowrap;align-items:center}
.cat-dom-row .cdr-pct{font-weight:700}
.cat-dom-row .cdr-delta{font-weight:600;padding:1px 5px;border-radius:8px;font-size:9px;background:rgba(255,255,255,.07);border:1px solid var(--border)}

/* Q1/Q2/Q3 phase tabs */
.quali-phase-tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.quali-phase-tab{padding:4px 14px;border-radius:var(--radius);font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.quali-phase-tab:hover{background:var(--surface3);color:var(--text)}
.quali-phase-tab.active{background:var(--accent);color:#fff;border-color:transparent}
.quali-phase-tab .phase-count{font-weight:400;opacity:.7;margin-left:3px;font-size:10px}

/* Live refresh */
.live-controls{display:flex;align-items:center;gap:8px;margin-left:auto}
.live-toggle{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.live-toggle:hover{border-color:var(--accent);color:var(--text)}
.live-toggle.active{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.live-toggle .live-dot{width:7px;height:7px;border-radius:50%;background:var(--text2);flex-shrink:0;transition:background .15s}
.live-toggle.active .live-dot{background:var(--green);animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-countdown{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums}

/* Lasso & annotation on scatter */
.scatter-wrap{position:relative}
.scatter-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.scatter-tb-btn{padding:3px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s}
.scatter-tb-btn:hover{background:var(--surface3);color:var(--text)}
.scatter-tb-btn.active{background:var(--blue);color:#fff;border-color:transparent}
.scatter-tb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.scatter-lasso-info{position:absolute;top:8px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:11px;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:5;display:none;max-width:220px}
.scatter-lasso-info .sli-title{font-weight:700;color:var(--text);margin-bottom:2px}
.scatter-lasso-info .sli-val{font-size:14px;font-weight:800;color:var(--yellow);font-variant-numeric:tabular-nums}
.scatter-anno-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.scatter-anno{position:absolute;pointer-events:auto;background:var(--surface);border:1px solid var(--yellow);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--yellow);font-weight:600;white-space:nowrap;cursor:default;transform:translate(-50%,-100%);margin-top:-6px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.scatter-anno .anno-x{cursor:pointer;margin-left:4px;opacity:.6;font-size:10px}
.scatter-anno .anno-x:hover{opacity:1;color:var(--accent)}
.scatter-anno-input{position:absolute;z-index:20;font-size:10px;padding:2px 6px;border:1px solid var(--yellow);border-radius:4px;background:var(--surface);color:var(--text);outline:none;width:100px;pointer-events:auto}

/* Speed Rankings 3-column layout */
.speed-rankings-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:8px 0}
@media(max-width:800px){.speed-rankings-wrap{grid-template-columns:1fr}}
.speed-col{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--border)}
.speed-col-title{font-weight:700;font-size:12px;color:var(--text);margin-bottom:8px}
.speed-rank-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.speed-rank-driver{font-weight:700;font-size:11px;width:36px;flex-shrink:0;text-align:right}
.speed-rank-bar-bg{flex:1;height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden}
.speed-rank-bar{height:100%;border-radius:5px;transition:width .3s}
.speed-rank-val{font-size:11px;font-weight:600;color:var(--text);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
.speed-rank-unit{font-size:9px;color:var(--text2);margin-left:2px;font-weight:400}
.tvm-wrap canvas{display:block;width:100%;border-radius:var(--radius)}
/* Multi-driver stint summary */
.md-stint-table{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px}
.md-stint-table th{text-align:left;color:var(--text2);font-weight:600;padding:3px 6px;border-bottom:1px solid var(--border)}
.md-stint-table td{padding:3px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.md-stint-table .flag-sc{background:rgba(255,200,0,.15);color:#ffc800;font-weight:700;font-size:9px;padding:1px 4px;border-radius:3px}

/* Race Dashboard */

/* Range slider */
.rd-range-row{display:flex;align-items:center;gap:8px;padding:4px 12px;border-bottom:1px solid var(--border)}
.rd-range-row .rd-label{font-size:10px;color:var(--text2);flex-shrink:0}
.rd-range-track{flex:1;position:relative;height:18px;cursor:pointer}
.rd-range-track input[type=range]{position:absolute;width:100%;pointer-events:none;-webkit-appearance:none;appearance:none;background:transparent;height:18px;margin:0}
.rd-range-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:14px;width:14px;border-radius:50%;background:var(--blue);border:2px solid var(--surface);cursor:pointer;pointer-events:auto;margin-top:-5px}

/* Tyre strategy timeline */
.rd-strategy-wrap{padding:0}

/* Position chart */

/* Pit analysis table */
.pit-table{width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums}

/* Replay controls */
.replay-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}

/* RC toolbar */
.rc-toolbar{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.rc-toolbar .filter-chip{font-size:10px;padding:2px 8px}
.rc-sound-btn{font-size:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;margin-left:auto}
.rc-sound-btn.active{background:rgba(59,130,246,.15);color:var(--blue);border-color:var(--blue)}

/* Degradation & long run */
.deg-chart-wrap{position:relative}
.long-run-cards{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.lr-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:11px;min-width:180px;cursor:pointer;transition:all .12s}
.lr-card:hover{border-color:var(--accent)}
.lr-card.selected{border-color:var(--blue);background:rgba(59,130,246,.08)}
.lr-card .lr-driver{font-weight:700;color:var(--text)}
.lr-card .lr-meta{color:var(--text2);margin-top:2px}
.lr-card .lr-pace{font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}
.lr-card .lr-deg{font-size:10px;color:var(--yellow);margin-top:2px}

/* AI Insights Modal */
#ai-modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-start;justify-content:center;padding-top:5vh;overflow-y:auto;

}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}

.ai-spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

/* AI Chat interface */
.ai-chat-messages{max-height:55vh;overflow-y:auto;margin-bottom:12px}

.ai-chat-input:focus{border-color:var(--blue)}
.ai-chat-input:disabled{opacity:.5}
</style>

<body>
<div id="wrapper">
  <nav id="app-nav">
    <a class="nav-link nav-active" href="/dashboard">&#127937; Session Telemetry Dashboard</a>
  </nav>

  <div id="content">
    <!-- Header -->
    <div class="page-header">
      <h1>&#127937; Season Telemetry</h1>
      <span class="subtitle">Race weekend session analysis &amp; driver comparison</span>
      <div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('dark')" title="Dark">&#127761;</button>
        <button class="theme-btn" onclick="setTheme('dim')" title="Dim">&#127762;</button>
        <button class="theme-btn" onclick="setTheme('light')" title="Light">&#9728;&#65039;</button>
      </div>
    </div>

    <!-- Auth bar -->
    <div class="auth-bar" id="auth-bar">
      <span class="ctrl-label">OpenF1</span>
      <input type="text" id="auth-user" placeholder="Username"/>
      <input type="password" id="auth-pass" placeholder="Password"/>
      <button class="ctrl-btn" onclick="doAuth()">Login</button>
      <span class="auth-status" id="auth-status">Checking...</span>
    </div>

    <!-- Selection controls -->
    <div class="controls" id="selection-controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Year</span>
        <select class="ctrl-select" id="sel-year" onchange="loadMeetings()"></select>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Grand Prix</span>
        <select class="ctrl-select" id="sel-meeting" onchange="loadSessions()" style="min-width:200px">
          <option value="">— Select Year first —</option>
        </select>
      </div>
    </div>

    <!-- Session tabs -->
    <div class="session-tabs" id="session-tabs" style="margin-bottom:16px"></div>

    <!-- Status bar -->
    <div class="status-bar" id="status-bar" style="display:none"></div>

    <!-- Main area -->
    <div id="main-area"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════════════
   CONFIGURATION
   ══════════════════════════════════════════════════════════════════════════════ */
const TEAM_COLORS={
  "Red Bull Racing":"#3671C6","McLaren":"#FF8000","Ferrari":"#E80020",
  "Mercedes":"#27F4D2","Aston Martin":"#229971","Alpine":"#00A1E8",
  "Williams":"#1868DB","RB":"#6692FF","Racing Bulls":"#6692FF",
  "Kick Sauber":"#52E252","Haas F1 Team":"#B6BABD","Cadillac":"#FFD700",
};
const COMPOUND_COLORS={SOFT:"var(--soft)",MEDIUM:"var(--medium)",HARD:"var(--hard)",INTERMEDIATE:"var(--inter)",WET:"var(--wet)"};
function teamColor(t){return TEAM_COLORS[t]||"#888"}
function compoundColor(c){return COMPOUND_COLORS[(c||"").toUpperCase()]||"var(--text2)"}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmtTime(s){if(!s||s<=0)return"—";const m=Math.floor(s/60);const sec=(s-m*60);return m>0?`${m}:${sec.toFixed(3).padStart(6,"0")}`:sec.toFixed(3)}
function fmtGap(g){if(!g||Math.abs(g)<0.0005)return"";return(g>0?"+":"")+g.toFixed(3)}

/* Track lengths (km) keyed by circuit_short_name from OpenF1 */
const TRACK_LENGTHS={
  "bahrain":5.412,"sakhir":5.412,"jeddah":6.174,"albert_park":5.278,"melbourne":5.278,
  "suzuka":5.807,"shanghai":5.451,"miami":5.412,"imola":4.909,"monaco":3.337,"montecarlo":3.337,
  "montreal":4.361,"barcelona":4.657,"catalunya":4.657,"spielberg":4.318,"red_bull_ring":4.318,
  "silverstone":5.891,"hungaroring":4.381,"spa":7.004,"spafrancorchamps":7.004,
  "zandvoort":4.259,"monza":5.793,"baku":6.003,"marina_bay":4.940,"singapore":4.940,
  "austin":5.513,"mexico":4.304,"interlagos":4.309,"saopaulo":4.309,"las_vegas":6.201,
  "lasvegas":6.201,"losail":5.419,"yas_marina":5.281,"abudhabi":5.281,"yasmarina":5.281,
  "paul_ricard":5.842,"portimao":4.653,"istanbul":5.338,"mugello":5.245,"nurburgring":5.148,
};
// F1 Points systems
const RACE_POINTS=[25,18,15,12,10,8,6,4,2,1];
const SPRINT_POINTS=[8,7,6,5,4,3,2,1];
function f1Points(pos,isSprint){const tbl=isSprint?SPRINT_POINTS:RACE_POINTS;return pos>=1&&pos<=tbl.length?tbl[pos-1]:0;}

// GP country abbreviations keyed by partial meeting name match
const GP_COUNTRY_MAP={
  "bahrain":"BHR","saudi":"KSA","jeddah":"KSA","australia":"AUS","melbourne":"AUS",
  "japan":"JPN","suzuka":"JPN","china":"CHN","shanghai":"CHN","miami":"MIA",
  "emilia":"EMI","imola":"EMI","monaco":"MON","canada":"CAN","montreal":"CAN",
  "spain":"ESP","barcelona":"ESP","austria":"AUT","spielberg":"AUT","british":"GBR",
  "silverstone":"GBR","hungar":"HUN","belgium":"BEL","spa":"BEL","netherlands":"NED",
  "dutch":"NED","zandvoort":"NED","italy":"ITA","italian":"ITA","monza":"ITA",
  "azerbaijan":"AZE","baku":"AZE","singapore":"SGP","united states":"USA","austin":"USA",
  "mexico":"MEX","brazil":"BRA","interlagos":"BRA","sao paulo":"BRA","las vegas":"LVG",
  "qatar":"QAT","losail":"QAT","abu dhabi":"ABU","yas":"ABU","portugal":"POR",
  "turkey":"TUR","istanbul":"TUR"
};
function gpCountryCode(meetingName){
  const lower=(meetingName||"").toLowerCase();
  for(const[k,v]of Object.entries(GP_COUNTRY_MAP)){if(lower.includes(k))return v;}
  // Fallback: first 3 chars uppercase
  return(meetingName||"").replace(/grand prix/i,"").trim().substring(0,3).toUpperCase()||"???";
}
function isTestMeeting(m){
  const n=((m.meeting_name||"")+" "+(m.circuit_short_name||"")).toLowerCase();
  return n.includes("test")||n.includes("pre-season");
}

function getTrackLengthKm(){
  const m=STATE.activeMeeting;
  if(!m)return null;
  const csn=(m.circuit_short_name||"").toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(TRACK_LENGTHS[csn])return TRACK_LENGTHS[csn];
  // Try with underscores removed
  const csnClean=csn.replace(/_/g,"");
  if(TRACK_LENGTHS[csnClean])return TRACK_LENGTHS[csnClean];
  // Fuzzy match
  for(const[k,v] of Object.entries(TRACK_LENGTHS)){
    const kClean=k.replace(/_/g,"");
    if(csnClean.includes(kClean)||kClean.includes(csnClean))return v;
  }
  return null;
}

/* Session type classification */
function classifySession(sess){
  const name=((sess.session_name||"")+"_"+(sess.session_type||"")).toLowerCase();
  if(name.includes("practice")||name.includes("fp"))return"practice";
  if(name.includes("sprint")&&(name.includes("quali")||name.includes("shootout")))return"sprint_quali";
  if(name.includes("qualifying")||name.includes("quali"))return"qualifying";
  if(name.includes("sprint")&&name.includes("race"))return"sprint";
  if(name.includes("sprint")&&!name.includes("quali")&&!name.includes("shootout"))return"sprint";
  if(name.includes("race"))return"race";
  return"practice";
}

/* ══════════════════════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════════════════════ */
let STATE={
  meetings:[],sessions:[],
  activeSession:null,  // full session object
  sessionType:"",      // practice|qualifying|sprint_quali|sprint|race
  sessionData:null,    // {drivers,laps,stints}
  sortCol:"time",sortDir:1,
  driverFilter:new Set(), // empty=all, or Set of driver_numbers
  compoundFilter:null, // null=all, or compound string
  activeMeeting:null,  // meeting object (has circuit_short_name)
  telemSlots:[null,null,null], // [{dn,lapNum,lapTime,data:{car,loc}}, ...] up to 3
  lapScatterCanvas:null,
  // Qualifying phase filter
  qualiPhase:null,     // null=all, "Q1","Q2","Q3"
  qualiPhases:null,    // computed {Q1:[laps],Q2:[laps],Q3:[laps]}
  // Live refresh
  liveRefresh:false,
  liveTimer:null,
  liveInterval:15,     // seconds
  liveCountdown:0,
  liveTick:null,
  // Lasso & annotations on scatter chart
  scatterMode:"lasso", // "lasso" or "annotate"
  scatterLasso:{active:false,x0:0,y0:0,x1:0,y1:0},
  scatterLassoResult:null, // {laps,avg,count,min,max,lx,rx,ty,by}
  scatterAnnotations:[],
  scatterCoord:null,   // stored draw coordinate system for hit-testing
  // Long run tracking
  selectedLongRuns:new Set(),
  // Multi-driver lap-by-lap
  multiDrivers:new Set(), // driver_numbers selected for overlay
  mdShowPitOut:false,     // toggle: show pit-out laps
  mdShowFlagged:true,     // toggle: show SC/VSC/YF flagged laps
  mdShowSlow:false,       // toggle: show heuristic slow laps (when no RC data)
  mdHighlight:null,       // driver_number currently hovered for highlight
  mdExcludedLaps:new Set(), // Set of "driverNumber_lapNumber" keys for manually excluded points
  // Race Dashboard
  rdRefDriver:null,         // driver_number for tempo comparison reference
  rdTempoWindow:5,          // last N laps for tempo calculation (5 or 10)
  rdLapMin:1,               // lap range slider lower bound

   ══════════════════════════════════════════════════════════════════════════════ */
function toggleReplay(){
  if(STATE.replayActive)stopReplay();
  else startReplay();
}
function startReplay(){
  if(!STATE.sessionData)return;
  const allLaps=(STATE.sessionData.laps||[]).filter(l=>l.lap_duration>0);
  if(!allLaps.length)return;
  STATE.replayMaxLap=Math.max(...allLaps.map(l=>l.lap_number));
  STATE.replayLap=1;
  STATE.replayActive=true;
  STATE._rcLastSoundCount=0; // reset so sounds fire during replay
  STATE._fullSessionData=JSON.parse(JSON.stringify(STATE.sessionData));
  const bar=document.getElementById("replay-bar");
  if(bar)bar.style.display="flex";
  const btn=document.getElementById("btn-replay");
  if(btn){btn.classList.add("active");btn.innerHTML="&#9632; Replay";}
  stopLiveRefresh();
  replayRenderCurrentLap();
}
function stopReplay(){
  STATE.replayActive=false;
  if(STATE.replayTimer){clearInterval(STATE.replayTimer);STATE.replayTimer=null;}
  // Restore full data
  if(STATE._fullSessionData){STATE.sessionData=STATE._fullSessionData;STATE._fullSessionData=null;}
  const bar=document.getElementById("replay-bar");
  if(bar)bar.style.display="none";
  const btn=document.getElementById("btn-replay");
  if(btn){btn.classList.remove("active");btn.innerHTML="&#9654; Replay";}
  const playBtn=document.getElementById("replay-play");
  if(playBtn){playBtn.classList.remove("active");playBtn.innerHTML="&#9654; Play";}
  // Re-render with full data
  renderRaceControl();
  renderDriverFilters();renderScatterDriverChips();
  renderLapsTable();drawLapScatter();
  renderSpeedRankings();drawTopVsMean();
  drawMultiDriverChart();renderStintsTable();
  if(STATE.sessionType==="race"||STATE.sessionType==="sprint")renderRaceDashboard();
}
function replayPlayPause(){
  if(STATE.replayTimer){
    // Pause
    clearInterval(STATE.replayTimer);STATE.replayTimer=null;
    const btn=document.getElementById("replay-play");
    if(btn){btn.classList.remove("active");btn.innerHTML="&#9654; Play";}
  }else{
    // Play
    const btn=document.getElementById("replay-play");
    if(btn){btn.classList.add("active");btn.innerHTML="&#9646;&#9646; Pause";}
    STATE.replayTimer=setInterval(()=>{
      if(STATE.replayLap>=STATE.replayMaxLap){
        clearInterval(STATE.replayTimer);STATE.replayTimer=null;
        const b=document.getElementById("replay-play");
        if(b){b.classList.remove("active");b.innerHTML="&#9654; Play";}
        return;
      }
      STATE.replayLap++;
      replayRenderCurrentLap();
    },1000/STATE.replaySpeed);
  }
}
function replayStep(n){
  STATE.replayLap=Math.max(1,Math.min(STATE.replayMaxLap,STATE.replayLap+n));
  replayRenderCurrentLap();
}
function replaySeek(e){
  const bar=document.getElementById("replay-progress");
  if(!bar)return;
  const rect=bar.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  STATE.replayLap=Math.max(1,Math.round(pct*STATE.replayMaxLap));
  replayRenderCurrentLap();
}
function replaySetSpeed(){
  const speeds=[0.5,1,2,4,8];
  const idx=speeds.indexOf(STATE.replaySpeed);
  STATE.replaySpeed=speeds[(idx+1)%speeds.length];
  const lbl=document.getElementById("replay-speed-label");
  if(lbl)lbl.textContent=STATE.replaySpeed+"×";
  // If currently playing, restart timer with new speed
  if(STATE.replayTimer){
    clearInterval(STATE.replayTimer);
    STATE.replayTimer=setInterval(()=>{
      if(STATE.replayLap>=STATE.replayMaxLap){
        clearInterval(STATE.replayTimer);STATE.replayTimer=null;
        const b=document.getElementById("replay-play");
        if(b){b.classList.remove("active");b.innerHTML="&#9654; Play";}
        return;
      }
      STATE.replayLap++;
      replayRenderCurrentLap();
    },1000/STATE.replaySpeed);
  }
}
function replayRenderCurrentLap(){
  if(!STATE._fullSessionData)return;
  const lap=STATE.replayLap;
  const full=STATE._fullSessionData;
  // Create filtered snapshot up to current replay lap
  const filtered={
    drivers:full.drivers,
    laps:(full.laps||[]).filter(l=>l.lap_number<=lap),
    stints:(full.stints||[]).map(s=>{
      if((s.lap_start||1)>lap)return null;
      return{...s,lap_end:Math.min(s.lap_end||9999,lap)};
    }).filter(Boolean),
    race_control:(full.race_control||[]).filter(m=>{
      if(m.lap_number!=null)return m.lap_number<=lap;
      return true; // include non-lap messages
    }),
    positions:full.positions||[]
  };
  STATE.sessionData=filtered;
  // Update UI
  const fill=document.getElementById("replay-fill");
  if(fill)fill.style.width=(lap/STATE.replayMaxLap*100)+"%";
  const lbl=document.getElementById("replay-lap-label");
  if(lbl)lbl.textContent=`L${lap} / ${STATE.replayMaxLap}`;
  // Re-render all views
  renderRaceControl();
  renderLapsTable();
  drawLapScatter();
  drawMultiDriverChart();
  renderStintsTable();
  if(STATE.sessionType==="race"||STATE.sessionType==="sprint")renderRaceDashboard();
}

/* ══════════════════════════════════════════════════════════════════════════════
   QUALIFYING PHASE DETECTION (Q1/Q2/Q3)
   ══════════════════════════════════════════════════════════════════════════════ */
function detectQualiPhases(){
  const laps=(STATE.sessionData||{}).laps||[];
  if(!laps.length){STATE.qualiPhases=null;return;}
  // Sort by date_start to find time gaps between phases
  const withTime=laps.filter(l=>l.date_start).map(l=>({...l,_ts:new Date(l.date_start).getTime()}));
  if(!withTime.length){STATE.qualiPhases=null;return;}
  withTime.sort((a,b)=>a._ts-b._ts);
  // Find gaps > 3 minutes to split phases
  const gaps=[];
  for(let i=1;i<withTime.length;i++){
    const dt=(withTime[i]._ts-withTime[i-1]._ts)/1000;
    if(dt>180)gaps.push({idx:i,dt,ts:withTime[i]._ts});
  }
  // Assign phases based on gaps
  const phases={Q1:[],Q2:[],Q3:[]};
  const boundaries=[]; // timestamps marking start of Q2, Q3
  gaps.sort((a,b)=>b.dt-a.dt); // largest gaps first
  const topGaps=gaps.slice(0,2).sort((a,b)=>a.ts-b.ts);
  if(topGaps.length>=2){
    boundaries.push(topGaps[0].ts,topGaps[1].ts);
  }else if(topGaps.length===1){
    boundaries.push(topGaps[0].ts);
  }
  // Classify each lap
  withTime.forEach(l=>{
    if(boundaries.length>=2&&l._ts>=boundaries[1])phases.Q3.push(l);
    else if(boundaries.length>=1&&l._ts>=boundaries[0])phases.Q2.push(l);
    else phases.Q1.push(l);
  });
  // Also classify laps without date_start using driver elimination logic
  // If Q3 exists but is empty, merge into Q2
  if(boundaries.length<2)phases.Q3=[];
  if(boundaries.length<1){phases.Q2=[];phases.Q1=withTime;}
  // Build lap_number sets for quick lookup
  phases._q1Set=new Set(phases.Q1.map(l=>l.driver_number+"_"+l.lap_number));
  phases._q2Set=new Set(phases.Q2.map(l=>l.driver_number+"_"+l.lap_number));
  phases._q3Set=new Set(phases.Q3.map(l=>l.driver_number+"_"+l.lap_number));
  STATE.qualiPhases=phases;
}
function getQualiPhaseForLap(dn,lapNum){
  if(!STATE.qualiPhases)return null;
  const key=dn+"_"+lapNum;
  if(STATE.qualiPhases._q3Set.has(key))return"Q3";
  if(STATE.qualiPhases._q2Set.has(key))return"Q2";
  if(STATE.qualiPhases._q1Set.has(key))return"Q1";
  return"Q1"; // default
}
function setQualiPhase(p){
  STATE.qualiPhase=p;
  renderQualiPhaseTabs();
  renderLapsTable();
  drawLapScatter();
  drawSpeedScatter();
}
function renderQualiPhaseTabs(){
  const el=document.getElementById("quali-phase-tabs");
  if(!el)return;
  const ph=STATE.qualiPhases;
  if(!ph){el.innerHTML="";return;}
  const total=(ph.Q1.length+ph.Q2.length+ph.Q3.length);
  let html=`<button class="quali-phase-tab${!STATE.qualiPhase?" active":""}" onclick="setQualiPhase(null)">All<span class="phase-count">(${total})</span></button>`;
  if(ph.Q1.length)html+=`<button class="quali-phase-tab${STATE.qualiPhase==="Q1"?" active":""}" onclick="setQualiPhase('Q1')">Q1<span class="phase-count">(${ph.Q1.length})</span></button>`;
  if(ph.Q2.length)html+=`<button class="quali-phase-tab${STATE.qualiPhase==="Q2"?" active":""}" onclick="setQualiPhase('Q2')">Q2<span class="phase-count">(${ph.Q2.length})</span></button>`;
  if(ph.Q3.length)html+=`<button class="quali-phase-tab${STATE.qualiPhase==="Q3"?" active":""}" onclick="setQualiPhase('Q3')">Q3<span class="phase-count">(${ph.Q3.length})</span></button>`;
  el.innerHTML=html;
}

/* ══════════════════════════════════════════════════════════════════════════════
   AUTO-SAVE SESSION RESULTS TO CSV
   ══════════════════════════════════════════════════════════════════════════════ */
async function saveSessionToHistory(){
  const sess=STATE.activeSession;const d=STATE.sessionData;
  if(!sess||!d)return;
  const sType=STATE.sessionType;
  const meeting=STATE.activeMeeting;
  const drivers=d.drivers||{};
  const laps=d.laps||[];
  const stints=d.stints||[];
  const positions=d.positions||[];
  const yearSel=document.getElementById("sel-year");
  const year=yearSel?parseInt(yearSel.value):new Date().getFullYear();

  // Determine meeting round — filter out test meetings, so AUS=R1
  const raceMeetings=(STATE.meetings||[]).filter(m=>!isTestMeeting(m));
  const meetingIdx=raceMeetings.findIndex(m=>m.meeting_key===(meeting||{}).meeting_key);
  const round=meetingIdx>=0?meetingIdx+1:0;

  const results=[];
  const driverNums=[...new Set([...Object.keys(drivers).map(Number),...laps.map(l=>l.driver_number)])];

  if(sType==="race"||sType==="sprint"){
    // Race/sprint: compute finish positions from cumulative time or positions data
    const posMap={};
    if(positions.length){
      const posByDrv={};
      positions.forEach(p=>{if(!posByDrv[p.driver_number])posByDrv[p.driver_number]=[];posByDrv[p.driver_number].push(p);});
      Object.entries(posByDrv).forEach(([dn,arr])=>{
        arr.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        posMap[parseInt(dn)]=arr[arr.length-1].position;
      });
    }
    // Fallback: cumulative time
    const cumByDrv={};const lapCount={};
    laps.filter(l=>l.lap_duration>0).forEach(l=>{
      cumByDrv[l.driver_number]=(cumByDrv[l.driver_number]||0)+l.lap_duration;
      lapCount[l.driver_number]=(lapCount[l.driver_number]||0)+1;
    });
    const sorted=[...driverNums].sort((a,b)=>(cumByDrv[a]||Infinity)-(cumByDrv[b]||Infinity));
    sorted.forEach((dn,i)=>{if(posMap[dn]==null)posMap[dn]=i+1;});

    // Grid positions from first lap positions or stint data
    const gridMap={};
    driverNums.forEach(dn=>{
      const firstStint=stints.find(s=>s.driver_number===dn&&s.stint_number===1);
      // Use position at lap 1 if available
      if(positions.length){
        const p1=positions.filter(p=>p.driver_number===dn).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        if(p1.length)gridMap[dn]=p1[0].position;
      }
    });

    const maxLap=Math.max(...laps.filter(l=>l.lap_duration>0).map(l=>l.lap_number),0);
    const leaderCum=Math.min(...Object.values(cumByDrv).filter(Boolean));

    driverNums.forEach(dn=>{
      const drv=drivers[dn]||{};
      const fp=posMap[dn]||99;
      const cum=cumByDrv[dn]||0;
      const gap=cum>0&&leaderCum>0?(cum-leaderCum):0;
      const bestLap=Math.min(...laps.filter(l=>l.driver_number===dn&&l.lap_duration>0).map(l=>l.lap_duration),Infinity);
      results.push({
        driver_number:dn,driver_acronym:drv.acronym||"#"+dn,team:drv.team||"",
        grid_position:gridMap[dn]||"",finish_position:fp,
        classified:fp<=20?"true":"false",status:lapCount[dn]>=maxLap-2?"Finished":"DNF",
        points:f1Points(fp,sType==="sprint"),fastest_lap:"",
        best_time:bestLap<Infinity?bestLap.toFixed(3):"",
        gap_to_leader:gap>0?gap.toFixed(3):"0",
        total_time:cum>0?cum.toFixed(3):"",
        laps_completed:lapCount[dn]||0
      });
    });
  }else if(sType==="qualifying"||sType==="sprint_quali"){
    // Qualifying: best times per phase, grid position, eliminated phase
    const phases=STATE.qualiPhases;
    driverNums.forEach(dn=>{
      const drv=drivers[dn]||{};
      const dLaps=laps.filter(l=>l.driver_number===dn&&l.lap_duration>0);
      if(!dLaps.length)return;
      let q1="",q2="",q3="",bestTime=Infinity;
      if(phases){
        // phases.Q1/Q2/Q3 are arrays of lap objects; use _q1Set/_q2Set/_q3Set for lookup
        const q1Laps=dLaps.filter(l=>phases._q1Set&&phases._q1Set.has(dn+"_"+l.lap_number));
        const q2Laps=dLaps.filter(l=>phases._q2Set&&phases._q2Set.has(dn+"_"+l.lap_number));
        const q3Laps=dLaps.filter(l=>phases._q3Set&&phases._q3Set.has(dn+"_"+l.lap_number));
        if(q1Laps.length)q1=Math.min(...q1Laps.map(l=>l.lap_duration)).toFixed(3);
        if(q2Laps.length)q2=Math.min(...q2Laps.map(l=>l.lap_duration)).toFixed(3);
        if(q3Laps.length)q3=Math.min(...q3Laps.map(l=>l.lap_duration)).toFixed(3);
      }
      bestTime=Math.min(...dLaps.map(l=>l.lap_duration));
      let eliminated="";
      if(phases&&(phases._q2Set&&phases._q2Set.size>0)){
        // Only assign elimination if we actually detected multiple phases
        const inQ2=dLaps.some(l=>phases._q2Set.has(dn+"_"+l.lap_number));
        const inQ3=phases._q3Set&&phases._q3Set.size>0&&dLaps.some(l=>phases._q3Set.has(dn+"_"+l.lap_number));
        if(!inQ2&&!inQ3)eliminated="Q1";
        else if(inQ2&&!inQ3)eliminated="Q2";
      }
      results.push({
        driver_number:dn,driver_acronym:drv.acronym||"#"+dn,team:drv.team||"",
        grid_position:"",q1_time:q1,q2_time:q2,q3_time:q3,
        best_time:bestTime<Infinity?bestTime.toFixed(3):"",
        eliminated_phase:eliminated
      });
    });
    // Sort by best time and assign grid positions
    results.sort((a,b)=>(parseFloat(a.best_time)||Infinity)-(parseFloat(b.best_time)||Infinity));
    results.forEach((r,i)=>{r.grid_position=i+1;});
  }else{
    // Practice: best time, laps completed, position
    driverNums.forEach(dn=>{
      const drv=drivers[dn]||{};
      const dLaps=laps.filter(l=>l.driver_number===dn&&l.lap_duration>0);
      if(!dLaps.length)return;
      const best=Math.min(...dLaps.map(l=>l.lap_duration));
      results.push({
        driver_number:dn,driver_acronym:drv.acronym||"#"+dn,team:drv.team||"",
        best_time:best<Infinity?best.toFixed(3):"",
        laps_completed:dLaps.length,position:"",gap_to_leader:""
      });
    });
    results.sort((a,b)=>(parseFloat(a.best_time)||Infinity)-(parseFloat(b.best_time)||Infinity));
    const leader=parseFloat(results[0]?.best_time)||0;
    results.forEach((r,i)=>{
      r.position=i+1;
      const bt=parseFloat(r.best_time)||0;
      r.gap_to_leader=bt>0&&leader>0?(bt-leader).toFixed(3):"0";
    });
  }

  if(!results.length)return;

  try{
    await fetch("/api/historical/save_session",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        year,round,session_type:sType,
        meeting_key:(meeting||{}).meeting_key||"",
        meeting_name:(meeting||{}).meeting_name||(meeting||{}).circuit_short_name||"",
        session_key:sess.session_key,
        session_name:sess.session_name||"",
        results
      })
    });
    console.log("[Historical] Saved",results.length,"results for",sType);
  }catch(e){console.warn("[Historical] Save failed:",e);}
}
